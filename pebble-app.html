<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #E8E4DE; font-family: Calibri, sans-serif; }

  /* ── Theme CSS Variables ── */
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --primary: #4A90A4;
    --primary-light: rgba(74,144,164,0.1);
    --accent: #C9A96E;
    --accent-light: rgba(201,169,110,0.1);
    --dark: #1A1A2E;
    --muted: #6B7280;
    --danger: #E57373;
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.6);
    --card-shadow: rgba(26,26,46,0.04);
    --font-display: Georgia, serif;
    --font-body: Calibri, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --cloud-sky: none;
    --sky-height: 0px;
    --card-radius: 16px;
    --card-border-w: 1px;
  }

  .phone-frame {
    width: 375px; max-height: 812px; height: 100vh;
    background: var(--bg); position: relative; overflow: hidden;
    margin: 0 auto; border-radius: 0;
    display: flex; flex-direction: column;
  }
  @media (min-width: 500px) {
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
    .phone-frame { border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 8px var(--dark); max-height: 812px; height: 812px; }
  }

  /* ── Swipe Container ── */
  .swipe-container {
    flex: 1; overflow-y: auto; scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  }
  .swipe-container::-webkit-scrollbar { display: none; }

  .swipe-page-wrap {
    min-height: 100%; scroll-snap-align: start;
  }
  .swipe-page {
    min-height: 100%;
    display: flex; flex-direction: column;
    padding: 16px 20px 20px;
    position: relative;
  }

  /* ── Page Dots ── */
  .page-dots {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .page-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); opacity: 0.25;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .page-dot.active {
    opacity: 1; background: var(--primary);
    width: 6px; height: 16px; border-radius: 3px;
  }

  /* ── Cloud sky header ── */
  .cloud-sky { position: relative; }
  .cloud-sky::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: var(--sky-height);
    background: var(--cloud-sky);
    pointer-events: none;
    z-index: 0;
  }
  .cloud-sky > * { position: relative; z-index: 1; }

  /* ── Glass Card ── */
  .glass-card {
    background: var(--card-bg);
    border: var(--card-border-w) solid var(--card-border);
    border-radius: var(--card-radius);
    box-shadow: 0 2px 12px var(--card-shadow);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }

  /* ── Dots ── */
  .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--accent); background: transparent; flex-shrink: 0; }
  .dot.filled { background: var(--accent); border-color: var(--accent); }
  .dot.today { border: 2px solid var(--primary); box-shadow: 0 0 0 2px rgba(74,144,164,0.25); }
  .dot.today.filled { background: var(--primary); border-color: var(--primary); }

  .checkbox { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--primary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .checkbox.done { background: var(--primary); border-color: var(--primary); }

  .chat-bar { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: color-mix(in srgb, var(--bg) 92%, transparent); }

  /* ── Hand-drawn style ── */
  .hand-drawn { stroke-linecap: round; stroke-linejoin: round; }

  /* ── Marble Jar Overlay ── */
  .jar-overlay {
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    background: color-mix(in srgb, var(--bg) 85%, transparent);
  }
  .jar-enter { animation: fadeUp 0.3s ease-out; }
  .settings-enter { animation: slideUp 0.2s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }

  /* ── Marble hover ── */
  .marble-group { cursor: pointer; transition: transform 0.15s ease; }
  .marble-group:hover { transform: scale(1.08); }
  .marble-group:active { transform: scale(0.95); }

  /* ── Theme swatch ── */
  .theme-swatch {
    width: 100%; border-radius: 14px; padding: 12px 14px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; gap: 12px;
  }
  .theme-swatch.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,144,164,0.15); }
  .theme-swatch:hover:not(.active) { border-color: rgba(0,0,0,0.1); }
  .swatch-dots { display: flex; gap: 4px; }
  .swatch-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); }

  /* ── Page title (coquette script style) ── */
  .page-title {
    font-family: var(--font-display); font-size: 22px; color: var(--dark);
    margin-bottom: 12px; line-height: 1.2;
  }

  @media (prefers-reduced-motion: reduce) {
    .jar-enter, .settings-enter { animation: none; }
    .marble-group, .checkbox, .theme-swatch, .page-dot { transition: none; }
    .swipe-container { scroll-behavior: auto; }
  }

  /* ══════════════════════════════════════════
     PER-THEME UNIQUE VISUAL ELEMENTS
     ══════════════════════════════════════════ */

  /* ── Midnight Mode: terminal aesthetic ── */
  [data-theme="midnightMode"] .glass-card {
    border-left: 3px solid #34D399;

  /* ── Neon Dusk: glow effects ── */
  [data-theme="neonDusk"] .glass-card {

  [data-theme="neonDusk"] .page-title {

  [data-theme="neonDusk"] .swipe-page::after {

    opacity: 0.5;
    border-radius: 1px;
  }

  /* ── Butter & Ink: bold brutalist borders ── */
  [data-theme="butterInk"] .glass-card {
    border: 2.5px solid #1A1A1A;

    box-shadow: 4px 4px 0 #1A1A1A;
  }
  [data-theme="butterInk"] .page-title {
    text-transform: uppercase;

    border-bottom: 3px solid #1A1A1A;
    padding-bottom: 4px;
    display: inline-block;
  }
  [data-theme="butterInk"] .swipe-page::before {
    content: '';
    position: absolute; top: 14px; right: 20px;
    width: 12px; height: 12px;
    border: 2.5px solid #D4722A;
  }

  /* ── Matcha Zen: minimal, serene, Japanese ── */
  [data-theme="matchaZen"] .glass-card {
    border: none;
    border-top: 1px solid rgba(212,201,168,0.25);

    background: rgba(58,90,78,0.6);
  }
  [data-theme="matchaZen"] .page-title {
    letter-spacing: 6px;
    text-transform: lowercase;
    font-size: 16px !important;

  }
  [data-theme="matchaZen"] .page-title::after {

  }

  /* ── Candy Pop: playful dashed borders ── */
  [data-theme="candyPop"] .glass-card {

    box-shadow: 0 4px 16px rgba(217,70,239,0.1);
  }
  [data-theme="candyPop"] .page-title {

  [data-theme="candyPop"] .page-title::after {

  }

  /* ── Ink Wash: sumi-e minimalist ── */
  [data-theme="inkWash"] .glass-card {
    border: none;
    border-bottom: 1px solid rgba(58,58,58,0.15);
    border-radius: 0;
    box-shadow: none;

  }
  [data-theme="inkWash"] .page-title {
    font-size: 26px !important;

    letter-spacing: 1px;
    opacity: 0.85;
  }
  [data-theme="inkWash"] .swipe-page::before {
    content: '';
    position: absolute; top: 16px; left: 20px;
    width: 40px; height: 2px;
    background: linear-gradient(90deg, #3A3A3A, transparent);
    opacity: 0.4;
  }
  [data-theme="inkWash"] .swipe-page::after {
    content: '';
    position: absolute; bottom: 16px; right: 20px;
    width: 40px; height: 2px;
    background: linear-gradient(270deg, #8A7A6A, transparent);
    opacity: 0.3;
  }

  /* ── Cherry Blossom: soft, petal-like ── */
  [data-theme="cherryBlossom"] .glass-card {
    border: 1px solid rgba(158,43,94,0.1);
    border-radius: 22px;
    box-shadow: 0 4px 20px rgba(158,43,94,0.06), 0 0 0 3px rgba(232,160,184,0.08);

  .theme-deco {

  .theme-deco-top { top: 8px; right: 16px; }

/* ── Custom themes from playground ── */
function getCustomThemes() {
  try { return JSON.parse(localStorage.getItem('pebble-app-custom-themes') || '[]'); } catch { return []; }
}
function saveCustomThemes(themes) {
  localStorage.setItem('pebble-app-custom-themes', JSON.stringify(themes));
}

/* ══════════════════════════════════════════
   THEME CONTEXT
   ══════════════════════════════════════════ */
const ThemeCtx = createContext();

function ThemeProvider({ children }) {
  const [themeId, setThemeId] = useState(() => localStorage.getItem('pebble-theme') || 'coquette');
  const [customThemes, setCustomThemes] = useState(getCustomThemes);

  useEffect(() => {
    const check = () => setCustomThemes(getCustomThemes());
    window.addEventListener('focus', check);
    return () => window.removeEventListener('focus', check);
  }, []);

  /* Default values for ALL CSS variables — reset before each theme switch */
  const CSS_DEFAULTS = {
    '--bg': '#F5F3EF', '--surface': '#FFFFFF', '--primary': '#4A90A4', '--primary-light': 'rgba(74,144,164,0.1)',
    '--accent': '#C9A96E', '--accent-light': 'rgba(201,169,110,0.1)', '--dark': '#1A1A2E', '--muted': '#6B7280',
    '--danger': '#E57373', '--card-bg': 'rgba(255,255,255,0.85)', '--card-border': 'rgba(255,255,255,0.6)',
    '--card-shadow': 'rgba(26,26,46,0.04)', '--font-display': 'Georgia, serif', '--font-body': 'Calibri, sans-serif',
    '--font-mono': "'JetBrains Mono', monospace", '--cloud-sky': 'none', '--sky-height': '0px',
    '--card-radius': '16px', '--card-border-w': '1px',
  };

  const applyTheme = useCallback((id) => {
    let theme = THEMES[id];
    if (!theme) {
      const customs = getCustomThemes();
      theme = customs.find(ct => ct.id === id);
    }
    if (!theme) { id = 'coquette'; theme = THEMES.coquette; }

    const root = document.documentElement;

    /* Reset ALL vars to defaults first so old theme values don't persist */
    Object.entries(CSS_DEFAULTS).forEach(([k, v]) => root.style.setProperty(k, v));

    let vars = { ...theme.vars };

    if (theme.monetRotation) {
      const day = new Date().getDay();
      const palette = MONET_PALETTES[day];
      vars['--primary'] = palette.primary;
      vars['--accent'] = palette.accent;
      vars['--bg'] = palette.bg;
      vars['--dark'] = palette.dark;
      vars['--primary-light'] = `${palette.primary}1A`;
      vars['--accent-light'] = `${palette.accent}1A`;
      vars['--cloud-sky'] = palette.sky;
      vars['--sky-height'] = '200px';
    }

    Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));
    document.body.style.background = '#E8E4DE';
    localStorage.setItem('pebble-theme', id);
    setThemeId(id);
  }, []);

  const deleteCustomTheme = useCallback((id) => {
    const updated = getCustomThemes().filter(ct => ct.id !== id);
    saveCustomThemes(updated);
    setCustomThemes(updated);
    if (themeId === id) applyTheme('coquette');
  }, [themeId, applyTheme]);

  useEffect(() => { applyTheme(themeId); }, []);

  const monetPainting = themeId === 'monet' ? MONET_PALETTES[new Date().getDay()].name : null;

  return (
    <ThemeCtx.Provider value={{ themeId, setTheme: applyTheme, monetPainting, customThemes, deleteCustomTheme }}>
      {children}
    </ThemeCtx.Provider>
  );
}

/* ══════════════════════════════════════════
   DATA LAYER — State Management
   ══════════════════════════════════════════ */
const DEFAULT_DATA = {
  profile: { name: '', vegan: false, skinType: '' },
  planner: { events: {}, todos: [], notes: [] },
  journal: { entries: [] },
  kitchen: {
    mealPlan: { breakfast: '', lunch: '', dinner: '' },
    calorieLog: { breakfast: 0, lunch: 0, dinner: 0 },
    target: 2000,
    grocery: [],
  },
  gym: {
    workoutPlan: [{ name: '', exercises: [] }],
    sessions: [],
  },
  selfCare: {
    skincare: { morning: [], evening: [] },
    routines: [],
  },
  study: { courses: [], sessions: [], goals: [] },
  career: {
    role: '',
    targetDate: '',
    skills: [],
    applications: [],
    experiences: [],
  },
  segments: [],
  dots: { workout: {}, skincare: {}, study: {}, meals: {}, water: {} },
  notebook: {
    saves: [],
    dailyPick: { date: '', quote: '', quoteAuthor: '', rec: null },
  },
  settings: { gistId: '', gistToken: '', apiKey: '', oneSignalAppId: '', oneSignalRestKey: '' },
  chat: { messages: [] },
};

let _nextId = 100;

function deepMerge(target, source) {
  const result = { ...target };
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key] && typeof target[key] === 'object') {
      result[key] = deepMerge(target[key], source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

function stripJsonFences(text) {
  return text.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '');
}

function dataReducer(state, action) {
  switch (action.type) {
    case 'TOGGLE_TODO': {
      const todos = state.planner.todos.map(t => t.id === action.id ? { ...t, done: !t.done } : t);
      return { ...state, planner: { ...state.planner, todos } };
    }
    case 'ADD_TODO': {
      const todo = { id: _nextId++, text: action.text, priority: action.priority || 'medium', done: false };
      return { ...state, planner: { ...state.planner, todos: [...state.planner.todos, todo] } };
    }
    case 'DELETE_TODO': {
      return { ...state, planner: { ...state.planner, todos: state.planner.todos.filter(t => t.id !== action.id) } };
    }
    case 'ADD_NOTE': {
      const note = { title: action.title, body: action.body || '', date: new Date().toISOString().split('T')[0] };
      return { ...state, planner: { ...state.planner, notes: [...state.planner.notes, note] } };
    }
    case 'DELETE_NOTE': {
      return { ...state, planner: { ...state.planner, notes: state.planner.notes.filter((_, i) => i !== action.index) } };
    }
    case 'TOGGLE_DOT': {
      const cat = { ...(state.dots[action.category] || {}) };
      if (cat[action.date]) delete cat[action.date]; else cat[action.date] = true;
      return { ...state, dots: { ...state.dots, [action.category]: cat } };
    }
    case 'UPDATE_MEAL_NAME': {
      return { ...state, kitchen: { ...state.kitchen, mealPlan: { ...state.kitchen.mealPlan, [action.meal]: action.name } } };
    }
    case 'UPDATE_CALORIES': {
      return { ...state, kitchen: { ...state.kitchen, calorieLog: { ...state.kitchen.calorieLog, [action.meal]: Number(action.amount) || 0 } } };
    }
    case 'UPDATE_CALORIE_TARGET': {
      return { ...state, kitchen: { ...state.kitchen, target: Number(action.value) || state.kitchen.target } };
    }
    case 'ADD_GROCERY': {
      return { ...state, kitchen: { ...state.kitchen, grocery: [...state.kitchen.grocery, { text: action.text, done: false }] } };
    }
    case 'TOGGLE_GROCERY': {
      const grocery = state.kitchen.grocery.map((g, i) => i === action.index ? { ...g, done: !g.done } : g);
      return { ...state, kitchen: { ...state.kitchen, grocery } };
    }
    case 'DELETE_GROCERY': {
      return { ...state, kitchen: { ...state.kitchen, grocery: state.kitchen.grocery.filter((_, i) => i !== action.index) } };
    }
    case 'SAVE_JOURNAL': {
      const entries = [...state.journal.entries];
      const idx = entries.findIndex(e => e.date === action.date);
      if (idx >= 0) entries[idx] = { ...entries[idx], body: action.body, mood: action.mood };
      else entries.unshift({ date: action.date, body: action.body, mood: action.mood || '' });
      return { ...state, journal: { entries } };
    }
    case 'ADD_SKINCARE_STEP': {
      const steps = [...state.selfCare.skincare[action.routine], action.step];
      return { ...state, selfCare: { ...state.selfCare, skincare: { ...state.selfCare.skincare, [action.routine]: steps } } };
    }
    case 'REMOVE_SKINCARE_STEP': {
      const steps = state.selfCare.skincare[action.routine].filter((_, i) => i !== action.index);
      return { ...state, selfCare: { ...state.selfCare, skincare: { ...state.selfCare.skincare, [action.routine]: steps } } };
    }
    case 'ADD_STUDY_SESSION': {
      const session = { date: new Date().toISOString().split('T')[0], topic: action.topic, duration: action.duration };
      return { ...state, study: { ...state.study, sessions: [session, ...state.study.sessions] } };
    }
    case 'UPDATE_COURSE_PROGRESS': {
      const courses = state.study.courses.map((c, i) => i === action.index ? { ...c, progress: action.progress } : c);
      return { ...state, study: { ...state.study, courses } };
    }
    case 'LOG_WORKOUT': {
      const session = { date: new Date().toISOString().split('T')[0], workout: action.workout, notes: action.notes || '' };
      return { ...state, gym: { ...state.gym, sessions: [session, ...state.gym.sessions] } };
    }
    case 'SAVE_PICK': {
      const save = { type: action.pickType, title: action.title, date: new Date().toISOString().split('T')[0] };
      return { ...state, notebook: { ...state.notebook, saves: [save, ...state.notebook.saves] } };
    }
    case 'UPDATE_DAILY_PICK': {
      return { ...state, notebook: { ...state.notebook, dailyPick: { date: action.date, quote: action.quote, quoteAuthor: action.quoteAuthor, rec: action.rec } } };
    }
    case 'ADD_EVENT': {
      const dateEvents = [...(state.planner.events[action.date] || []), { time: action.time || '', text: action.text }];
      return { ...state, planner: { ...state.planner, events: { ...state.planner.events, [action.date]: dateEvents } } };
    }
    case 'DELETE_EVENT': {
      const evs = (state.planner.events[action.date] || []).filter((_, i) => i !== action.index);
      const events = { ...state.planner.events };
      if (evs.length) events[action.date] = evs; else delete events[action.date];
      return { ...state, planner: { ...state.planner, events } };
    }
    case 'UPDATE_COURSE_STATUS': {
      const courses = state.study.courses.map((c, i) => i === action.index ? { ...c, status: action.status } : c);
      return { ...state, study: { ...state.study, courses } };
    }
    case 'ADD_COURSE': {
      return { ...state, study: { ...state.study, courses: [...state.study.courses, { name: action.name, status: 'in-progress', progress: 0 }] } };
    }
    case 'REMOVE_COURSE': {
      return { ...state, study: { ...state.study, courses: state.study.courses.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_EXERCISE': {
      const plan0 = { ...state.gym.workoutPlan[0], exercises: [...(state.gym.workoutPlan[0]?.exercises || []), action.exercise] };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'REMOVE_EXERCISE': {
      const plan0 = { ...state.gym.workoutPlan[0], exercises: state.gym.workoutPlan[0].exercises.filter((_, i) => i !== action.index) };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'UPDATE_WORKOUT_NAME': {
      const plan0 = { ...state.gym.workoutPlan[0], name: action.name };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'SET_CAREER_GOAL': {
      return { ...state, career: { ...state.career, role: action.role, targetDate: action.targetDate || state.career.targetDate } };
    }
    case 'ADD_CAREER_SKILL': {
      return { ...state, career: { ...state.career, skills: [...state.career.skills, { name: action.name, progress: 0 }] } };
    }
    case 'UPDATE_CAREER_SKILL': {
      const skills = state.career.skills.map((s, i) => i === action.index ? { ...s, progress: action.progress } : s);
      return { ...state, career: { ...state.career, skills } };
    }
    case 'REMOVE_CAREER_SKILL': {
      return { ...state, career: { ...state.career, skills: state.career.skills.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_JOB_APPLICATION': {
      const app = { company: action.company, role: action.role, date: new Date().toISOString().split('T')[0], status: 'applied' };
      return { ...state, career: { ...state.career, applications: [app, ...state.career.applications] } };
    }
    case 'UPDATE_JOB_STATUS': {
      const appStatuses = ['applied', 'interviewing', 'offered', 'rejected'];
      const applications = state.career.applications.map((a, i) => {
        if (i !== action.index) return a;
        const next = action.status || appStatuses[(appStatuses.indexOf(a.status) + 1) % appStatuses.length];
        return { ...a, status: next };
      });
      return { ...state, career: { ...state.career, applications } };
    }
    case 'REMOVE_JOB_APPLICATION': {
      return { ...state, career: { ...state.career, applications: state.career.applications.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_CAREER_EXPERIENCE': {
      const exp = { date: new Date().toISOString().split('T')[0], topic: action.topic };
      return { ...state, career: { ...state.career, experiences: [exp, ...state.career.experiences] } };
    }
    case 'ADD_SEGMENT': {
      const seg = { id: _nextId++, name: action.name, features: action.features, entries: [], checks: [], note: '', bars: [], dots: {} };
      return { ...state, segments: [...(state.segments || []), seg] };
    }
    case 'REMOVE_SEGMENT': {
      return { ...state, segments: (state.segments || []).filter(s => s.id !== action.id) };
    }
    case 'ADD_SEGMENT_ENTRY': {
      const entry = { date: new Date().toISOString().split('T')[0], text: action.text };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, entries: [entry, ...(s.entries || [])] } : s);
      return { ...state, segments };
    }
    case 'ADD_SEGMENT_CHECK': {
      const check = { id: _nextId++, text: action.text, done: false };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: [...(s.checks || []), check] } : s);
      return { ...state, segments };
    }
    case 'TOGGLE_SEGMENT_CHECK': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: (s.checks || []).map(c => c.id === action.checkId ? { ...c, done: !c.done } : c) } : s);
      return { ...state, segments };
    }
    case 'REMOVE_SEGMENT_CHECK': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: (s.checks || []).filter(c => c.id !== action.checkId) } : s);
      return { ...state, segments };
    }
    case 'UPDATE_SEGMENT_NOTE': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, note: action.note } : s);
      return { ...state, segments };
    }
    case 'ADD_SEGMENT_BAR': {
      const bar = { id: _nextId++, label: action.label, value: 0 };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: [...(s.bars || []), bar] } : s);
      return { ...state, segments };
    }
    case 'UPDATE_SEGMENT_BAR': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: (s.bars || []).map(b => b.id === action.barId ? { ...b, value: action.value } : b) } : s);
      return { ...state, segments };
    }
    case 'REMOVE_SEGMENT_BAR': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: (s.bars || []).filter(b => b.id !== action.barId) } : s);
      return { ...state, segments };
    }
    case 'TOGGLE_SEGMENT_DOT': {
      const segments = (state.segments || []).map(s => {
        if (s.id !== action.id) return s;
        const dots = { ...(s.dots || {}) };
        if (dots[action.date]) delete dots[action.date]; else dots[action.date] = true;
        return { ...s, dots };
      });
      return { ...state, segments };
    }
    case 'ADD_CHAT_MSG': {
      return { ...state, chat: { messages: [...state.chat.messages, action.msg] } };
    }
    case 'UPDATE_SETTINGS': {
      return { ...state, settings: { ...state.settings, [action.key]: action.value } };
    }
    case 'UPDATE_PROFILE': {
      return { ...state, profile: { ...state.profile, ...action.fields } };
    }
    case 'LOAD_DATA': {
      return deepMerge(DEFAULT_DATA, action.data);
    }
    default: return state;
  }
}

const DataCtx = createContext();
const QuizCtx = createContext();

function DataProvider({ children }) {
  const [data, dispatch] = useReducer(dataReducer, null, () => {
    try {
      const saved = localStorage.getItem('pebble-data');
      if (saved) return deepMerge(DEFAULT_DATA, JSON.parse(saved));
    } catch {}
    return DEFAULT_DATA;
  });

  // Guards against saving stale localStorage data to Gist before the Gist load completes
  const gistReadyRef = useRef(false);

  // Save to localStorage on every change
  useEffect(() => {
    localStorage.setItem('pebble-data', JSON.stringify(data));
  }, [data]);

  // Load from Gist on mount (source of truth for cross-device sync)
  useEffect(() => {
    const { gistId, gistToken } = data.settings;
    if (!gistId || !gistToken) { gistReadyRef.current = true; return; }
    fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${gistToken}`, Accept: 'application/vnd.github+json' }
    })
      .then(r => r.json())
      .then(gist => {
        const content = gist.files?.['pebble.json']?.content;
        if (content) dispatch({ type: 'LOAD_DATA', data: deepMerge(DEFAULT_DATA, JSON.parse(content)) });
      })
      .catch(() => {})
      .finally(() => { gistReadyRef.current = true; });
  }, []); // only on mount

  // Auto-save to Gist (debounced 3s) — waits for initial load, never saves credentials
  useEffect(() => {
    if (!gistReadyRef.current) return;
    const { gistId, gistToken } = data.settings;
    if (!gistId || !gistToken) return;
    const { settings: _omit, ...safeData } = data;
    const t = setTimeout(() => {
      fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: { Authorization: `token ${gistToken}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
        body: JSON.stringify({ files: { 'pebble.json': { content: JSON.stringify(safeData) } } })
      }).catch(() => {});
    }, 3000);
    return () => clearTimeout(t);
  }, [data]);

  // Auto-generate daily picks when API key is present and pick is stale
  useEffect(() => {
    const { apiKey } = data.settings;
    const pickDate = data.notebook.dailyPick.date;
    if (!apiKey || pickDate === todayKey) return;
    const { profile, planner, kitchen, study } = data;
    const ctx = `User: ${profile.name}, vegan: ${profile.vegan}, skin: ${profile.skinType}. Active todos: ${planner.todos.filter(t => !t.done).map(t => t.text).slice(0,5).join(', ')}. Meals: ${Object.values(kitchen.mealPlan).filter(Boolean).join(', ')}. Courses: ${study.courses.map(c => c.name).join(', ')}.`;
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: `User context: ${ctx}\n\nGenerate today's daily quote and recommendation. Reply with ONLY valid JSON, no extra text:\n{"quote":"...","quoteAuthor":"...","rec":{"type":"movie","title":"...","reason":"..."}}\n\nType can be movie, book, recipe, or podcast. Make it personal and relevant to this user's lifestyle.`
        }]
      })
    })
      .then(r => r.json())
      .then(res => {
        const text = res.content?.[0]?.text?.trim();
        if (!text) return;
        const parsed = JSON.parse(stripJsonFences(text));
        dispatch({ type: 'UPDATE_DAILY_PICK', date: todayKey, quote: parsed.quote, quoteAuthor: parsed.quoteAuthor, rec: parsed.rec });
      })
      .catch(() => {});
  }, [data.settings.apiKey, data.notebook.dailyPick.date]);

  return <DataCtx.Provider value={{ data, dispatch }}>{children}</DataCtx.Provider>;
}

/* ── Date Helpers ── */
const today = new Date();
const todayKey = today.toISOString().split('T')[0];
const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const monthNames = ['january','february','march','april','may','june','july','august','september','october','november','december'];

function getStreak(dotsData, category) {
  const dots = dotsData[category] || {};
  let streak = 0;
  const d = new Date(today);
  d.setDate(d.getDate() - 1);
  while (dots[d.toISOString().split('T')[0]]) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

/* ══════════════════════════════════════════
   MARBLE JAR (Navigation)
   ══════════════════════════════════════════ */
const PAGE_NAMES = ['stream', 'planner', 'journal', 'kitchen', 'gym', 'selfcare', 'study', 'tracker', 'career', 'notebook', 'builder'];
const PAGE_LABELS = ['Stream', 'Planner', 'Journal', 'Kitchen', 'Gym', 'Self-Care', 'Study', 'Tracker', 'Career', 'Picks', 'Build'];

function MarbleJar({ open, onClose, onNavigate, currentPage, customSegments, staticPageCount }) {
  if (!open) return null;

  const marbles = [
    { cx: 90,  cy: 118, label: 'Stream', page: 0 },
    { cx: 170, cy: 108, label: 'Planner', page: 1 },
    { cx: 125, cy: 160, label: 'Journal', page: 2 },
    { cx: 68,  cy: 196, label: 'Kitchen', page: 3 },
    { cx: 198, cy: 177, label: 'Gym', page: 4 },
    { cx: 128, cy: 226, label: 'Self-Care', page: 5 },
    { cx: 72,  cy: 260, label: 'Study', page: 6 },
    { cx: 190, cy: 244, label: 'Tracker', page: 7 },
    { cx: 126, cy: 294, label: 'Career', page: 8 },
    { cx: 196, cy: 320, label: 'Picks', page: 9 },
    { cx: 80,  cy: 328, label: 'Build', page: 10 },
  ];

  const segs = customSegments || [];

  return (
    <div className="absolute inset-0 z-50 jar-overlay flex flex-col items-center justify-center" onClick={onClose}>
      <div className="jar-enter flex flex-col items-center" style={{ overflowY: 'auto', maxHeight: '90vh', paddingBottom: 16 }} onClick={e => e.stopPropagation()}>
        <p style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: 'var(--dark)', marginBottom: 4, opacity: 0.9 }}>pebble jar</p>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginBottom: 16 }}>tap a marble to go</p>

        <svg width="280" height="390" viewBox="0 0 280 390" fill="none" className="hand-drawn">
          <path d="M90 60 C92 52, 100 48, 140 46 C180 48, 188 52, 190 60" stroke="var(--primary)" strokeWidth="2.2" fill="none" />
          <path d="M85 64 C120 60, 160 60, 195 64" stroke="var(--primary)" strokeWidth="1.8" fill="none" />
          <path d="M85 64 C78 80, 48 110, 42 148 C36 186, 38 244, 45 282 C52 322, 80 358, 140 361 C200 358, 228 322, 235 282 C242 244, 244 186, 238 148 C232 110, 202 80, 195 64" stroke="var(--primary)" strokeWidth="2.2" fill="var(--card-bg)" />
          <path d="M68 116 C62 152, 60 208, 65 252" stroke="var(--primary)" strokeWidth="0.8" strokeOpacity="0.2" fill="none" />

          {marbles.map((m, i) => {
            const isActive = currentPage === m.page;
            return (
              <g key={i} className="marble-group" onClick={() => { onNavigate(m.page); onClose(); }}>
                <circle cx={m.cx} cy={m.cy} r="22"
                  fill={isActive ? 'var(--primary)' : 'var(--accent-light)'}
                  stroke="var(--primary)" strokeWidth={isActive ? "2.5" : "1.5"}
                  opacity={isActive ? 1 : 0.85} />
                <ellipse cx={m.cx - 5} cy={m.cy - 7} rx="6" ry="3.5" fill="white" opacity={isActive ? 0.3 : 0.2} />
                <text x={m.cx} y={m.cy + 1} textAnchor="middle" dominantBaseline="middle"
                  fill={isActive ? 'white' : 'var(--dark)'}
                  style={{ fontFamily: 'var(--font-body)', fontSize: m.label.length > 7 ? '8px' : '9px', fontWeight: 500, letterSpacing: '0.5px' }}>
                  {m.label.toLowerCase()}
                </text>
              </g>
            );
          })}
        </svg>

        {segs.length > 0 && (
          <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', maxWidth: 260 }}>
            {segs.map((seg, i) => {
              const pageIdx = (staticPageCount || 11) + i;
              const isActive = currentPage === pageIdx;
              return (
                <button key={seg.id} onClick={() => { onNavigate(pageIdx); onClose(); }}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 11, padding: '6px 14px', borderRadius: 999, background: isActive ? 'var(--primary)' : 'var(--accent-light)', color: isActive ? 'white' : 'var(--dark)', border: `1.5px solid ${isActive ? 'var(--primary)' : 'rgba(0,0,0,0.08)'}`, cursor: 'pointer', transition: 'all 0.15s' }}>
                  {seg.name.toLowerCase()}
                </button>
              );
            })}
          </div>
        )}

        <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 12, opacity: 0.5, cursor: 'pointer' }} onClick={onClose}>tap outside to close</p>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PAGE DOTS (vertical indicator)
   ══════════════════════════════════════════ */
function PageDots({ currentPage, totalPages, onDotClick, pageLabels }) {
  return (
    <div className="page-dots">
      {Array.from({ length: totalPages }, (_, i) => (
        <div
          key={i}
          className={`page-dot ${i === currentPage ? 'active' : ''}`}
          onClick={() => onDotClick(i)}
          role="button"
          aria-label={`Go to ${(pageLabels || PAGE_LABELS)[i] || `Page ${i + 1}`}`}
        />
      ))}
    </div>
  );
}

  );
}

/* ── Push Notification Helper ── */
async function sendPushNotification(appId, restKey, title, body) {
  if (!appId || !restKey) return false;
  try {
    const res = await fetch('https://onesignal.com/api/v1/notifications', {
      method: 'POST',
      headers: { 'Authorization': `Basic ${restKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        app_id: appId,
        included_segments: ['All'],
        headings: { en: title },
        contents: { en: body },
      }),
    });
    return res.ok;
  } catch { return false; }
}

function ChatBar() {
  const { data, dispatch } = useContext(DataCtx);
  const { setCardQuiz } = useContext(QuizCtx);
  const [msg, setMsg] = useState('');
  const [chatOpen, setChatOpen] = useState(false);
  const msgsRef = useRef(null);

  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [data.chat.messages]);

  const sendMessage = async () => {
    if (!msg.trim()) return;
    const userText = msg.trim();
    const userMsg = { role: 'user', content: userText, time: new Date().toISOString() };
    dispatch({ type: 'ADD_CHAT_MSG', msg: userMsg });
    setMsg('');

    if (data.settings?.apiKey) {
      try {
        const todayEvents = (data.planner.events[todayKey] || []).map(e => `${e.time} ${e.text}`).join(', ');
        const systemPrompt = `You are Pebble, a warm and intelligent personal life assistant.
Here is everything you know about the user:
- Name: ${data.profile.name}, Vegan: ${data.profile.vegan}, Skin type: ${data.profile.skinType}
- Active todos: ${data.planner.todos.filter(t => !t.done).map(t => t.text).join(', ')}
- Today's events: ${todayEvents || 'none'}
- Today's meals: B: ${data.kitchen.mealPlan.breakfast}, L: ${data.kitchen.mealPlan.lunch}, D: ${data.kitchen.mealPlan.dinner}
- Calorie target: ${data.kitchen.target}
- Skincare AM: ${data.selfCare.skincare.morning.join(' > ')}
- Skincare PM: ${data.selfCare.skincare.evening.join(' > ')}
- Study courses: ${data.study.courses.map(c => c.name + ' (' + c.progress + '%, ' + c.status + ')').join(', ')}
- Grocery list: ${data.kitchen.grocery.map(g => g.text).join(', ')}
- Current workout: ${data.gym.workoutPlan[0]?.name || 'none'}, exercises: ${(data.gym.workoutPlan[0]?.exercises || []).join(', ')}
- Career goal: ${(data.career?.role) || 'not set'}${data.career?.targetDate ? ' by ' + data.career.targetDate : ''}
- Career skills: ${(data.career?.skills || []).map(s => s.name + ' (' + s.progress + '%)').join(', ') || 'none'}
- Job applications: ${(data.career?.applications || []).map(a => a.company + ' - ' + a.role + ' (' + a.status + ')').join(', ') || 'none'}
Always be warm, concise, and specific to this user.

When the user asks you to add, update, or change their data, append an <actions> block at the very end of your reply (never inline). Format:
<actions>[{"type":"ACTION","key":"value"}]</actions>

Available actions:
- ADD_SKINCARE_STEP: {type, routine ("morning"|"evening"), step}
- REMOVE_SKINCARE_STEP: {type, routine, index}
- ADD_TODO: {type, text, priority ("high"|"medium"|"low")}
- DELETE_TODO: {type, id}
- ADD_GROCERY: {type, text}
- LOG_WORKOUT: {type, workout, notes}
- ADD_EXERCISE: {type, exercise}
- REMOVE_EXERCISE: {type, index}
- UPDATE_WORKOUT_NAME: {type, name}
- ADD_STUDY_SESSION: {type, topic, duration}
- ADD_COURSE: {type, name}
- REMOVE_COURSE: {type, index}
- UPDATE_COURSE_STATUS: {type, index, status ("in-progress"|"completed"|"paused")}
- UPDATE_MEAL_NAME: {type, meal ("breakfast"|"lunch"|"dinner"), name}
- UPDATE_CALORIES: {type, meal, amount}
- TOGGLE_DOT: {type, category ("workout"|"skincare"|"study"|"meals"|"water"), date}
- ADD_EVENT: {type, date ("YYYY-MM-DD"), time ("HH:MM", optional), text}
- DELETE_EVENT: {type, date, index}
- SET_CAREER_GOAL: {type, role, targetDate}
- ADD_CAREER_SKILL: {type, name}
- UPDATE_CAREER_SKILL: {type, index, progress}
- ADD_JOB_APPLICATION: {type, company, role}
- UPDATE_JOB_STATUS: {type, index, status ("applied"|"interviewing"|"offered"|"rejected")}
- ADD_CAREER_EXPERIENCE: {type, topic}
- SEND_NOTIFICATION: {type, title, body} — send a push notification to the user's phone (use for reminders, streak alerts, deadline nudges, or when the user asks you to remind them of something)

You can include multiple actions in the array. Only include <actions> when explicitly modifying data. Today's date is ${todayKey}.

SPECIAL: When the user asks you to help BUILD a plan (gym routine, skincare routine, meal plan, study schedule, etc.), instead of guessing, trigger a card quiz to gather their preferences first:
- START_CARD_QUIZ: {type:"START_CARD_QUIZ", title:"...", cards:[{question:"...", options:["..."], key:"..."}, ...]}
- Each card has a question + options array (user taps one) OR no options (free text)
- Max 5 cards. Keep questions short. After the quiz, Pebble builds the plan automatically.
- Use this for: "help me make a gym plan", "build my skincare routine", "plan my meals", "create a study schedule", "make me a routine", "help me plan my career", "what skills do I need", "build my career plan"`;

        const history = data.chat.messages.slice(-20).map(m => ({ role: m.role, content: m.content }));

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': data.settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: systemPrompt, messages: [...history, { role: 'user', content: userText }] }),
        });
        const json = await res.json();
        const raw = json.content?.[0]?.text || 'hmm, something went wrong.';

        // Extract and execute any actions
        const actionsMatch = raw.match(/<actions>([\s\S]*?)<\/actions>/);
        const cleanText = raw.replace(/<actions>[\s\S]*?<\/actions>/, '').trim();
        if (actionsMatch) {
          try {
            const actions = JSON.parse(actionsMatch[1]);
            actions.forEach(action => {
              if (action.type === 'START_CARD_QUIZ') {
                setCardQuiz(action);
              } else if (action.type === 'SEND_NOTIFICATION') {
                sendPushNotification(data.settings?.oneSignalAppId, data.settings?.oneSignalRestKey, action.title, action.body);
              } else {
                dispatch(action);
              }
            });
          } catch {}
        }

        dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: cleanText, time: new Date().toISOString() } });
      } catch {
        dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: "couldn't reach pebble's brain right now. try again?", time: new Date().toISOString() } });
      }
    } else {
      dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: 'add your claude API key in settings to chat with me!', time: new Date().toISOString() } });
    }
  };

  return (
    <>
      {chatOpen && data.chat.messages.length > 0 && (
        <div ref={msgsRef} className="absolute bottom-14 left-0 right-0 z-40" style={{ maxHeight: 280, overflowY: 'auto', background: 'color-mix(in srgb, var(--bg) 95%, transparent)', backdropFilter: 'blur(12px)', borderTop: '1px solid rgba(0,0,0,0.06)', padding: '12px 16px' }}>
          {data.chat.messages.slice(-10).map((m, i) => (
            <div key={i} className={`mb-2 flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div style={{ maxWidth: '80%', padding: '8px 12px', borderRadius: 16,
                background: m.role === 'user' ? 'var(--primary)' : 'var(--card-bg)',
                color: m.role === 'user' ? 'white' : 'var(--dark)',
                fontFamily: 'var(--font-body)', fontSize: 12, lineHeight: 1.5,
                border: m.role === 'assistant' ? '1px solid rgba(0,0,0,0.06)' : 'none' }}>{m.content}</div>
            </div>
          ))}
        </div>
      )}
      <div className="chat-bar border-t px-4 py-2.5 flex items-center gap-2 flex-shrink-0" style={{ borderColor: 'rgba(0,0,0,0.04)' }}>
        <input type="text" value={msg} onChange={e => setMsg(e.target.value)}
          placeholder="talk to pebble..."
          className="flex-1 outline-none"
          style={{ background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 999, padding: '10px 16px', fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', transition: 'border-color 0.15s' }}
          onFocus={e => { e.target.style.borderColor = 'var(--primary)'; setChatOpen(true); }}
          onBlur={e => { e.target.style.borderColor = 'rgba(0,0,0,0.06)'; setTimeout(() => setChatOpen(false), 300); }}
          onKeyDown={e => e.key === 'Enter' && sendMessage()} />
        <button className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0"
          style={{ background: 'var(--primary)', opacity: msg.trim() ? 1 : 0.4, transition: 'opacity 0.15s' }}
          onClick={sendMessage} disabled={!msg.trim()}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </>
  );
}

/* ── Page 1: Planner ── */
function PlannerPage() {
  const { data, dispatch } = useContext(DataCtx);
  const [newTask, setNewTask] = useState('');
  const [filter, setFilter] = useState('all');
  const [selectedDay, setSelectedDay] = useState(todayKey);
  const [newEvent, setNewEvent] = useState('');
  const [newEventTime, setNewEventTime] = useState('');
  const todos = data.planner.todos;
  const filtered = filter === 'all' ? todos : filter === 'active' ? todos.filter(t => !t.done) : todos.filter(t => t.done);
  const doneCount = todos.filter(t => t.done).length;

  // Build week: Mon–Sun containing today
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7)); // Monday
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d;
  });
  const dayLetters = ['M','T','W','T','F','S','S'];

  const addTask = () => {
    if (!newTask.trim()) return;
    dispatch({ type: 'ADD_TODO', text: newTask.trim(), priority: 'medium' });
    setNewTask('');
  };

  const addEvent = () => {
    if (!newEvent.trim()) return;
    dispatch({ type: 'ADD_EVENT', date: selectedDay, time: newEventTime, text: newEvent.trim() });
    setNewEvent('');
    setNewEventTime('');
  };

  const selectedEvents = data.planner.events[selectedDay] || [];

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 8 }}>planner</p>

          {/* Week calendar */}
          <div className="glass-card px-3 py-3 mb-3">
            <div className="flex justify-between mb-2">
              {weekDays.map((d, i) => {
                const key = d.toISOString().split('T')[0];
                const isToday = key === todayKey;
                const isSelected = key === selectedDay;
                const hasEvents = (data.planner.events[key] || []).length > 0;
                return (
                  <div key={i} className="flex flex-col items-center gap-1 cursor-pointer" onClick={() => setSelectedDay(key)}
                    style={{ flex: 1 }}>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>{dayLetters[i]}</span>
                    <div style={{ width: 26, height: 26, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: isSelected ? 'var(--primary)' : isToday ? 'var(--primary-light)' : 'transparent',
                      border: isToday && !isSelected ? '1.5px solid var(--primary)' : 'none' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: isSelected ? 'white' : isToday ? 'var(--primary)' : 'var(--dark)', fontWeight: isToday ? 600 : 400 }}>{d.getDate()}</span>
                    </div>
                    <div style={{ width: 4, height: 4, borderRadius: '50%', background: hasEvents ? 'var(--accent)' : 'transparent' }}/>
                  </div>
                );
              })}
            </div>
            {/* Events for selected day */}
            {selectedEvents.length > 0 && (
              <div className="space-y-1 mt-2 pt-2" style={{ borderTop: '1px solid rgba(0,0,0,0.05)' }}>
                {selectedEvents.map((ev, i) => (
                  <div key={i} className="flex items-center gap-2">
                    {ev.time && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--primary)', minWidth: 36 }}>{ev.time}</span>}
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)', flex: 1 }}>{ev.text}</span>
                    <button onClick={() => dispatch({ type: 'DELETE_EVENT', date: selectedDay, index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 2 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                ))}
              </div>
            )}
            <div className="flex items-center gap-1.5 mt-2 pt-2" style={{ borderTop: selectedEvents.length > 0 ? 'none' : '1px solid rgba(0,0,0,0.05)' }}>
              <input type="time" value={newEventTime} onChange={e => setNewEventTime(e.target.value)}
                style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', background: 'transparent', border: 'none', outline: 'none', width: 80 }} />
              <input type="text" value={newEvent} onChange={e => setNewEvent(e.target.value)}
                placeholder="add event..." onKeyDown={e => e.key === 'Enter' && addEvent()}
                className="flex-1 outline-none"
                style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
              <button onClick={addEvent} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newEvent.trim() ? 1 : 0.3 }}>+</button>
            </div>
          </div>

          <div className="flex gap-2 mb-3">
            {['all', 'active', 'done'].map(f => (
              <button key={f} onClick={() => setFilter(f)}
                style={{ fontFamily: 'var(--font-body)', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1,
                  padding: '4px 10px', borderRadius: 999, border: 'none', cursor: 'pointer',
                  background: filter === f ? 'var(--primary)' : 'var(--primary-light)',
                  color: filter === f ? 'white' : 'var(--primary)' }}>{f}</button>
            ))}
            <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginLeft: 'auto', alignSelf: 'center' }}>{doneCount}/{todos.length}</span>
          </div>

          <div className="glass-card px-4 py-3 space-y-2.5 flex-1 overflow-y-auto" style={{ maxHeight: 240 }}>
            {filtered.map(task => (
              <div key={task.id} className="flex items-center gap-3">
                <div className={`checkbox ${task.done ? 'done' : ''}`} onClick={() => dispatch({ type: 'TOGGLE_TODO', id: task.id })}>
                  {task.done && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                </div>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: task.done ? 'var(--muted)' : 'var(--dark)', textDecoration: task.done ? 'line-through' : 'none', flex: 1 }}>{task.text}</span>
                {task.priority === 'high' && !task.done && <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: 'var(--danger)' }}/>}
                {task.priority === 'medium' && !task.done && <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: 'var(--accent)' }}/>}
                <button onClick={() => dispatch({ type: 'DELETE_TODO', id: task.id })} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, opacity: 0.3 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                </button>
              </div>
            ))}
            {filtered.length === 0 && <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: 20 }}>{filter === 'done' ? 'nothing completed yet' : filter === 'active' ? 'all done!' : 'no tasks yet'}</p>}
          </div>

          <div className="glass-card px-3 py-2.5 mt-3 flex items-center gap-2">
            <input type="text" value={newTask} onChange={e => setNewTask(e.target.value)}
              placeholder="add a task..." onKeyDown={e => e.key === 'Enter' && addTask()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
            <button onClick={addTask} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontFamily: 'var(--font-body)', fontSize: 18, lineHeight: 1, opacity: newTask.trim() ? 1 : 0.3 }}>+</button>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}
