<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #E8E4DE; font-family: Calibri, sans-serif; }

  /* ── Theme CSS Variables ── */
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --primary: #4A90A4;
    --primary-light: rgba(74,144,164,0.1);
    --accent: #C9A96E;
    --accent-light: rgba(201,169,110,0.1);
    --dark: #1A1A2E;
    --muted: #6B7280;
    --danger: #E57373;
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(255,255,255,0.6);
    --card-shadow: rgba(26,26,46,0.04);
    --font-display: Georgia, serif;
    --font-body: Calibri, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --cloud-sky: none;
    --sky-height: 0px;
    --card-radius: 16px;
    --card-border-w: 1px;
  }

  .phone-frame {
    width: 375px; max-height: 812px; height: 100vh;
    background: var(--bg); position: relative; overflow: hidden;
    margin: 0 auto; border-radius: 0;
    display: flex; flex-direction: column;
  }
  @media (min-width: 500px) {
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
    .phone-frame { border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 8px var(--dark); max-height: 812px; height: 812px; }
  }

  /* ── Swipe Container ── */
  .swipe-container {
    flex: 1; overflow-y: auto; scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  }
  .swipe-container::-webkit-scrollbar { display: none; }

  .swipe-page-wrap {
    min-height: 100%; scroll-snap-align: start;
  }
  .swipe-page {
    min-height: 100%;
    display: flex; flex-direction: column;
    padding: var(--spacing) 20px 20px;
    position: relative;
  }

  /* ── Page Dots ── */
  .page-dots {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .page-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); opacity: 0.25;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .page-dot.active {
    opacity: 1; background: var(--primary);
    width: 6px; height: 16px; border-radius: 3px;
  }

  /* ── Cloud sky header ── */
  .cloud-sky { position: relative; }
  .cloud-sky::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: var(--sky-height);
    background: var(--cloud-sky);
    pointer-events: none;
    z-index: 0;
  }
  .cloud-sky > * { position: relative; z-index: 1; }

  /* ── Glass Card ── */
  .glass-card {
    background: var(--card-bg);
    border: var(--card-border-w) solid var(--card-border);
    border-radius: var(--card-radius);
    box-shadow: 0 2px 12px var(--card-shadow);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }

  /* ── Dots ── */
  .dot { width: 10px; height: 10px; border-radius: 50%; border: var(--stroke-width, 1.5px) solid var(--accent); background: transparent; flex-shrink: 0; }
  .dot.filled { background: var(--accent); border-color: var(--accent); }
  .dot.today { border: 2px solid var(--primary); box-shadow: 0 0 0 2px rgba(74,144,164,0.25); }
  .dot.today.filled { background: var(--primary); border-color: var(--primary); }

  .checkbox { width: 18px; height: 18px; border-radius: var(--checkbox-shape); border: var(--stroke-width, 1.5px) solid var(--primary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; background: var(--btn-fill); }
  .checkbox.done { background: var(--btn-fill-done, var(--primary)); border-color: var(--primary); }

  .chat-bar { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: color-mix(in srgb, var(--bg) 92%, transparent); }

  /* ── Hand-drawn style ── */
  .hand-drawn { stroke-linecap: round; stroke-linejoin: round; }

  /* ── Marble Jar Overlay ── */
  .jar-overlay {
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    background: color-mix(in srgb, var(--bg) 85%, transparent);
  }
  .jar-enter { animation: fadeUp 0.3s ease-out; }
  .settings-enter { animation: slideUp 0.2s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
  @keyframes journalFlipLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30px); opacity: 0; } }
  @keyframes journalFlipRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(30px); opacity: 0; } }

  /* ── Marble hover ── */
  .marble-group { cursor: pointer; transition: transform 0.15s ease; }
  .marble-group:hover { transform: scale(1.08); }
  .marble-group:active { transform: scale(0.95); }

  /* ── Theme swatch ── */
  .theme-swatch {
    width: 100%; border-radius: var(--border-radius, 14px); padding: var(--card-padding, 12px) 14px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; gap: var(--spacing, 12px);
  }
  .theme-swatch.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,144,164,0.15); }
  .theme-swatch:hover:not(.active) { border-color: rgba(0,0,0,0.1); }
  .swatch-dots { display: flex; gap: 4px; }
  .swatch-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); }

  /* ── Page title (coquette script style) ── */
  .page-title {
    font-family: var(--font-display); font-size: var(--heading-size, 22px); color: var(--dark);
    margin-bottom: var(--spacing, 12px); line-height: 1.2;
  }

  @media (prefers-reduced-motion: reduce) {
    .jar-enter, .settings-enter { animation: none; }
    .marble-group, .checkbox, .theme-swatch, .page-dot { transition: none; }
    .swipe-container { scroll-behavior: auto; }
  }

  /* ── Cloud image overlay on cards (only when cloud theme active) ── */
  .cloud-cards .glass-card {
    position: relative;
    overflow: hidden;
  }
  .cloud-cards .glass-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image: var(--card-cloud-img, none);
    background-size: cover; background-position: center;
    opacity: var(--card-cloud-opacity, 0);
    pointer-events: none;
    border-radius: inherit;
    z-index: 0;
  }
  .cloud-cards .glass-card > * { position: relative; z-index: 1; }

  /* ── Playground element overrides (only active when vars are set) ── */
  .glass-card [class*="title"], .card-title { color: var(--card-title-color, inherit); }
  .glass-card [class*="meta"] { color: var(--card-meta-color, inherit); }

  /* ══════════════════════════════════════════
     PER-THEME UNIQUE VISUAL ELEMENTS
     ══════════════════════════════════════════ */

  /* ── Midnight Mode: terminal aesthetic ── */
  [data-theme="midnightMode"] .glass-card {
    border-left: 3px solid #34D399;
    border-top: none; border-right: none; border-bottom: none;
    border-radius: 4px 8px 8px 4px;

  /* ── Neon Dusk: glow effects ── */
  [data-theme="neonDusk"] .glass-card {

  /* ── Butter & Ink: bold brutalist borders ── */
  [data-theme="butterInk"] .glass-card {

  /* ── Matcha Zen: minimal, serene, Japanese ── */
  [data-theme="matchaZen"] .glass-card {

  /* ── Candy Pop: playful dashed borders ── */
  [data-theme="candyPop"] .glass-card {

  }
  [data-theme="candyPop"] .page-title {

  /* ── Ink Wash: sumi-e minimalist ── */
  [data-theme="inkWash"] .glass-card {
    border: none;
    border-bottom: 1px solid rgba(58,58,58,0.15);
    border-radius: 0;

  }
  [data-theme="inkWash"] .page-title {
    font-size: 26px !important;

    letter-spacing: 1px;
    opacity: 0.85;
  }
  [data-theme="inkWash"] .swipe-page::before {
    content: '';
    position: absolute; top: 16px; left: 20px;
    width: 40px; height: 2px;
    background: linear-gradient(90deg, #3A3A3A, transparent);
    opacity: 0.4;
  }
  [data-theme="inkWash"] .swipe-page::after {
    content: '';
    position: absolute; bottom: 16px; right: 20px;
    width: 40px; height: 2px;
    background: linear-gradient(270deg, #8A7A6A, transparent);

  /* ── Cherry Blossom: soft, petal-like ── */
  [data-theme="cherryBlossom"] .glass-card {
    border: 1px solid rgba(158,43,94,0.1);
    border-radius: 22px;
    box-shadow: 0 4px 20px rgba(158,43,94,0.06), 0 0 0 3px rgba(232,160,184,0.08);
  }
  [data-theme="cherryBlossom"] .page-title {

  }
  [data-theme="cherryBlossom"] .page-title::before {
    content: '❀ ';

  /* ── Theme Deco SVG positioning ── */
  .theme-deco {

  }
  .theme-deco-top { top: 8px; right: 16px; }
  .theme-deco-bottom { bottom: 8px; left: 16px; }

  /* ══════════════════════════════════════════
     VINTAGE TYPOGRAPHY THEMES
     ══════════════════════════════════════════ */

  /* ── Vintage Letterpress: circus poster, bold condensed ── */

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext, useReducer } = React;

/* ══════════════════════════════════════════

const THEMES = {
  coquette: {
    name: 'Coquette',
    desc: 'Coral & red, hand-drawn vintage',
    vars: {
      '--bg': '#F5E6E0', '--surface': '#FFF8F5', '--primary': '#C44B5C', '--primary-light': 'rgba(196,75,92,0.1)',

  monet: {

/* ── Custom themes from playground ── */
function getCustomThemes() {
  try { return JSON.parse(localStorage.getItem('pebble-app-custom-themes') || '[]'); } catch { return []; }
}
function saveCustomThemes(themes) {
  localStorage.setItem('pebble-app-custom-themes', JSON.stringify(themes));
}

/* ══════════════════════════════════════════
   THEME CONTEXT
   ══════════════════════════════════════════ */
const ThemeCtx = createContext();

function ThemeProvider({ children }) {
  const [themeId, setThemeId] = useState(() => {
    const saved = localStorage.getItem('pebble-theme');
    if (saved) return saved;
    // Fallback: check credentials backup (mobile localStorage purge recovery)
    try { const creds = JSON.parse(localStorage.getItem('pebble-credentials') || '{}'); if (creds.theme) return creds.theme; } catch {}
    return 'sage';
  });
  const [customThemes, setCustomThemes] = useState(getCustomThemes);

  useEffect(() => {
    const check = () => setCustomThemes(getCustomThemes());
    window.addEventListener('focus', check);
    return () => window.removeEventListener('focus', check);
  }, []);

  /* Default values for ALL CSS variables — reset before each theme switch */
  const CSS_DEFAULTS = {
    '--bg': '#F5F3EF', '--surface': '#FFFFFF', '--primary': '#4A90A4', '--primary-light': 'rgba(74,144,164,0.1)',
    '--accent': '#C9A96E', '--accent-light': 'rgba(201,169,110,0.1)', '--dark': '#1A1A2E', '--muted': '#6B7280',
    '--danger': '#E57373', '--card-bg': 'rgba(255,255,255,0.85)', '--card-border': 'rgba(255,255,255,0.6)',
    '--card-shadow': 'rgba(26,26,46,0.04)', '--font-display': 'Georgia, serif', '--font-body': 'Calibri, sans-serif',
    '--font-mono': "'JetBrains Mono', monospace", '--cloud-sky': 'none', '--sky-height': '0px',
    '--card-radius': '16px', '--card-border-w': '1px',
    // Typography sizes
    '--brand-size': '35px', '--heading-size': '18px', '--body-size': '12px',
    '--label-size': '9px', '--stat-size': '27px', '--icon-size': '20px',
    // Shapes & strokes
    '--border-radius': '14px', '--checkbox-shape': '50%',
    '--btn-fill': 'transparent', '--btn-fill-done': 'var(--primary)',
    '--stroke-width': '1.5', '--icon-stroke': '1.8',
    // Spacing
    '--card-padding': '16px', '--spacing': '12px',
    // Tab
    '--tab-active-bg': 'var(--primary)',
  };

  /* Track extra vars from playground themes so we can clean them up on switch */
  const extraVarsRef = useRef([]);

  const applyTheme = useCallback((id) => {
    let theme = THEMES[id];
    if (!theme) {
      const customs = getCustomThemes();
      theme = customs.find(ct => ct.id === id);
    }
    if (!theme) { id = 'sage'; theme = THEMES.sage; }

    const root = document.documentElement;

    /* Clear any extra element-override vars from previous playground theme */
    extraVarsRef.current.forEach(v => root.style.removeProperty(v));
    extraVarsRef.current = [];

    /* Reset ALL vars to defaults first so old theme values don't persist */
    Object.entries(CSS_DEFAULTS).forEach(([k, v]) => root.style.setProperty(k, v));

    let vars = { ...theme.vars };

    if (theme.monetRotation) {
      const day = new Date().getDay();
      const palette = MONET_PALETTES[day];
      vars['--primary'] = palette.primary;
      vars['--accent'] = palette.accent;
      vars['--bg'] = palette.bg;
      vars['--dark'] = palette.dark;
      vars['--primary-light'] = `${palette.primary}1A`;
      vars['--accent-light'] = `${palette.accent}1A`;
      vars['--cloud-sky'] = palette.sky;
      vars['--sky-height'] = '200px';
    }

    Object.entries(vars).forEach(([k, v]) => {
      root.style.setProperty(k, v);
      if (!(k in CSS_DEFAULTS)) extraVarsRef.current.push(k);
    });

    // Apply cloud image overlay from playground themes
    const phoneFrame = document.querySelector('.phone-frame');
    if (phoneFrame) {
      // Clear previous cloud image
      phoneFrame.style.backgroundImage = '';
      phoneFrame.style.backgroundSize = '';
      phoneFrame.style.backgroundPosition = '';
      phoneFrame.classList.remove('cloud-cards');
      root.style.removeProperty('--card-cloud-img');
      root.style.removeProperty('--card-cloud-opacity');

      if (theme.cloudImg && theme.cloudImg.src) {
        const ci = theme.cloudImg;
        const overlayAlpha = 1 - (ci.opacity || 0.3);
        if (ci.target === 'bg' || ci.target === 'both') {
          phoneFrame.style.backgroundImage = `linear-gradient(rgba(255,255,255,${overlayAlpha}), rgba(255,255,255,${overlayAlpha})), url(${ci.src})`;
          phoneFrame.style.backgroundSize = 'cover';
          phoneFrame.style.backgroundPosition = 'center';
        }
        if (ci.target === 'cards' || ci.target === 'both') {
          phoneFrame.classList.add('cloud-cards');
          root.style.setProperty('--card-cloud-img', `url(${ci.src})`);
          root.style.setProperty('--card-cloud-opacity', ci.opacity || 0.3);
        }
      }
    }

    document.body.style.background = '#E8E4DE';
    localStorage.setItem('pebble-theme', id);
    // Also save in credentials backup so theme survives mobile localStorage purges
    try { const creds = JSON.parse(localStorage.getItem('pebble-credentials') || '{}'); creds.theme = id; localStorage.setItem('pebble-credentials', JSON.stringify(creds)); } catch {}
    setThemeId(id);
  }, []);

  const deleteCustomTheme = useCallback((id) => {
    const updated = getCustomThemes().filter(ct => ct.id !== id);
    saveCustomThemes(updated);
    setCustomThemes(updated);
    if (themeId === id) applyTheme('sage');
  }, [themeId, applyTheme]);

  useEffect(() => { applyTheme(themeId); }, []);

  const monetPainting = themeId === 'monet' ? MONET_PALETTES[new Date().getDay()].name : null;

  return (
    <ThemeCtx.Provider value={{ themeId, setTheme: applyTheme, monetPainting, customThemes, deleteCustomTheme }}>
      {children}
    </ThemeCtx.Provider>
  );
}

let _nextId = 100;

function deepMerge(target, source) {
  const result = { ...target };
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key] && typeof target[key] === 'object') {
      result[key] = deepMerge(target[key], source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

function stripJsonFences(text) {
  return text.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '');
}

function dataReducer(state, action) {
  switch (action.type) {
    case 'TOGGLE_TODO': {
      const todos = state.planner.todos.map(t => t.id === action.id ? { ...t, done: !t.done } : t);
      return { ...state, planner: { ...state.planner, todos } };
    }
    case 'ADD_TODO': {
      const todo = { id: _nextId++, text: action.text, priority: action.priority || 'medium', done: false };
      return { ...state, planner: { ...state.planner, todos: [...state.planner.todos, todo] } };
    }
    case 'DELETE_TODO': {
      return { ...state, planner: { ...state.planner, todos: state.planner.todos.filter(t => t.id !== action.id) } };
    }
    case 'ADD_NOTE': {
      const note = { title: action.title, body: action.body || '', date: new Date().toISOString().split('T')[0] };
      return { ...state, planner: { ...state.planner, notes: [...state.planner.notes, note] } };
    }
    case 'DELETE_NOTE': {
      return { ...state, planner: { ...state.planner, notes: state.planner.notes.filter((_, i) => i !== action.index) } };
    }
    case 'TOGGLE_DOT': {
      const cat = { ...(state.dots[action.category] || {}) };
      if (cat[action.date]) delete cat[action.date]; else cat[action.date] = true;
      return { ...state, dots: { ...state.dots, [action.category]: cat } };
    }
    case 'UPDATE_MEAL_NAME': {
      return { ...state, kitchen: { ...state.kitchen, mealPlan: { ...state.kitchen.mealPlan, [action.meal]: action.name } } };
    }
    case 'UPDATE_CALORIES': {
      return { ...state, kitchen: { ...state.kitchen, calorieLog: { ...state.kitchen.calorieLog, [action.meal]: Number(action.amount) || 0 } } };
    }
    case 'UPDATE_CALORIE_TARGET': {
      return { ...state, kitchen: { ...state.kitchen, target: Number(action.value) || state.kitchen.target } };
    }
    case 'ADD_GROCERY': {
      return { ...state, kitchen: { ...state.kitchen, grocery: [...state.kitchen.grocery, { text: action.text, done: false }] } };
    }
    case 'TOGGLE_GROCERY': {
      const grocery = state.kitchen.grocery.map((g, i) => i === action.index ? { ...g, done: !g.done } : g);
      return { ...state, kitchen: { ...state.kitchen, grocery } };
    }
    case 'DELETE_GROCERY': {
      return { ...state, kitchen: { ...state.kitchen, grocery: state.kitchen.grocery.filter((_, i) => i !== action.index) } };
    }
    case 'SAVE_JOURNAL': {
      const entries = [...state.journal.entries];
      const idx = entries.findIndex(e => e.date === action.date);
      if (idx >= 0) entries[idx] = { ...entries[idx], body: action.body, mood: action.mood };
      else entries.unshift({ date: action.date, body: action.body, mood: action.mood || '' });
      return { ...state, journal: { entries } };
    }
    case 'ADD_SKINCARE_STEP': {
      const steps = [...state.selfCare.skincare[action.routine], action.step];
      return { ...state, selfCare: { ...state.selfCare, skincare: { ...state.selfCare.skincare, [action.routine]: steps } } };
    }
    case 'REMOVE_SKINCARE_STEP': {
      const steps = state.selfCare.skincare[action.routine].filter((_, i) => i !== action.index);
      return { ...state, selfCare: { ...state.selfCare, skincare: { ...state.selfCare.skincare, [action.routine]: steps } } };
    }
    case 'ADD_STUDY_SESSION': {
      const session = { date: new Date().toISOString().split('T')[0], topic: action.topic, duration: action.duration };
      return { ...state, study: { ...state.study, sessions: [session, ...state.study.sessions] } };
    }
    case 'UPDATE_COURSE_PROGRESS': {
      const courses = state.study.courses.map((c, i) => i === action.index ? { ...c, progress: action.progress } : c);
      return { ...state, study: { ...state.study, courses } };
    }
    case 'LOG_WORKOUT': {
      const session = { date: new Date().toISOString().split('T')[0], workout: action.workout, notes: action.notes || '' };
      return { ...state, gym: { ...state.gym, sessions: [session, ...state.gym.sessions] } };
    }
    case 'SAVE_PICK': {
      const save = { type: action.pickType, title: action.title, date: new Date().toISOString().split('T')[0] };
      return { ...state, notebook: { ...state.notebook, saves: [save, ...state.notebook.saves] } };
    }
    case 'UPDATE_DAILY_PICK': {
      return { ...state, notebook: { ...state.notebook, dailyPick: { date: action.date, quote: action.quote, quoteAuthor: action.quoteAuthor, funFact: action.funFact || '', rec: action.rec } } };
    }
    case 'ADD_EVENT': {
      const dateEvents = [...(state.planner.events[action.date] || []), { time: action.time || '', text: action.text }];
      return { ...state, planner: { ...state.planner, events: { ...state.planner.events, [action.date]: dateEvents } } };
    }
    case 'DELETE_EVENT': {
      const evs = (state.planner.events[action.date] || []).filter((_, i) => i !== action.index);
      const events = { ...state.planner.events };
      if (evs.length) events[action.date] = evs; else delete events[action.date];
      return { ...state, planner: { ...state.planner, events } };
    }
    case 'UPDATE_COURSE_STATUS': {
      const courses = state.study.courses.map((c, i) => i === action.index ? { ...c, status: action.status } : c);
      return { ...state, study: { ...state.study, courses } };
    }
    case 'ADD_COURSE': {
      return { ...state, study: { ...state.study, courses: [...state.study.courses, { name: action.name, status: 'in-progress', progress: 0 }] } };
    }
    case 'REMOVE_COURSE': {
      return { ...state, study: { ...state.study, courses: state.study.courses.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_EXERCISE': {
      const plan0 = { ...state.gym.workoutPlan[0], exercises: [...(state.gym.workoutPlan[0]?.exercises || []), action.exercise] };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'REMOVE_EXERCISE': {
      const plan0 = { ...state.gym.workoutPlan[0], exercises: state.gym.workoutPlan[0].exercises.filter((_, i) => i !== action.index) };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'UPDATE_WORKOUT_NAME': {
      const plan0 = { ...state.gym.workoutPlan[0], name: action.name };
      return { ...state, gym: { ...state.gym, workoutPlan: [plan0, ...state.gym.workoutPlan.slice(1)] } };
    }
    case 'SET_CAREER_GOAL': {
      return { ...state, career: { ...state.career, role: action.role, targetDate: action.targetDate || state.career.targetDate } };
    }
    case 'ADD_CAREER_SKILL': {
      return { ...state, career: { ...state.career, skills: [...state.career.skills, { name: action.name, progress: 0 }] } };
    }
    case 'UPDATE_CAREER_SKILL': {
      const skills = state.career.skills.map((s, i) => i === action.index ? { ...s, progress: action.progress } : s);
      return { ...state, career: { ...state.career, skills } };
    }
    case 'REMOVE_CAREER_SKILL': {
      return { ...state, career: { ...state.career, skills: state.career.skills.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_JOB_APPLICATION': {
      const app = { company: action.company, role: action.role, date: new Date().toISOString().split('T')[0], status: 'applied' };
      return { ...state, career: { ...state.career, applications: [app, ...state.career.applications] } };
    }
    case 'UPDATE_JOB_STATUS': {
      const appStatuses = ['applied', 'interviewing', 'offered', 'rejected'];
      const applications = state.career.applications.map((a, i) => {
        if (i !== action.index) return a;
        const next = action.status || appStatuses[(appStatuses.indexOf(a.status) + 1) % appStatuses.length];
        return { ...a, status: next };
      });
      return { ...state, career: { ...state.career, applications } };
    }
    case 'REMOVE_JOB_APPLICATION': {
      return { ...state, career: { ...state.career, applications: state.career.applications.filter((_, i) => i !== action.index) } };
    }
    case 'ADD_CAREER_EXPERIENCE': {
      const exp = { date: new Date().toISOString().split('T')[0], topic: action.topic };
      return { ...state, career: { ...state.career, experiences: [exp, ...state.career.experiences] } };
    }
    case 'ADD_SEGMENT': {
      const seg = { id: _nextId++, name: action.name, features: action.features, entries: [], checks: [], note: '', bars: [], dots: {} };
      return { ...state, segments: [...(state.segments || []), seg] };
    }
    case 'REMOVE_SEGMENT': {
      return { ...state, segments: (state.segments || []).filter(s => s.id !== action.id) };
    }
    case 'ADD_SEGMENT_ENTRY': {
      const entry = { date: new Date().toISOString().split('T')[0], text: action.text };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, entries: [entry, ...(s.entries || [])] } : s);
      return { ...state, segments };
    }
    case 'ADD_SEGMENT_CHECK': {
      const check = { id: _nextId++, text: action.text, done: false };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: [...(s.checks || []), check] } : s);
      return { ...state, segments };
    }
    case 'TOGGLE_SEGMENT_CHECK': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: (s.checks || []).map(c => c.id === action.checkId ? { ...c, done: !c.done } : c) } : s);
      return { ...state, segments };
    }
    case 'REMOVE_SEGMENT_CHECK': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, checks: (s.checks || []).filter(c => c.id !== action.checkId) } : s);
      return { ...state, segments };
    }
    case 'UPDATE_SEGMENT_NOTE': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, note: action.note } : s);
      return { ...state, segments };
    }
    case 'ADD_SEGMENT_BAR': {
      const bar = { id: _nextId++, label: action.label, value: 0 };
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: [...(s.bars || []), bar] } : s);
      return { ...state, segments };
    }
    case 'UPDATE_SEGMENT_BAR': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: (s.bars || []).map(b => b.id === action.barId ? { ...b, value: action.value } : b) } : s);
      return { ...state, segments };
    }
    case 'REMOVE_SEGMENT_BAR': {
      const segments = (state.segments || []).map(s => s.id === action.id ? { ...s, bars: (s.bars || []).filter(b => b.id !== action.barId) } : s);
      return { ...state, segments };
    }
    case 'TOGGLE_SEGMENT_DOT': {
      const segments = (state.segments || []).map(s => {
        if (s.id !== action.id) return s;
        const dots = { ...(s.dots || {}) };
        if (dots[action.date]) delete dots[action.date]; else dots[action.date] = true;
        return { ...s, dots };
      });
      return { ...state, segments };
    }
    case 'ADD_CHAT_MSG': {
      return { ...state, chat: { messages: [...state.chat.messages, action.msg] } };
    }
    case 'ADD_MEMORY_PENDING': {
      const already = (state.memory?.pending || []).some(p => p.label === action.item.label);
      if (already) return state;
      return { ...state, memory: { pending: [...(state.memory?.pending || []), action.item] } };
    }
    case 'DISMISS_MEMORY': {
      return { ...state, memory: { pending: (state.memory?.pending || []).filter(p => p.id !== action.id) } };
    }
    case 'ADD_PLAN': {
      const plan = { id: Date.now(), title: action.title, steps: (action.steps || []).map((s, i) => ({ id: i, text: s, done: false })), createdAt: todayKey };
      return { ...state, plans: [plan, ...(state.plans || [])] };
    }
    case 'TOGGLE_PLAN_STEP': {
      return { ...state, plans: (state.plans || []).map(p => p.id === action.planId ? { ...p, steps: p.steps.map(s => s.id === action.stepId ? { ...s, done: !s.done } : s) } : p) };
    }
    case 'DELETE_PLAN': {
      return { ...state, plans: (state.plans || []).filter(p => p.id !== action.planId) };
    }
    case 'SAVE_WEEK_PLAN': {
      return { ...state, weekPlan: { weekStart: action.weekStart, days: action.days } };
    }
    case 'ACCEPT_DAY_PLAN': {
      const wp = { ...state.weekPlan, days: { ...state.weekPlan.days } };
      const dayData = wp.days[action.date];
      if (!dayData) return state;
      wp.days[action.date] = { ...dayData, accepted: true };
      return { ...state, weekPlan: wp };
    }
    case 'UPDATE_DAY_PLAN': {
      const wp2 = { ...state.weekPlan, days: { ...state.weekPlan.days } };
      const dd = wp2.days[action.date];
      if (!dd) return state;
      if (action.field.startsWith('meals.')) {
        const mealKey = action.field.split('.')[1];
        wp2.days[action.date] = { ...dd, meals: { ...dd.meals, [mealKey]: action.value } };
      } else {
        wp2.days[action.date] = { ...dd, [action.field]: action.value };
      }
      return { ...state, weekPlan: wp2 };
    }
    case 'UPDATE_PAGE_NOTE': {
      const notes = { ...(state.pageNotes || {}) };
      const page = (action.page || '').toLowerCase();
      const note = (action.note || '').trim();
      if (!page) return state;
      if (!note) { delete notes[page]; } else { notes[page] = note; }
      return { ...state, pageNotes: notes };
    }
    case 'ADD_STICKY': {
      return { ...state, stickies: [{ id: Date.now(), text: '', color: action.color || 'yellow', createdAt: new Date().toISOString() }, ...(state.stickies || [])] };
    }
    case 'UPDATE_STICKY': {
      return { ...state, stickies: (state.stickies || []).map(s => s.id === action.id ? { ...s, text: action.text } : s) };
    }
    case 'DELETE_STICKY': {
      return { ...state, stickies: (state.stickies || []).filter(s => s.id !== action.id) };
    }
    case 'UPDATE_SETTINGS': {
      return { ...state, settings: { ...state.settings, [action.key]: action.value } };
    }
    case 'UPDATE_PROFILE': {
      return { ...state, profile: { ...state.profile, ...action.fields } };
    }
    case 'UPDATE_CONTEXT': {
      const ctx = (typeof state.profile.context === 'string') ? {} : { ...state.profile.context };
      const key = (action.key || '').trim().toLowerCase();
      const fact = (action.fact || '').trim();
      if (!key || !fact) return state;
      ctx[key] = fact;
      return { ...state, profile: { ...state.profile, context: ctx } };
    }
    case 'INCREMENT_WATER': {
      const wc = { ...(state.waterCount || {}) };
      wc[action.date] = Math.min((wc[action.date] || 0) + 1, 20);
      return { ...state, waterCount: wc };
    }
    case 'DECREMENT_WATER': {
      const wc = { ...(state.waterCount || {}) };
      wc[action.date] = Math.max((wc[action.date] || 0) - 1, 0);
      return { ...state, waterCount: wc };
    }
    case 'LOAD_DATA': {
      const merged = migrateContext(deepMerge(DEFAULT_DATA, action.data));
      return { ...merged, settings: { ...merged.settings, ...state.settings } };
    }
    default: return state;
  }
}

const DataCtx = createContext();

function migrateContext(data) {
  const ctx = data?.profile?.context;
  if (typeof ctx === 'string' && ctx.trim()) {
    const lines = ctx.split('\n').map(l => l.replace(/^-\s*/, '').trim()).filter(Boolean);
    const obj = {};
    lines.forEach((line, i) => {
      const colonIdx = line.indexOf(':');
      if (colonIdx > 0 && colonIdx < 40) {
        const key = line.slice(0, colonIdx).trim().toLowerCase();
        obj[key] = line.slice(colonIdx + 1).trim();
      } else {
        obj['fact_' + (i + 1)] = line;
      }
    });
    data.profile.context = obj;
  } else if (typeof ctx !== 'object' || ctx === null) {
    data.profile.context = {};
  }
  return data;
}

// Generate a clean markdown brain file for Claude Project integration
function generateBrainMd(d) {
  const lines = ['# Pebble Brain', `*Last synced: ${new Date().toISOString().slice(0, 16)}*`, ''];

  lines.push('## About Me');
  if (d.profile.name) lines.push(`- Name: ${d.profile.name}`);
  if (d.profile.vegan) lines.push('- Diet: vegan');
  if (d.profile.skinType) lines.push(`- Skin type: ${d.profile.skinType}`);
  lines.push('');

  const ctx = d.profile.context;
  if (ctx && typeof ctx === 'object' && Object.keys(ctx).length) {
    lines.push('## Knowledge Base');
    Object.entries(ctx).forEach(([k, v]) => lines.push(`- **${k}**: ${v}`));
    lines.push('');
  }

  const stickies = (d.stickies || []).filter(s => s.text);
  if (stickies.length) {
    lines.push('## Stickies (ideas, wishes, notes)');
    stickies.forEach(s => lines.push(`- ${s.text}`));
    lines.push('');
  }

  const activeTodos = d.planner.todos.filter(t => !t.done);
  if (activeTodos.length) {
    lines.push('## Active Todos');
    activeTodos.forEach(t => lines.push(`- [${t.priority || 'med'}] ${t.text}`));
    lines.push('');
  }

  if (d.selfCare.skincare.morning.length || d.selfCare.skincare.evening.length) {
    lines.push('## Skincare');
    if (d.selfCare.skincare.morning.length) lines.push(`- AM: ${d.selfCare.skincare.morning.join(' > ')}`);
    if (d.selfCare.skincare.evening.length) lines.push(`- PM: ${d.selfCare.skincare.evening.join(' > ')}`);
    lines.push('');
  }

  if (d.study.courses.length) {
    lines.push('## Study');
    d.study.courses.forEach(c => lines.push(`- ${c.name} (${c.progress}%, ${c.status})`));
    lines.push('');
  }

  if (d.career?.role) {
    lines.push('## Career');
    lines.push(`- Goal: ${d.career.role}${d.career.targetDate ? ' by ' + d.career.targetDate : ''}`);
    if (d.career.skills?.length) lines.push(`- Skills: ${d.career.skills.map(s => s.name + ' (' + s.progress + '%)').join(', ')}`);
    if (d.career.applications?.length) {
      lines.push('- Applications:');
      d.career.applications.forEach(a => lines.push(`  - ${a.company} — ${a.role} (${a.status})`));
    }
    lines.push('');
  }

  if (d.gym.workoutPlan[0]?.name) {
    lines.push('## Fitness');
    lines.push(`- Current workout: ${d.gym.workoutPlan[0].name}`);
    if (d.gym.workoutPlan[0].exercises?.length) lines.push(`- Exercises: ${d.gym.workoutPlan[0].exercises.join(', ')}`);
    lines.push('');
  }

  const entries = (d.journal.entries || []).slice(-5);
  if (entries.length) {
    lines.push('## Recent Journal');
    entries.forEach(e => lines.push(`- **${e.date}**${e.mood ? ' (' + e.mood + ')' : ''}: ${e.body.slice(0, 200)}`));
    lines.push('');
  }

  const wp = d.weekPlan;
  if (wp?.weekStart && wp.days && Object.keys(wp.days).length) {
    lines.push('## Week Plan');
    lines.push(`- Week of: ${wp.weekStart}`);
    Object.entries(wp.days).forEach(([date, day]) => {
      lines.push(`- **${date}**${day.accepted ? ' (accepted)' : ''}: ${(day.schedule || '').split('\n')[0].slice(0, 80)}...`);
      if (day.meals) lines.push(`  - Meals: B: ${day.meals.breakfast || '?'}, L: ${day.meals.lunch || '?'}, D: ${day.meals.dinner || '?'}`);
      if (day.workout) lines.push(`  - Workout: ${day.workout.slice(0, 80)}`);
    });
    lines.push('');
  }

  const pn = d.pageNotes || {};
  if (Object.keys(pn).length) {
    lines.push('## AI Notes (per page)');
    Object.entries(pn).forEach(([page, note]) => lines.push(`- **${page}**: ${note.slice(0, 150)}`));
    lines.push('');
  }

  return lines.join('\n');
}

// Read sync credentials from URL hash (survives localStorage wipes)
function getHashCreds() {
  try {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    const params = new URLSearchParams(hash);
    const gistId = params.get('g');
    const gistToken = params.get('t');
    const apiKey = params.get('k');
    if (gistId && gistToken) return { gistId, gistToken, ...(apiKey ? { apiKey } : {}) };
  } catch {}
  return null;
}

function updateHashCreds(settings) {
  if (!settings.gistId || !settings.gistToken) return;
  const params = new URLSearchParams();
  params.set('g', settings.gistId);
  params.set('t', settings.gistToken);
  if (settings.apiKey) params.set('k', settings.apiKey);
  const newHash = '#' + params.toString();
  if (window.location.hash !== newHash) {
    history.replaceState(null, '', newHash);
  }
}

function DataProvider({ children }) {
  const [data, dispatch] = useReducer(dataReducer, null, () => {
    const hashCreds = getHashCreds();
    try {
      const saved = localStorage.getItem('pebble-data');
      if (saved) {
        const parsed = migrateContext(deepMerge(DEFAULT_DATA, JSON.parse(saved)));
        // Restore credentials + profile from backup in case main data was purged/corrupted
        try {
          const creds = localStorage.getItem('pebble-credentials');
          if (creds) {
            const savedCreds = JSON.parse(creds);
            const savedProfile = savedCreds._profile;
            delete savedCreds._profile;
            parsed.settings = { ...parsed.settings, ...savedCreds };
            if (savedProfile) parsed.profile = { ...parsed.profile, ...savedProfile };
          }
        } catch {}
        // URL hash creds override everything (most reliable source)
        if (hashCreds) parsed.settings = { ...parsed.settings, ...hashCreds };
        return parsed;
      }
    } catch {}
    // Even if main data is gone, try restoring credentials from backup
    try {
      const creds = localStorage.getItem('pebble-credentials');
      if (creds) {
        const restored = { ...DEFAULT_DATA };
        restored.settings = { ...restored.settings, ...JSON.parse(creds) };
        if (hashCreds) restored.settings = { ...restored.settings, ...hashCreds };
        return restored;
      }
    } catch {}
    // Last resort: URL hash creds on a totally fresh device
    if (hashCreds) {
      const fresh = { ...DEFAULT_DATA };
      fresh.settings = { ...fresh.settings, ...hashCreds };
      return fresh;
    }
    return DEFAULT_DATA;
  });

  // Guards against saving stale localStorage data to Gist before the Gist load completes
  const gistReadyRef = useRef(false);

  // Save to localStorage on every change
  useEffect(() => {
    try { localStorage.setItem('pebble-data', JSON.stringify(data)); } catch {}
    // Backup credentials + profile separately so they survive localStorage purges and Gist loads
    try {
      const creds = JSON.stringify({ ...data.settings, _profile: data.profile });
      localStorage.setItem('pebble-credentials', creds);
    } catch {}
    // Keep URL hash in sync so bookmarked URL always has latest creds
    updateHashCreds(data.settings);
  }, [data]);

  // Emergency save when user switches away (mobile kills pages without warning)
  useEffect(() => {
    const save = () => {
      try { localStorage.setItem('pebble-data', JSON.stringify(data)); } catch {}
      try { localStorage.setItem('pebble-credentials', JSON.stringify({ ...data.settings, _profile: data.profile })); } catch {}
    };
    document.addEventListener('visibilitychange', save);
    window.addEventListener('pagehide', save);
    return () => { document.removeEventListener('visibilitychange', save); window.removeEventListener('pagehide', save); };
  }, [data]);

  // Load from Gist on mount (source of truth for cross-device sync)
  useEffect(() => {
    const { gistId, gistToken } = data.settings;
    if (!gistId || !gistToken) { gistReadyRef.current = true; return; }
    fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${gistToken}`, Accept: 'application/vnd.github+json' }
    })
      .then(r => r.json())
      .then(gist => {
        const content = gist.files?.['pebble.json']?.content;
        if (content) dispatch({ type: 'LOAD_DATA', data: deepMerge(DEFAULT_DATA, JSON.parse(content)) });
      })
      .catch(() => {})
      .finally(() => { gistReadyRef.current = true; });
  }, []); // only on mount

  // Auto-save to Gist (debounced 3s) — waits for initial load, never saves credentials
  useEffect(() => {
    if (!gistReadyRef.current) return;
    const { gistId, gistToken } = data.settings;
    if (!gistId || !gistToken) return;
    const { settings: _omit, ...safeData } = data;
    const brainMd = generateBrainMd(data);
    const t = setTimeout(async () => {
      const push = () => fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: { Authorization: `token ${gistToken}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
        body: JSON.stringify({ files: { 'pebble.json': { content: JSON.stringify(safeData) }, 'pebble-brain.md': { content: brainMd } } })
      });
      try {
        let res = await push();
        if (res.status === 409) { await new Promise(r => setTimeout(r, 2000)); await push(); }
      } catch {}
    }, 3000);
    return () => clearTimeout(t);
  }, [data]);

  // Auto-generate daily picks when API key is present and pick is stale
  useEffect(() => {
    const { apiKey } = data.settings;
    const pickDate = data.notebook.dailyPick.date;
    if (!apiKey || pickDate === todayKey) return;
    const { profile, planner, kitchen, study } = data;
    const ctx = `User: ${profile.name}, vegan: ${profile.vegan}, skin: ${profile.skinType}. Active todos: ${planner.todos.filter(t => !t.done).map(t => t.text).slice(0,5).join(', ')}. Meals: ${Object.values(kitchen.mealPlan).filter(Boolean).join(', ')}. Courses: ${study.courses.map(c => c.name).join(', ')}.`;
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: `User context: ${ctx}\n\nGenerate today's daily quote, fun fact, and recommendation. The user loves Terence McKenna, Alan Watts, and Doctor Who quotes — rotate between these. She also loves literary fiction — Song of Achilles, Circe, Babel (R.F. Kuang), Life of Pi, Martyr! (Kaveh Akbar). Mix in quotes from these books too. Her reading list includes There Is No Antimemetics Division. Reply with ONLY valid JSON, no extra text:\n{"quote":"...","quoteAuthor":"...","funFact":"...","rec":{"type":"movie","title":"...","reason":"..."}}\n\nfunFact: a surprising, weird, or delightful fact — science, history, language, nature, mythology, space, animals, anything fascinating. Keep it 1-2 sentences. Type can be movie, book, recipe, or podcast. Lean heavily toward book recs similar to her taste (literary, mythological, philosophical, lyrical prose). Make it personal and relevant to this user's lifestyle.`
        }]
      })
    })
      .then(r => r.json())
      .then(res => {
        const text = res.content?.[0]?.text?.trim();
        if (!text) return;
        const parsed = JSON.parse(stripJsonFences(text));
        dispatch({ type: 'UPDATE_DAILY_PICK', date: todayKey, quote: parsed.quote, quoteAuthor: parsed.quoteAuthor, funFact: parsed.funFact, rec: parsed.rec });
      })
      .catch(() => {});
  }, [data.settings.apiKey, data.notebook.dailyPick.date]);

  return <DataCtx.Provider value={{ data, dispatch }}>{children}</DataCtx.Provider>;
}

function getStreak(dotsData, category) {
  const dots = dotsData[category] || {};
  let streak = 0;
  const d = new Date(today);
  d.setDate(d.getDate() - 1);
  while (dots[d.toISOString().split('T')[0]]) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

/* ══════════════════════════════════════════
   MARBLE JAR (Navigation)
   ══════════════════════════════════════════ */
const PAGE_NAMES = ['stream', 'planner', 'kitchen', 'gym', 'selfcare', 'study', 'tracker', 'career', 'journal', 'notebook', 'builder'];
const PAGE_LABELS = ['Stream', 'Planner', 'Kitchen', 'Gym', 'Self-Care', 'Study', 'Tracker', 'Career', 'Journal', 'Picks', 'Build', 'Stickies'];

function MarbleJar({ open, onClose, onNavigate, currentPage, customSegments, staticPageCount }) {
  if (!open) return null;

  const marbles = [
    { cx: 90,  cy: 118, label: 'Stream', page: 0 },
    { cx: 170, cy: 108, label: 'Planner', page: 1 },
    { cx: 125, cy: 160, label: 'Kitchen', page: 2 },
    { cx: 68,  cy: 196, label: 'Gym', page: 3 },
    { cx: 198, cy: 177, label: 'Self-Care', page: 4 },
    { cx: 128, cy: 226, label: 'Study', page: 5 },
    { cx: 72,  cy: 260, label: 'Tracker', page: 6 },
    { cx: 190, cy: 244, label: 'Career', page: 7 },
    { cx: 126, cy: 294, label: 'Journal', page: 8 },
    { cx: 196, cy: 320, label: 'Picks', page: 9 },
    { cx: 80,  cy: 328, label: 'Build', page: 10 },
    { cx: 155, cy: 348, label: 'Stickies', page: 11 },
  ];

  const segs = customSegments || [];

  return (
    <div className="absolute inset-0 z-50 jar-overlay flex flex-col items-center justify-center" onClick={onClose}>
      <div className="jar-enter flex flex-col items-center" style={{ overflowY: 'auto', maxHeight: '90vh', paddingBottom: 16 }} onClick={e => e.stopPropagation()}>
        <p style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: 'var(--dark)', marginBottom: 4, opacity: 0.9 }}>pebble jar</p>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginBottom: 16 }}>tap a marble to go</p>

        <svg width="280" height="390" viewBox="0 0 280 390" fill="none" className="hand-drawn">
          <path d="M90 60 C92 52, 100 48, 140 46 C180 48, 188 52, 190 60" stroke="var(--primary)" strokeWidth="2.2" fill="none" />
          <path d="M85 64 C120 60, 160 60, 195 64" stroke="var(--primary)" strokeWidth="1.8" fill="none" />
          <path d="M85 64 C78 80, 48 110, 42 148 C36 186, 38 244, 45 282 C52 322, 80 358, 140 361 C200 358, 228 322, 235 282 C242 244, 244 186, 238 148 C232 110, 202 80, 195 64" stroke="var(--primary)" strokeWidth="2.2" fill="var(--card-bg)" />
          <path d="M68 116 C62 152, 60 208, 65 252" stroke="var(--primary)" strokeWidth="0.8" strokeOpacity="0.2" fill="none" />

          {marbles.map((m, i) => {
            const isActive = currentPage === m.page;
            return (
              <g key={i} className="marble-group" onClick={() => { navigator.vibrate?.(10); onNavigate(m.page); onClose(); }}>
                <circle cx={m.cx} cy={m.cy} r="22"
                  fill={isActive ? 'var(--primary)' : 'var(--accent-light)'}
                  stroke="var(--primary)" strokeWidth={isActive ? "2.5" : "1.5"}
                  opacity={isActive ? 1 : 0.85} />
                <ellipse cx={m.cx - 5} cy={m.cy - 7} rx="6" ry="3.5" fill="white" opacity={isActive ? 0.3 : 0.2} />
                <text x={m.cx} y={m.cy + 1} textAnchor="middle" dominantBaseline="middle"
                  fill={isActive ? 'white' : 'var(--dark)'}
                  style={{ fontFamily: 'var(--font-body)', fontSize: m.label.length > 7 ? '8px' : '9px', fontWeight: 500, letterSpacing: '0.5px' }}>
                  {m.label.toLowerCase()}
                </text>
              </g>
            );
          })}
        </svg>

        {segs.length > 0 && (
          <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', maxWidth: 260 }}>
            {segs.map((seg, i) => {
              const pageIdx = (staticPageCount || 11) + i;
              const isActive = currentPage === pageIdx;
              return (
                <button key={seg.id} onClick={() => { onNavigate(pageIdx); onClose(); }}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 11, padding: '6px 14px', borderRadius: 999, background: isActive ? 'var(--primary)' : 'var(--accent-light)', color: isActive ? 'white' : 'var(--dark)', border: `1.5px solid ${isActive ? 'var(--primary)' : 'rgba(0,0,0,0.08)'}`, cursor: 'pointer', transition: 'all 0.15s' }}>
                  {seg.name.toLowerCase()}
                </button>
              );
            })}
          </div>
        )}

        <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 12, opacity: 0.5, cursor: 'pointer' }} onClick={onClose}>tap outside to close</p>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   TAB NAV — manila folder tabs
   ══════════════════════════════════════════ */
function TabNav({ currentPage, onNavigate, pageLabels }) {
  const scrollRef = useRef(null);
  const activeRef = useRef(null);
  useEffect(() => {
    if (activeRef.current && scrollRef.current) {
      activeRef.current.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
    }
  }, [currentPage]);
  return (
    <div ref={scrollRef} style={{ display: 'flex', overflowX: 'auto', gap: 0, padding: '0 12px', flexShrink: 0, borderBottom: '2px solid var(--card-border)', background: 'var(--bg)', boxShadow: '0 4px 12px rgba(0,0,0,0.06)', scrollbarWidth: 'none', msOverflowStyle: 'none', WebkitOverflowScrolling: 'touch', position: 'relative', zIndex: 5 }}>
      <style>{`.tab-scroll::-webkit-scrollbar{display:none}`}</style>
      {pageLabels.map((label, i) => {
        const active = i === currentPage;
        return (
          <button key={i} ref={active ? activeRef : null} onClick={() => { navigator.vibrate?.(10); onNavigate(i); }}
            style={{
              fontFamily: 'var(--font-body)', fontSize: 10, letterSpacing: 0.5,
              padding: '8px 12px 6px', whiteSpace: 'nowrap', cursor: 'pointer',
              background: active ? 'var(--card-bg)' : 'transparent',
              color: active ? 'var(--dark)' : 'var(--muted)',
              border: active ? '2px solid var(--card-border)' : '2px solid transparent',
              borderBottom: active ? '2px solid var(--card-bg)' : '2px solid transparent',
              borderRadius: '8px 8px 0 0',
              marginBottom: -2,
              fontWeight: active ? 600 : 400,
              transition: 'all 0.15s',
              flexShrink: 0,
            }}>
            {label.toLowerCase()}
          </button>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════
   PEBBLE NAV — labeled pebbles in a row
   ══════════════════════════════════════════ */
const PEBBLE_COLORS = [
  '#5db8c8', '#9d88d4', '#6ab87a', '#d85858', '#e0748a',
  '#6878c0', '#e89840', '#6888a8', '#e8972a', '#8ab850',
  '#c07850', '#5ec8b8',
];

function PebbleNav({ currentPage, onNavigate, pageLabels }) {
  const scrollRef = useRef(null);
  const activeRef = useRef(null);
  useEffect(() => {
    if (activeRef.current && scrollRef.current) {
      activeRef.current.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
    }
  }, [currentPage]);
  return (
    <div ref={scrollRef} style={{ display: 'flex', overflowX: 'auto', gap: 8, padding: '8px 16px 10px', flexShrink: 0, borderBottom: '1px solid rgba(0,0,0,0.05)', boxShadow: '0 4px 12px rgba(0,0,0,0.06)', scrollbarWidth: 'none', msOverflowStyle: 'none', WebkitOverflowScrolling: 'touch', position: 'relative', zIndex: 5 }}>
      {pageLabels.map((label, i) => {
        const active = i === currentPage;
        const color = PEBBLE_COLORS[i % PEBBLE_COLORS.length];
        return (
          <button key={i} ref={active ? activeRef : null} onClick={() => { navigator.vibrate?.(10); onNavigate(i); }}
            style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, cursor: 'pointer', background: 'none', border: 'none', padding: 0, flexShrink: 0 }}>
            <div style={{
              width: 30, height: 30, borderRadius: '50%',
              background: `radial-gradient(circle at 36% 30%, ${color}${active ? '99' : '44'}, ${color}${active ? '44' : '11'} 50%, ${color}${active ? 'bb' : '55'})`,
              border: `1.5px solid ${color}${active ? '99' : '33'}`,
              transition: 'all 0.15s',
              position: 'relative', overflow: 'hidden',
              boxShadow: active ? `0 0 8px ${color}44` : 'none',
            }}>
              <div style={{ position: 'absolute', top: 4, left: 6, width: 8, height: 5, borderRadius: '50%', background: 'rgba(255,255,255,0.6)', transform: 'rotate(-20deg)' }}/>
              <div style={{ position: 'absolute', top: 8, left: 9, width: 3, height: 2, borderRadius: '50%', background: 'rgba(255,255,255,0.35)' }}/>
            </div>
            <span style={{
              fontFamily: 'var(--font-body)', fontSize: 8, letterSpacing: 0.3,
              color: active ? color : 'var(--muted)',
              fontWeight: active ? 600 : 400,
              whiteSpace: 'nowrap',
            }}>{label.length > 7 ? label.slice(0, 6) + '.' : label.toLowerCase()}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════
   GLASS JAR NAV — jar SVG + labeled pebbles outside
   ══════════════════════════════════════════ */
function GlassJarNav({ currentPage, onNavigate, pageLabels }) {

  // Marble colors matching pebble-jar.html gradients
  const marbleColors = [
    '#5db8c8', // stream — teal
    '#9d88d4', // planner — lavender
    '#6ab87a', // kitchen — sage
    '#d85858', // gym — coral
    '#e0748a', // selfcare — rose
    '#6878c0', // study — indigo
    '#e89840', // tracker — orange
    '#6888a8', // career — steel
    '#e8972a', // journal — amber
    '#8ab850', // notebook — lime
    '#c07850', // build — terracotta
    '#5ec8b8', // stickies — mint
  ];

    return (
      <div onClick={() => setOpen(true)} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '6px 0', cursor: 'pointer', flexShrink: 0 }}>

        <svg width="28" height="36" viewBox="0 0 220 420" fill="none" style={{ opacity: 0.5 }}>

          <path d="M82,96 Q92,88 110,86 Q128,88 138,96" stroke="var(--primary)" strokeWidth="4" strokeOpacity="0.25" fill="none"/>

      </div>

    <div style={{ flexShrink: 0, position: 'relative' }}>
      {/* Backdrop */}
      <div onClick={() => setOpen(false)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 40, background: 'rgba(0,0,0,0.1)' }} />
      <div style={{ position: 'relative', zIndex: 41, background: 'var(--bg)', borderBottom: '1px solid rgba(0,0,0,0.06)', boxShadow: '0 8px 24px rgba(0,0,0,0.08)', padding: '12px 16px 16px' }}>
        {/* Glass jar SVG — compact */}
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 10 }}>

            const active = i === currentPage;

            return (
              <button key={i} onClick={() => { navigator.vibrate?.(10); onNavigate(i); setOpen(false); }}

                  display: 'flex', alignItems: 'center', gap: 5,

const PEBBLE_TOOLS = [
  {
    name: 'get_weather',
    description: 'Get current weather and forecast for a location. Use when the user asks about weather, whether to bring a jacket, UV index, rain, etc.',
    input_schema: { type: 'object', properties: { latitude: { type: 'number', description: 'Latitude' }, longitude: { type: 'number', description: 'Longitude' }, city: { type: 'string', description: 'City name (used for display only, lat/long are for the API)' } }, required: ['latitude', 'longitude'] }
  },
  {
    name: 'define_word',
    description: 'Look up the definition of a word. Use when the user asks what a word means.',
    input_schema: { type: 'object', properties: { word: { type: 'string', description: 'The word to define' } }, required: ['word'] }
  },
  {
    name: 'get_time',
    description: 'Get the current time in a specific timezone. Use when the user asks what time it is somewhere.',
    input_schema: { type: 'object', properties: { timezone: { type: 'string', description: 'IANA timezone string, e.g. "America/New_York", "Asia/Tokyo"' } }, required: ['timezone'] }
  },
  {
    name: 'get_quote',
    description: 'Get a random inspirational quote. Use when the user wants motivation or inspiration.',
    input_schema: { type: 'object', properties: {} }
  },
];

async function executeToolCall(name, input) {
  try {
    switch (name) {
      case 'get_weather': {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${input.latitude}&longitude=${input.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,uv_index&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=1&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max`);
        const d = await r.json();
        const c = d.current;
        const daily = d.daily;
        const weatherCodes = { 0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast', 45: 'Foggy', 51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle', 61: 'Light rain', 63: 'Rain', 65: 'Heavy rain', 71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 80: 'Rain showers', 95: 'Thunderstorm' };
        return JSON.stringify({
          temperature: c.temperature_2m + '°F',
          feels_like: c.apparent_temperature + '°F',
          condition: weatherCodes[c.weather_code] || 'Unknown',
          humidity: c.relative_humidity_2m + '%',
          wind: c.wind_speed_10m + ' mph',
          uv_index: c.uv_index,
          precipitation: c.precipitation + ' mm',
          high: daily.temperature_2m_max[0] + '°F',
          low: daily.temperature_2m_min[0] + '°F',
          rain_chance: daily.precipitation_probability_max[0] + '%',
          uv_max: daily.uv_index_max[0],
          city: input.city || 'your location',
        });
      }
      case 'define_word': {
        const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(input.word)}`);
        if (!r.ok) return JSON.stringify({ error: `Could not find definition for "${input.word}"` });
        const d = await r.json();
        const entry = d[0];
        const defs = entry.meanings.slice(0, 3).map(m => ({
          partOfSpeech: m.partOfSpeech,
          definition: m.definitions[0]?.definition,
          example: m.definitions[0]?.example || null,
        }));
        return JSON.stringify({ word: entry.word, phonetic: entry.phonetic || '', definitions: defs });
      }
      case 'get_time': {
        const r = await fetch(`https://worldtimeapi.org/api/timezone/${input.timezone}`);
        if (!r.ok) return JSON.stringify({ error: `Unknown timezone: ${input.timezone}` });
        const d = await r.json();
        return JSON.stringify({ timezone: d.timezone, datetime: d.datetime, utc_offset: d.utc_offset, day_of_week: d.day_of_week });
      }
      case 'get_quote': {
        const r = await fetch('https://zenquotes.io/api/random');
        const d = await r.json();
        return JSON.stringify({ quote: d[0]?.q, author: d[0]?.a });
      }
      default:
        return JSON.stringify({ error: 'Unknown tool' });
    }
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
}

    if (isListening && recognitionRef.current) {

    recognition.onend = () => setIsListening(false);

Always be warm, concise, and specific to this user. When you notice a sticky is relevant to what the user is asking about (e.g. a sticky says "try pilates" and they're talking about workouts), bring it up naturally — like "btw you mentioned wanting to try pilates!" Don't force stickies into every response, only when they genuinely fit.

          // Check if Claude wants to use tools
          const toolUses = (json.content || []).filter(b => b.type === 'tool_use');
          const textBlocks = (json.content || []).filter(b => b.type === 'text').map(b => b.text).join('');

          if (toolUses.length > 0 && json.stop_reason === 'tool_use') {
            // Execute each tool call and build results
            const toolResults = [];
            for (const tu of toolUses) {
              const result = await executeToolCall(tu.name, tu.input);
              toolResults.push({ type: 'tool_result', tool_use_id: tu.id, content: result });
            }
            // Add assistant's response + tool results to messages, then loop
            messages = [...messages, { role: 'assistant', content: json.content }, { role: 'user', content: toolResults }];
            continue; // go around the loop again
          }

          // No more tool calls — we have the final response
          const raw = textBlocks || 'hmm, something went wrong.';

          // Extract and execute any actions
          const actionsMatch = raw.match(/<actions>([\s\S]*?)<\/actions>/);
          const memoryMatch = raw.match(/<memory>([\s\S]*?)<\/memory>/);
          const planMatch = raw.match(/<plan>([\s\S]*?)<\/plan>/);
          const cleanText = raw.replace(/<actions>[\s\S]*?<\/actions>/, '').replace(/<memory>[\s\S]*?<\/memory>/, '').replace(/<plan>[\s\S]*?<\/plan>/, '').trim();
          if (actionsMatch) {
            try {
              const actions = JSON.parse(actionsMatch[1]);
              actions.forEach(action => {
                if (action.type === 'START_CARD_QUIZ') {
                  setCardQuiz(action);
                } else if (action.type === 'SEND_NOTIFICATION') {
                  sendPushNotification(data.settings?.oneSignalAppId, data.settings?.oneSignalRestKey, action.title, action.body);
                } else {
                  dispatch(action);
                }
              });
            } catch {}
          }
          if (memoryMatch) {
            try {
              const memories = JSON.parse(memoryMatch[1]);
              memories.forEach(m => {
                if (m.label && m.payload) {
                  dispatch({ type: 'ADD_MEMORY_PENDING', item: { id: Date.now() + Math.random(), label: m.label, payload: m.payload } });
                }
              });
            } catch {}
          }
          if (planMatch) {
            try {
              const plan = JSON.parse(planMatch[1]);
              if (plan.title && plan.steps?.length) {
                dispatch({ type: 'ADD_PLAN', title: plan.title, steps: plan.steps });
              }
            } catch {}
          }

          dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: cleanText, time: new Date().toISOString() } });
          break; // exit the loop
        } // end while loop
      } catch {
        dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: "couldn't reach pebble's brain right now. try again?", time: new Date().toISOString() } });
      } finally {
        setSending(false);
      }
    } else {
      dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: 'add your claude API key in settings to chat with me!', time: new Date().toISOString() } });
      setSending(false);
    }
  };

  return (
    <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{ position: 'relative' }}>
      {/* Expanded full-screen chat */}
      {chatExpanded && (
        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 100, background: 'var(--bg)', display: 'flex', flexDirection: 'column', animation: 'slideUp 0.25s ease' }}>
          <div className="flex items-center justify-between px-5 pt-5 pb-3" style={{ borderBottom: '1px solid rgba(0,0,0,0.06)' }}>
            <p style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--dark)' }}>chat</p>
            <button onClick={() => setChatExpanded(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.collapse}</svg>
            </button>
          </div>
          <div ref={msgsRef} style={{ flex: 1, overflowY: 'auto', padding: '12px 16px' }}>
            {data.chat.messages.length === 0 ? (
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', textAlign: 'center', marginTop: 40 }}>no messages yet</p>
            ) : data.chat.messages.map((m, i) => (
              <ChatBubble key={m.time || i} msg={m} />
            ))}
            {sending && (
              <div className="mb-2 flex justify-start">
                <div style={{ padding: '8px 12px', borderRadius: 16, background: 'var(--card-bg)', border: '1px solid rgba(0,0,0,0.06)', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>thinking...</div>
              </div>
            )}
          </div>
          <div className="px-4 pb-5 pt-2" style={{ borderTop: '1px solid rgba(0,0,0,0.06)' }}>
            <div className="flex items-center gap-2">
              <input type="text" value={msg} onChange={e => setMsg(e.target.value)}
                placeholder="talk to pebble..."
                className="flex-1 outline-none"
                style={{ background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 999, padding: '10px 16px', fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)' }}
                onKeyDown={e => e.key === 'Enter' && sendMessage()} />
              {hasSpeechAPI && (
                <button className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0"
                  style={{ background: isListening ? 'var(--primary)' : 'rgba(0,0,0,0.04)', border: isListening ? '2px solid var(--primary)' : '1px solid rgba(0,0,0,0.08)', transition: 'all 0.15s' }}
                  onClick={toggleVoice}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={isListening ? 'white' : 'var(--muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
              )}
              <button className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0"
                style={{ background: 'var(--primary)', opacity: msg.trim() ? 1 : 0.4, transition: 'opacity 0.15s' }}
                onClick={() => { navigator.vibrate?.(10); sendMessage(); }} disabled={!msg.trim()}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Normal chat overlay (not expanded) */}
      {!chatExpanded && chatOpen && (data.chat.messages.length > 0) && (<>
        <div onClick={() => setChatOpen(false)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 30 }} />
        <div ref={msgsRef} className="absolute bottom-14 left-0 right-0 z-40" style={{ maxHeight: 320, overflowY: 'auto', background: 'color-mix(in srgb, var(--bg) 95%, transparent)', backdropFilter: 'blur(12px)', borderTop: '1px solid rgba(0,0,0,0.06)', padding: '0' }}>
          {/* Close bar + expand button */}
          <div style={{ position: 'sticky', top: 0, zIndex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '8px 0 4px', cursor: 'pointer', background: 'color-mix(in srgb, var(--bg) 95%, transparent)' }}>
            <div onClick={() => setChatOpen(false)} style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.15)' }} />
            </div>
            <button onClick={() => { setChatExpanded(true); setChatOpen(false); }} style={{ position: 'absolute', right: 12, background: 'none', border: 'none', cursor: 'pointer', padding: 4, opacity: 0.5 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.expand}</svg>
            </button>
          </div>
          <div style={{ padding: '4px 16px 12px' }}>
          {data.chat.messages.slice(-10).map((m, i) => (
            <ChatBubble key={m.time || i} msg={m} />
          ))}
          {sending && (
            <div className="mb-2 flex justify-start">
              <div style={{ padding: '8px 12px', borderRadius: 16, background: 'var(--card-bg)', border: '1px solid rgba(0,0,0,0.06)', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>thinking...</div>
            </div>
          )}
          </div>
        </div>
      </>)}
      {(data.memory?.pending || []).length > 0 && (
        <div style={{ position: 'relative', zIndex: 45 }}>
          <MemoryTray />
        </div>
      )}
      <div className="chat-bar border-t px-4 py-2.5 flex items-center gap-2 flex-shrink-0" style={{ borderColor: 'rgba(0,0,0,0.04)', position: 'relative', zIndex: 45 }}>
        <input type="text" value={msg} onChange={e => setMsg(e.target.value)}
          placeholder="talk to pebble..."
          className="flex-1 outline-none"
          style={{ background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 999, padding: '10px 16px', fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', transition: 'border-color 0.15s' }}
          onFocus={e => { e.target.style.borderColor = 'var(--primary)'; if (data.chat.messages.length) setChatOpen(true); }}
          onBlur={e => { e.target.style.borderColor = 'rgba(0,0,0,0.06)'; }}
          onKeyDown={e => e.key === 'Enter' && sendMessage()} />
        {hasSpeechAPI && (
          <button className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0"
            style={{ background: isListening ? 'var(--primary)' : 'rgba(0,0,0,0.04)', border: isListening ? '2px solid var(--primary)' : '1px solid rgba(0,0,0,0.08)', transition: 'all 0.15s' }}
            onClick={toggleVoice}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={isListening ? 'white' : 'var(--muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        )}
        <button className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0"
          style={{ background: 'var(--primary)', opacity: msg.trim() ? 1 : 0.4, transition: 'opacity 0.15s' }}
          onClick={() => { navigator.vibrate?.(10); sendMessage(); }} disabled={!msg.trim()}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SWIPE PAGES
