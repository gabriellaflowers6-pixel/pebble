/* ── Page 0: Stream (Home) ── */
function StreamPage() {
  const { data, dispatch } = useContext(DataCtx);
  const { monetPainting } = useContext(ThemeCtx);
  const greeting = today.getHours() < 12 ? 'good morning' : today.getHours() < 18 ? 'good afternoon' : 'good evening';
  const dateStr = `${dayNames[today.getDay()]}, ${monthNames[today.getMonth()]} ${today.getDate()}`;
  const bestStreak = Math.max(0, ...Object.keys(data.dots).map(k => getStreak(data.dots, k)));
  const categories = ['workout', 'skincare', 'study', 'meals', 'water'];

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col justify-center flex-1 py-4">
          <p style={{ fontFamily: 'var(--font-display)', fontSize: 24, color: 'var(--dark)' }}>{greeting}, {data.profile.name.toLowerCase()}</p>
          <PageNote page="stream" />
          <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>{dateStr}</p>

          <div className="flex items-center gap-3 mt-3 mb-6">
            {bestStreak > 0 && (
              <div className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full" style={{ background: 'var(--accent-light)' }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/></svg>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--accent)', fontWeight: 500 }}>{bestStreak} day streak</span>
              </div>
            )}
            {monetPainting && (
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', fontStyle: 'italic' }}>today: "{monetPainting.toLowerCase()}"</span>
            )}
          </div>

          <SectionLabel>today's dots</SectionLabel>
          <div className="glass-card px-4 py-3 mb-5">
            <div className="flex items-center justify-between">
              {categories.map(cat => {
                const filled = data.dots[cat]?.[todayKey];
                return (
                  <div key={cat} className="flex flex-col items-center gap-1.5">
                    <div className={`dot today ${filled ? 'filled' : ''}`} style={{ width: 14, height: 14, cursor: 'pointer' }}
                      onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'TOGGLE_DOT', category: cat, date: todayKey }); }} />
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1 }}>{cat.slice(0, 4)}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Water Tracker */}
          <div className="glass-card px-4 py-3 mb-5">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }}>{(data.waterCount || {})[todayKey] || 0}/8 glasses</span>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'DECREMENT_WATER', date: todayKey }); }}
                  style={{ width: 26, height: 26, borderRadius: '50%', border: '1px solid rgba(0,0,0,0.08)', background: 'rgba(0,0,0,0.02)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-body)', fontSize: 16, color: 'var(--muted)', lineHeight: 1 }}>-</button>
                <button onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'INCREMENT_WATER', date: todayKey }); }}
                  style={{ width: 26, height: 26, borderRadius: '50%', border: '1px solid rgba(0,0,0,0.08)', background: 'var(--primary-light)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-body)', fontSize: 16, color: 'var(--primary)', lineHeight: 1 }}>+</button>
              </div>
            </div>
            <div style={{ marginTop: 8, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.05)', overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 2, width: `${Math.min(((data.waterCount || {})[todayKey] || 0) / 8 * 100, 100)}%`, background: 'var(--primary)', transition: 'width 0.3s' }} />
            </div>
          </div>

          {/* Mood Trends — 7 days */}
          {(() => {
            const last7 = [];
            for (let i = 6; i >= 0; i--) {
              const d = new Date(today);
              d.setDate(today.getDate() - i);
              const key = d.toISOString().split('T')[0];
              const entry = data.journal.entries.find(e => e.date === key);
              last7.push(entry?.mood || '');
            }
            const moodColor = (m) => m === 'good' ? 'var(--primary)' : m === 'okay' ? 'var(--accent)' : m === 'tough' ? 'var(--danger)' : 'rgba(0,0,0,0.08)';
            return (
              <div className="mb-5">
                <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 8 }}>mood · 7 days</p>
                <div className="flex items-center gap-3 justify-center">
                  {last7.map((m, i) => (
                    <div key={i} style={{ width: 10, height: 10, borderRadius: '50%', background: moodColor(m), transition: 'background 0.2s', opacity: m ? 1 : 0.4 }} title={m || 'no entry'} />
                  ))}
                </div>
              </div>
            );
          })()}

          {/* Week Planner */}
          {(() => {
            const [weekLoading, setWeekLoading] = useState(false);
            const [dayLoading, setDayLoading] = useState(false);
            const [selectedDayIdx, setSelectedDayIdx] = useState(() => {
              const dow = today.getDay();
              return dow === 0 ? 6 : dow - 1;
            });
            const [openSections, setOpenSections] = useState({ schedule: true, meals: true, workout: true });

            const toggleSection = (key) => setOpenSections(prev => ({ ...prev, [key]: !prev[key] }));

            // Get Monday of current week
            const getMonday = () => {
              const d = new Date(today);
              const dow = d.getDay();
              const diff = dow === 0 ? -6 : 1 - dow;
              d.setDate(d.getDate() + diff);
              d.setHours(0,0,0,0);
              return d;
            };
            const monday = getMonday();
            const mondayKey = monday.toISOString().split('T')[0];

            // Build array of 7 day keys (Mon-Sun)
            const weekDays = Array.from({ length: 7 }, (_, i) => {
              const d = new Date(monday);
              d.setDate(d.getDate() + i);
              return d.toISOString().split('T')[0];
            });

            const dayLabels = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];

            const hasWeek = data.weekPlan?.weekStart === mondayKey && Object.keys(data.weekPlan?.days || {}).length > 0;
            const selectedDateKey = weekDays[selectedDayIdx];
            const selectedDay = data.weekPlan?.days?.[selectedDateKey];

            const selectedDateObj = new Date(selectedDateKey + 'T12:00:00');
            const selectedDateLabel = `${dayNames[selectedDateObj.getDay()]}, ${monthNames[selectedDateObj.getMonth()].toLowerCase()} ${selectedDateObj.getDate()}`;

            const buildPromptContext = () => {
              const ctx = data.profile.context || {};
              const ctxStr = Object.entries(ctx).map(([k,v]) => `${k}: ${v}`).join(', ');
              const todos = data.planner.todos.filter(t => !t.done).map(t => t.text).join(', ') || 'none';
              const am = data.selfCare.skincare.morning.join(', ') || 'not set';
              const pm = data.selfCare.skincare.evening.join(', ') || 'not set';
              const workout = data.gym.workoutPlan[0]?.name || 'none';
              const exercises = (data.gym.workoutPlan[0]?.exercises || []).join(', ') || 'none';
              const courses = data.study.courses.map(c => c.name + ' (' + c.progress + '%, ' + c.status + ')').join(', ') || 'none';
              const stickies = (data.stickies || []).filter(s => s.text).map(s => s.text).join(', ') || 'none';
              return { ctxStr, todos, am, pm, workout, exercises, courses, stickies };
            };

            const generateWeek = async () => {
              if (!data.settings?.apiKey || weekLoading) return;
              navigator.vibrate?.(10);
              setWeekLoading(true);
              try {
                const { ctxStr, todos, am, pm, workout, exercises, courses, stickies } = buildPromptContext();
                const prompt = `Plan a full week for the user starting ${mondayKey}.
Context:
- Name: ${data.profile.name}, Vegan: ${data.profile.vegan}
- Knowledge base: ${ctxStr || 'none'}
- Active todos: ${todos}
- Skincare AM: ${am}, PM: ${pm}
- Workout plan: ${workout}, exercises: ${exercises}
- Study courses: ${courses}
- Stickies: ${stickies}

Reply with ONLY valid JSON:
{
  "${weekDays[0]}": {
    "schedule": "morning\\n- item\\n- item\\n\\nafternoon\\n- item\\n\\nevening\\n- item",
    "meals": { "breakfast": "...", "lunch": "...", "dinner": "..." },
    "workout": "..."
  }
}
(7 days, Mon-Sun: ${weekDays.join(', ')})

Make meals vegan if they are vegan. Make workouts specific to their plan. Reference their actual todos, courses, and stickies. Keep schedules short (6-10 lines each). Make each day different and realistic.`;

                const res = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'x-api-key': data.settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                  body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 2048, messages: [{ role: 'user', content: prompt }] }),
                });
                const json = await res.json();
                const text = json.content?.[0]?.text || '';
                const parsed = JSON.parse(stripJsonFences(text));
                // Ensure each day has accepted: false
                const days = {};
                weekDays.forEach(dk => {
                  if (parsed[dk]) {
                    days[dk] = { ...parsed[dk], accepted: false };
                  }
                });
                if (Object.keys(days).length > 0) {
                  dispatch({ type: 'SAVE_WEEK_PLAN', weekStart: mondayKey, days });
                }
              } catch (e) { console.error('Week plan error:', e); }
              setWeekLoading(false);
            };

            const regenerateDay = async (dateKey) => {
              if (!data.settings?.apiKey || dayLoading) return;
              navigator.vibrate?.(10);
              setDayLoading(true);
              try {
                const { ctxStr, todos, am, pm, workout, exercises, courses, stickies } = buildPromptContext();
                const dateObj = new Date(dateKey + 'T12:00:00');
                const dayName = dayNames[dateObj.getDay()];
                const prompt = `Plan a single day (${dayName}, ${dateKey}) for the user.
Context:
- Name: ${data.profile.name}, Vegan: ${data.profile.vegan}
- Knowledge base: ${ctxStr || 'none'}
- Active todos: ${todos}
- Skincare AM: ${am}, PM: ${pm}
- Workout plan: ${workout}, exercises: ${exercises}
- Study courses: ${courses}
- Stickies: ${stickies}

Reply with ONLY valid JSON:
{
  "schedule": "morning\\n- item\\n\\nafternoon\\n- item\\n\\nevening\\n- item",
  "meals": { "breakfast": "...", "lunch": "...", "dinner": "..." },
  "workout": "..."
}
Make meals vegan if they are vegan. Keep schedule 6-10 lines. Be specific and realistic.`;

                const res = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'x-api-key': data.settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                  body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 512, messages: [{ role: 'user', content: prompt }] }),
                });
                const json = await res.json();
                const text = json.content?.[0]?.text || '';
                const parsed = JSON.parse(stripJsonFences(text));
                const updatedDays = { ...(data.weekPlan?.days || {}) };
                updatedDays[dateKey] = { ...parsed, accepted: false };
                dispatch({ type: 'SAVE_WEEK_PLAN', weekStart: mondayKey, days: updatedDays });
              } catch (e) { console.error('Day regen error:', e); }
              setDayLoading(false);
            };

            const acceptDay = (dateKey) => {
              navigator.vibrate?.(10);
              dispatch({ type: 'ACCEPT_DAY_PLAN', date: dateKey });
              const dayData = data.weekPlan?.days?.[dateKey];
              if (dayData?.meals && dateKey === todayKey) {
                if (dayData.meals.breakfast) dispatch({ type: 'UPDATE_MEAL_NAME', meal: 'breakfast', name: dayData.meals.breakfast });
                if (dayData.meals.lunch) dispatch({ type: 'UPDATE_MEAL_NAME', meal: 'lunch', name: dayData.meals.lunch });
                if (dayData.meals.dinner) dispatch({ type: 'UPDATE_MEAL_NAME', meal: 'dinner', name: dayData.meals.dinner });
              }
            };

            const chevronSvg = (dir) => (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round"><path d={dir === 'left' ? 'M15 18l-6-6 6-6' : 'M9 6l6 6-6 6'} /></svg>
            );

            return (
              <div className="mb-4">
                <div className="flex items-center justify-between mb-2">
                  <SectionLabel>my week</SectionLabel>
                </div>

                {hasWeek ? (
                  <div>
                    {/* Weekly overview dots */}
                    <div className="flex items-center justify-center gap-2 mb-3">
                      {weekDays.map((dk, i) => {
                        const dayD = data.weekPlan?.days?.[dk];
                        const isAccepted = dayD?.accepted;
                        const hasPlan = !!dayD;
                        const isSelected = i === selectedDayIdx;
                        const isToday = dk === todayKey;
                        return (
                          <button key={dk} onClick={() => { navigator.vibrate?.(10); setSelectedDayIdx(i); }}
                            style={{
                              width: 20, height: 20, borderRadius: '50%', border: isSelected ? '2px solid var(--primary)' : '1.5px solid transparent',
                              background: isAccepted ? '#4ade80' : hasPlan ? 'var(--primary)' : 'rgba(0,0,0,0.08)',
                              opacity: isSelected ? 1 : 0.7, cursor: 'pointer', padding: 0,
                              display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s',
                              boxShadow: isToday ? '0 0 0 2px rgba(0,0,0,0.1)' : 'none'
                            }}>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 7, color: (isAccepted || hasPlan) ? '#fff' : 'var(--muted)', fontWeight: 600, textTransform: 'uppercase' }}>
                              {dayLabels[i][0]}
                            </span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Day navigation */}
                    <div className="flex items-center justify-between mb-2">
                      <button onClick={() => { navigator.vibrate?.(10); setSelectedDayIdx(Math.max(0, selectedDayIdx - 1)); }} disabled={selectedDayIdx === 0}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, opacity: selectedDayIdx === 0 ? 0.3 : 1 }}>
                        {chevronSvg('left')}
                      </button>
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', fontWeight: 500 }}>
                        {selectedDateLabel}
                        {selectedDateKey === todayKey && <span style={{ color: 'var(--primary)', marginLeft: 6, fontSize: 10 }}>today</span>}
                      </span>
                      <button onClick={() => { navigator.vibrate?.(10); setSelectedDayIdx(Math.min(6, selectedDayIdx + 1)); }} disabled={selectedDayIdx === 6}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, opacity: selectedDayIdx === 6 ? 0.3 : 1 }}>
                        {chevronSvg('right')}
                      </button>
                    </div>

                    {selectedDay ? (
                      <div className="glass-card px-4 py-3">
                        {selectedDay.accepted && (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8 }}>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: '#4ade80', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>accepted</span>
                          </div>
                        )}

                        {/* Schedule section */}
                        <button onClick={() => toggleSection('schedule')} className="flex items-center justify-between w-full" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0', marginBottom: 4 }}>
                          <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--primary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>schedule</span>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" style={{ transform: openSections.schedule ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        {openSections.schedule && (
                          <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', lineHeight: 1.8, whiteSpace: 'pre-line', marginBottom: 12 }}>{selectedDay.schedule || 'No schedule yet'}</p>
                        )}

                        {/* Meals section */}
                        <button onClick={() => toggleSection('meals')} className="flex items-center justify-between w-full" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0', marginBottom: 4 }}>
                          <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--primary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>meals</span>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" style={{ transform: openSections.meals ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        {openSections.meals && selectedDay.meals && (
                          <div style={{ marginBottom: 12 }}>
                            {['breakfast', 'lunch', 'dinner'].map(meal => (
                              <div key={meal} style={{ marginBottom: 6 }}>
                                <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1 }}>{meal}</span>
                                <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', marginTop: 1 }}>{selectedDay.meals[meal] || '—'}</p>
                              </div>
                            ))}
                          </div>
                        )}

                        {/* Workout section */}
                        <button onClick={() => toggleSection('workout')} className="flex items-center justify-between w-full" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0', marginBottom: 4 }}>
                          <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--primary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>workout</span>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" style={{ transform: openSections.workout ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        {openSections.workout && (
                          <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', lineHeight: 1.8, whiteSpace: 'pre-line', marginBottom: 8 }}>{selectedDay.workout || 'Rest day'}</p>
                        )}

                        {/* Action buttons */}
                        <div className="flex items-center gap-3" style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid rgba(0,0,0,0.05)' }}>
                          {!selectedDay.accepted && (
                            <button onClick={() => acceptDay(selectedDateKey)}
                              style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: '#fff', background: '#4ade80', border: 'none', cursor: 'pointer', padding: '5px 12px', borderRadius: 12, fontWeight: 600 }}>
                              accept
                            </button>
                          )}
                          <button onClick={() => regenerateDay(selectedDateKey)} disabled={dayLoading}
                            style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', background: 'none', border: '1px solid rgba(0,0,0,0.08)', cursor: 'pointer', padding: '5px 12px', borderRadius: 12 }}>
                            {dayLoading ? 'regenerating...' : 'regenerate'}
                          </button>
                          <button onClick={generateWeek} disabled={weekLoading}
                            style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', background: 'none', border: '1px solid rgba(0,0,0,0.08)', cursor: 'pointer', padding: '5px 12px', borderRadius: 12 }}>
                            {weekLoading ? 'reloading...' : 'reload week'}
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="glass-card px-4 py-3" style={{ textAlign: 'center' }}>
                        <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>no plan for this day</p>
                      </div>
                    )}
                  </div>
                ) : (
                  <button onClick={generateWeek} disabled={weekLoading || !data.settings?.apiKey} className="glass-card w-full" style={{ padding: '14px 16px', cursor: 'pointer', border: '1.5px dashed rgba(0,0,0,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                    {weekLoading ? (
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>planning your week...</span>
                    ) : (
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--primary)' }}>✦ plan my week</span>
                    )}
                  </button>
                )}
              </div>
            );
          })()}

          {/* Active Plans */}
          {(data.plans || []).length > 0 && (
            <div className="mb-4">
              <SectionLabel>plans</SectionLabel>
              <div className="space-y-2.5">
                {(data.plans || []).map(plan => {
                  const doneCount = plan.steps.filter(s => s.done).length;
                  const allDone = doneCount === plan.steps.length;
                  return (
                    <div key={plan.id} className="glass-card px-4 py-3">
                      <div className="flex items-center justify-between mb-2">
                        <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: allDone ? 'var(--muted)' : 'var(--dark)', fontWeight: 600, textDecoration: allDone ? 'line-through' : 'none' }}>{plan.title}</p>
                        <div className="flex items-center gap-2">
                          <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)' }}>{doneCount}/{plan.steps.length}</span>
                          <button onClick={() => dispatch({ type: 'DELETE_PLAN', planId: plan.id })}
                            style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, opacity: 0.4 }}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                          </button>
                        </div>
                      </div>
                      {/* Progress bar */}
                      <div style={{ height: 3, borderRadius: 2, background: 'rgba(0,0,0,0.06)', marginBottom: 8 }}>
                        <div style={{ height: '100%', borderRadius: 2, background: 'var(--primary)', width: (doneCount / plan.steps.length * 100) + '%', transition: 'width 0.3s' }} />
                      </div>
                      <div className="space-y-1.5">
                        {plan.steps.map(step => (
                          <div key={step.id} className="flex items-start gap-2.5" style={{ cursor: 'pointer' }}
                            onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'TOGGLE_PLAN_STEP', planId: plan.id, stepId: step.id }); }}>
                            <div className={`checkbox ${step.done ? 'done' : ''}`} style={{ width: 16, height: 16, marginTop: 1, flexShrink: 0 }}>
                              {step.done && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>}
                            </div>
                            <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: step.done ? 'var(--muted)' : 'var(--dark)', lineHeight: 1.5, textDecoration: step.done ? 'line-through' : 'none' }}>{step.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div className="glass-card px-3.5 py-3">
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 6 }}>tasks</p>
              <p style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--dark)' }}>{data.planner.todos.filter(t => t.done).length}/{data.planner.todos.length}</p>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>completed</p>
            </div>
            <div className="glass-card px-3.5 py-3">
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 6 }}>calories</p>
              <p style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--dark)' }}>{Object.values(data.kitchen.calorieLog).reduce((a,b) => a+b, 0)}</p>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>of {data.kitchen.target}</p>
            </div>
          </div>

          <div className="flex justify-center mt-6">
            <div className="flex flex-col items-center gap-1" style={{ opacity: 0.35 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', letterSpacing: 1 }}>swipe</span>
            </div>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 1: Planner ── */
function PlannerPage() {
  const { data, dispatch } = useContext(DataCtx);
  const [newTask, setNewTask] = useState('');
  const [filter, setFilter] = useState('all');
  const [selectedDay, setSelectedDay] = useState(todayKey);
  const [newEvent, setNewEvent] = useState('');
  const [newEventTime, setNewEventTime] = useState('');
  const todos = data.planner.todos;
  const filtered = filter === 'all' ? todos : filter === 'active' ? todos.filter(t => !t.done) : todos.filter(t => t.done);
  const doneCount = todos.filter(t => t.done).length;

  // Build week: Mon–Sun containing today
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7)); // Monday
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d;
  });
  const dayLetters = ['M','T','W','T','F','S','S'];

  const addTask = () => {
    if (!newTask.trim()) return;
    dispatch({ type: 'ADD_TODO', text: newTask.trim(), priority: 'medium' });
    setNewTask('');
  };

  const addEvent = () => {
    if (!newEvent.trim()) return;
    dispatch({ type: 'ADD_EVENT', date: selectedDay, time: newEventTime, text: newEvent.trim() });
    setNewEvent('');
    setNewEventTime('');
  };

  const selectedEvents = data.planner.events[selectedDay] || [];

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 8 }}>planner</p>
          <PageNote page="planner" />

          {/* Week calendar */}
          <div className="glass-card px-3 py-3 mb-3">
            <div className="flex justify-between mb-2">
              {weekDays.map((d, i) => {
                const key = d.toISOString().split('T')[0];
                const isToday = key === todayKey;
                const isSelected = key === selectedDay;
                const hasEvents = (data.planner.events[key] || []).length > 0;
                return (
                  <div key={i} className="flex flex-col items-center gap-1 cursor-pointer" onClick={() => setSelectedDay(key)}
                    style={{ flex: 1 }}>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>{dayLetters[i]}</span>
                    <div style={{ width: 26, height: 26, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: isSelected ? 'var(--primary)' : isToday ? 'var(--primary-light)' : 'transparent',
                      border: isToday && !isSelected ? '1.5px solid var(--primary)' : 'none' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: isSelected ? 'white' : isToday ? 'var(--primary)' : 'var(--dark)', fontWeight: isToday ? 600 : 400 }}>{d.getDate()}</span>
                    </div>
                    <div style={{ width: 4, height: 4, borderRadius: '50%', background: hasEvents ? 'var(--accent)' : 'transparent' }}/>
                  </div>
                );
              })}
            </div>
            {/* Events for selected day */}
            {selectedEvents.length > 0 && (
              <div className="space-y-1 mt-2 pt-2" style={{ borderTop: '1px solid rgba(0,0,0,0.05)' }}>
                {selectedEvents.map((ev, i) => (
                  <div key={i} className="flex items-center gap-2">
                    {ev.time && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--primary)', minWidth: 36 }}>{ev.time}</span>}
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)', flex: 1 }}>{ev.text}</span>
                    <button onClick={() => dispatch({ type: 'DELETE_EVENT', date: selectedDay, index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 2 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                ))}
              </div>
            )}
            <div className="flex items-center gap-1.5 mt-2 pt-2" style={{ borderTop: selectedEvents.length > 0 ? 'none' : '1px solid rgba(0,0,0,0.05)' }}>
              <input type="time" value={newEventTime} onChange={e => setNewEventTime(e.target.value)}
                style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', background: 'transparent', border: 'none', outline: 'none', width: 80 }} />
              <input type="text" value={newEvent} onChange={e => setNewEvent(e.target.value)}
                placeholder="add event..." onKeyDown={e => e.key === 'Enter' && addEvent()}
                className="flex-1 outline-none"
                style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
              <button onClick={addEvent} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newEvent.trim() ? 1 : 0.3 }}>+</button>
            </div>
          </div>

          <div className="flex gap-2 mb-3">
            {['all', 'active', 'done'].map(f => (
              <button key={f} onClick={() => setFilter(f)}
                style={{ fontFamily: 'var(--font-body)', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1,
                  padding: '4px 10px', borderRadius: 999, border: 'none', cursor: 'pointer',
                  background: filter === f ? 'var(--primary)' : 'var(--primary-light)',
                  color: filter === f ? 'white' : 'var(--primary)' }}>{f}</button>
            ))}
            <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginLeft: 'auto', alignSelf: 'center' }}>{doneCount}/{todos.length}</span>
          </div>

          <div className="glass-card px-4 py-3 space-y-2.5 flex-1 overflow-y-auto" style={{ maxHeight: 240 }}>
            {filtered.map(task => (
              <div key={task.id} className="flex items-center gap-3">
                <div className={`checkbox ${task.done ? 'done' : ''}`} onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'TOGGLE_TODO', id: task.id }); }}>
                  {task.done && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                </div>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: task.done ? 'var(--muted)' : 'var(--dark)', textDecoration: task.done ? 'line-through' : 'none', flex: 1 }}>{task.text}</span>
                {task.priority === 'high' && !task.done && <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: 'var(--danger)' }}/>}
                {task.priority === 'medium' && !task.done && <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: 'var(--accent)' }}/>}
                <button onClick={() => dispatch({ type: 'DELETE_TODO', id: task.id })} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, opacity: 0.3 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                </button>
              </div>
            ))}
            {filtered.length === 0 && <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: 20 }}>{filter === 'done' ? 'nothing completed yet' : filter === 'active' ? 'all done!' : 'no tasks yet'}</p>}
          </div>

          <div className="glass-card px-3 py-2.5 mt-3 flex items-center gap-2">
            <input type="text" value={newTask} onChange={e => setNewTask(e.target.value)}
              placeholder="add a task..." onKeyDown={e => e.key === 'Enter' && addTask()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
            <button onClick={addTask} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontFamily: 'var(--font-body)', fontSize: 18, lineHeight: 1, opacity: newTask.trim() ? 1 : 0.3 }}>+</button>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 3: Kitchen ── */

  const [newGrocery, setNewGrocery] = useState('');

  const [groceryExpanded, setGroceryExpanded] = useState(false);
  const [copyToast, setCopyToast] = useState(false);
  const [grocerySearch, setGrocerySearch] = useState('');

  const GROCERY_CATEGORIES = {

    fruit: ['apple','apples','banana','bananas','orange','oranges','lemon','lemons','lime','limes','berry','berries','strawberry','strawberries','blueberry','blueberries','raspberry','raspberries','grape','grapes','mango','mangoes','pineapple','watermelon','peach','peaches','pear','pears','plum','plums','cherry','cherries','kiwi','coconut','fig','figs','pomegranate','cantaloupe','honeydew','grapefruit','tangerine','nectarine','papaya'],
    meat: ['chicken','beef','steak','pork','turkey','lamb','bacon','sausage','ham','ground beef','ground turkey','chicken breast','chicken thigh','chicken thighs','ribs','roast','meatballs','salami','pepperoni','prosciutto','chorizo','brisket','veal','duck'],
    fish: ['salmon','tuna','shrimp','cod','tilapia','crab','lobster','fish','sardines','anchovies','mahi','halibut','trout','catfish','scallops','clams','mussels','oysters','calamari','squid','swordfish'],
    dairy: ['milk','cheese','yogurt','butter','cream','eggs','egg','sour cream','cream cheese','cottage cheese','mozzarella','cheddar','parmesan','feta','ricotta','gouda','brie','swiss','whipped cream','half and half','heavy cream','oat milk','almond milk','greek yogurt'],
    bread: ['bread','tortillas','buns','rolls','bagels','pita','naan','croissants','english muffins','wraps','baguette','sourdough','flatbread','cornbread','crackers','croutons'],
    canned: ['canned','can of','cans of','canned beans','canned tomatoes','canned corn','canned tuna','canned soup','canned chicken','tomato sauce','tomato paste','coconut milk','broth','stock','diced tomatoes','crushed tomatoes','chickpeas','black beans','kidney beans','refried beans','canned fruit','sardines'],
    frozen: ['frozen','ice cream','frozen pizza','frozen vegetables','frozen fruit','frozen berries','frozen meals','popsicles','frozen waffles','frozen fries','ice','frozen chicken','frozen shrimp'],
    snacks: ['chips','crackers','pretzels','popcorn','nuts','trail mix','granola','granola bars','cookies','candy','chocolate','gummy','jerky','rice cakes','protein bar','protein bars','peanuts','almonds','cashews','pistachios','dried fruit'],
    drinks: ['water','juice','soda','coffee','tea','kombucha','sparkling water','energy drink','wine','beer','lemonade','coconut water','sports drink','gatorade','cold brew','matcha','creamer'],
    condiments: ['ketchup','mustard','mayo','mayonnaise','hot sauce','soy sauce','sriracha','ranch','dressing','vinegar','olive oil','oil','salt','pepper','honey','maple syrup','jam','jelly','peanut butter','almond butter','salsa','guacamole','hummus','bbq sauce','teriyaki','worcestershire','relish','tahini'],
    grains: ['rice','pasta','noodles','quinoa','oats','oatmeal','flour','cereal','couscous','barley','farro','lentils','polenta','cornmeal','breadcrumbs','panko'],
    baking: ['flour','sugar','brown sugar','baking soda','baking powder','vanilla','cocoa','chocolate chips','yeast','powdered sugar','cornstarch','sprinkles','frosting','cake mix','pie crust'],
    spices: ['cinnamon','cumin','paprika','oregano','basil','thyme','rosemary','chili powder','turmeric','ginger','nutmeg','cayenne','garlic powder','onion powder','italian seasoning','bay leaves','curry','red pepper flakes','dill','parsley','cilantro','mint','sage'],
  };

  const filterGrocery = (items, query) => {
    if (!query.trim()) return items.map((item, i) => ({ ...item, _idx: i }));
    const q = query.toLowerCase().trim();
    // Check if query matches a category
    const matchedCategories = Object.entries(GROCERY_CATEGORIES).filter(([cat]) => cat.startsWith(q) || q.startsWith(cat));
    const categoryWords = matchedCategories.flatMap(([, words]) => words);
    return items.map((item, i) => ({ ...item, _idx: i })).filter(item => {
      const t = item.text.toLowerCase();
      // Direct text match
      if (t.includes(q)) return true;
      // Category match — check if item text contains any word from matched categories
      if (categoryWords.length > 0) return categoryWords.some(w => t.includes(w));
      return false;
    });
  };

  const copyGrocery = () => {
    const items = grocery.filter(g => !g.done).map(g => `- ${g.text}`);
    const done = grocery.filter(g => g.done).map(g => `✓ ${g.text}`);
    const text = ['Shopping List:', ...items, ...(done.length ? ['', 'Done:', ...done] : [])].join('\n');
    navigator.clipboard.writeText(text).then(() => { setCopyToast(true); setTimeout(() => setCopyToast(false), 1500); });
    navigator.vibrate?.(10);
  };

  const generateMeals = async () => {
    const apiKey = data.settings?.apiKey;
    if (!apiKey || generatingMeals) return;
    setGeneratingMeals(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          messages: [{ role: 'user', content: `Generate a full day of meal ideas for: vegan: ${data.profile.vegan}, calorie target: ${target}cal. Reply ONLY with JSON: {"breakfast":{"name":"...","cal":0},"lunch":{"name":"...","cal":0},"dinner":{"name":"...","cal":0}}. Make them delicious and realistic.` }]
        })
      });
      const json = await res.json();
      const parsed = JSON.parse(stripJsonFences(json.content?.[0]?.text?.trim() || ''));
      ['breakfast','lunch','dinner'].forEach(meal => {
        if (parsed[meal]?.name) dispatch({ type: 'UPDATE_MEAL_NAME', meal, name: parsed[meal].name });
        if (parsed[meal]?.cal) dispatch({ type: 'UPDATE_CALORIES', meal, amount: parsed[meal].cal });
      });
    } catch {}
    setGeneratingMeals(false);
  };

  const meals = [
    { key: 'breakfast', label: 'breakfast', name: mealPlan.breakfast, cal: calorieLog.breakfast },
    { key: 'lunch', label: 'lunch', name: mealPlan.lunch, cal: calorieLog.lunch },
    { key: 'dinner', label: 'dinner', name: mealPlan.dinner, cal: calorieLog.dinner },
  ];

  const hour = new Date().getHours();
  const nextMealKey = hour < 10 ? 'breakfast' : hour < 15 ? 'lunch' : 'dinner';
  const nextMeal = meals.find(m => m.key === nextMealKey);

  const MealCard = ({ m }) => (
    <div key={m.key} className="glass-card px-4 py-3 flex items-center gap-3 cursor-pointer" onClick={() => setEditingMeal(editingMeal === m.key ? null : m.key)}>
      <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: 'var(--primary-light)' }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{icons.utensils}</svg>
      </div>
      <div className="flex-1">
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 2 }}>{m.label}</p>
        {editingMeal === m.key ? (
          <input autoFocus defaultValue={m.name}
            onBlur={e => { dispatch({ type: 'UPDATE_MEAL_NAME', meal: m.key, name: e.target.value }); setEditingMeal(null); }}
            onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
            onClick={e => e.stopPropagation()}

        ) : (
          <p style={{ fontFamily: 'var(--font-display)', fontSize: 15, color: 'var(--dark)' }}>{m.name || 'tap to plan...'}</p>

        <input autoFocus type="number" defaultValue={m.cal}
          onBlur={e => { dispatch({ type: 'UPDATE_CALORIES', meal: m.key, amount: e.target.value }); setEditingCal(null); }}

          onClick={e => e.stopPropagation()}

        <div className="flex flex-col flex-1 py-4">

                  <p onClick={() => setEditingTarget(true)} style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 2, cursor: 'pointer' }}>of {target} cal</p>
                )}
              </div>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 20, color: 'var(--primary)', fontWeight: 500 }}>{pct}%</span>
            </div>
            <div className="h-2 rounded-full overflow-hidden" style={{ background: 'rgba(0,0,0,0.05)' }}>
              <div className="h-full rounded-full" style={{ width: `${Math.min(pct, 100)}%`, background: 'var(--primary)', transition: 'width 0.3s' }}/>
            </div>
          </div>

          <div className="flex items-center justify-between mb-2.5">
            <p onClick={() => setMealsExpanded(!mealsExpanded)} style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, cursor: 'pointer' }}>
              meal plan {mealsExpanded ? '▾' : '▸'}
            </p>
            <div className="flex items-center gap-2">
              {data.settings?.apiKey && (
                <button onClick={generateMeals} disabled={generatingMeals}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--accent)', background: 'var(--accent-light)', border: 'none', borderRadius: 999, padding: '3px 10px', cursor: generatingMeals ? 'default' : 'pointer', opacity: generatingMeals ? 0.5 : 1 }}>
                  {generatingMeals ? 'thinking...' : '✦ suggest meals'}
                </button>
              )}
            </div>
          </div>
          {!mealsExpanded ? (
            <div className="mb-4 cursor-pointer" onClick={() => setMealsExpanded(true)}>
              <MealCard m={nextMeal} />
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textAlign: 'center', marginTop: 6 }}>tap to see all meals</p>
            </div>
          ) : (
            <div className="space-y-2 mb-4">
              {meals.map(m => <MealCard key={m.key} m={m} />)}
            </div>
          )}

          <div className="flex items-center justify-between mb-2.5">
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2 }}>grocery list</p>
            <div className="flex items-center gap-2">
              {grocery.length > 0 && <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)' }}>{grocery.filter(g => g.done).length}/{grocery.length}</p>}
              {grocery.length > 0 && (
                <button onClick={() => setGroceryExpanded(true)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, opacity: 0.5 }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">{icons.expand}</svg>
                </button>
              )}
            </div>
          </div>
          <div className="glass-card px-4 py-3 mb-2 overflow-y-auto" style={{ maxHeight: 100 }}>
            {grocery.length === 0 ? (
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', textAlign: 'center' }}>no items yet</p>
            ) : grocery.map((item, i) => (
              <div key={i} className="flex items-center gap-2 py-1.5">
                <div className={`checkbox ${item.done ? 'done' : ''}`} style={{ width: 14, height: 14 }} onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'TOGGLE_GROCERY', index: i }); }}>
                  {item.done && <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                </div>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: item.done ? 'var(--muted)' : 'var(--dark)', textDecoration: item.done ? 'line-through' : 'none', flex: 1 }}>{item.text}</span>
                <button onClick={() => dispatch({ type: 'DELETE_GROCERY', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 2 }}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                </button>
              </div>
            ))}
          </div>
          <div className="glass-card px-3 py-2 flex items-center gap-2">
            <input type="text" value={newGrocery} onChange={e => setNewGrocery(e.target.value)}
              placeholder="add item..." onKeyDown={e => { if (e.key === 'Enter' && newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
            <button onClick={() => { if (newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 16, opacity: newGrocery.trim() ? 1 : 0.3 }}>+</button>
          </div>

              <div className="flex items-center justify-between px-5 pt-5 pb-3" style={{ borderBottom: '1px solid rgba(0,0,0,0.06)' }}>

                    </button>

                  <button onClick={() => { setGroceryExpanded(false); setGrocerySearch(''); }} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.collapse}</svg>
                  </button>
                </div>
              </div>
              <div className="px-5 pt-3 pb-1 flex items-center gap-2">
                <div className="flex-1 flex items-center gap-2" style={{ background: 'var(--card-bg)', borderRadius: 999, padding: '6px 12px', border: '1px solid rgba(0,0,0,0.06)' }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input type="text" value={grocerySearch} onChange={e => setGrocerySearch(e.target.value)}
                    placeholder="search items or categories (veggies, meat, canned...)"
                    className="flex-1 outline-none"
                    style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
                  {grocerySearch && (
                    <button onClick={() => setGrocerySearch('')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  )}
                </div>
                {grocery.filter(g => g.done).length > 0 && (
                  <button onClick={() => { const doneIndices = grocery.map((g, i) => g.done ? i : -1).filter(i => i >= 0).reverse(); doneIndices.forEach(i => dispatch({ type: 'DELETE_GROCERY', index: i })); }}
                    style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--accent)', background: 'var(--accent-light)', border: 'none', borderRadius: 999, padding: '4px 8px', cursor: 'pointer', whiteSpace: 'nowrap' }}>

                  </button>
                )}
              </div>
              <div style={{ flex: 1, overflowY: 'auto', padding: '12px 20px' }}>
                {(() => {
                  const filtered = filterGrocery(grocery, grocerySearch);
                  if (grocery.length === 0) return <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', textAlign: 'center', marginTop: 40 }}>no items yet</p>;
                  if (filtered.length === 0) return <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', textAlign: 'center', marginTop: 40 }}>no matches for "{grocerySearch}"</p>;
                  return filtered.map(item => (
                    <div key={item._idx} className="flex items-center gap-3 py-3" style={{ borderBottom: '1px solid rgba(0,0,0,0.04)' }}>
                      <div className={`checkbox ${item.done ? 'done' : ''}`} style={{ width: 18, height: 18 }} onClick={() => { navigator.vibrate?.(10); dispatch({ type: 'TOGGLE_GROCERY', index: item._idx }); }}>

                      </div>

                      <button onClick={() => dispatch({ type: 'DELETE_GROCERY', index: item._idx })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 4 }}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>

              <div className="px-5 pb-5 pt-2" style={{ borderTop: '1px solid rgba(0,0,0,0.06)' }}>
                <div className="flex items-center gap-2" style={{ background: 'var(--card-bg)', borderRadius: 999, padding: '8px 16px', border: '1px solid rgba(0,0,0,0.06)' }}>
                  <input type="text" value={newGrocery} onChange={e => setNewGrocery(e.target.value)}
                    placeholder="add item..." onKeyDown={e => { if (e.key === 'Enter' && newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}

                  <button onClick={() => { if (newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}
