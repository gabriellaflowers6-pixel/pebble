          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          messages: [{ role: 'user', content: `Generate a full day of meal ideas for: vegan: ${data.profile.vegan}, calorie target: ${target}cal. Reply ONLY with JSON: {"breakfast":{"name":"...","cal":0},"lunch":{"name":"...","cal":0},"dinner":{"name":"...","cal":0}}. Make them delicious and realistic.` }]
        })
      });
      const json = await res.json();
      const parsed = JSON.parse(stripJsonFences(json.content?.[0]?.text?.trim() || ''));
      ['breakfast','lunch','dinner'].forEach(meal => {
        if (parsed[meal]?.name) dispatch({ type: 'UPDATE_MEAL_NAME', meal, name: parsed[meal].name });
        if (parsed[meal]?.cal) dispatch({ type: 'UPDATE_CALORIES', meal, amount: parsed[meal].cal });
      });
    } catch {}
    setGeneratingMeals(false);
  };

  const meals = [
    { key: 'breakfast', label: 'breakfast', name: mealPlan.breakfast, cal: calorieLog.breakfast },
    { key: 'lunch', label: 'lunch', name: mealPlan.lunch, cal: calorieLog.lunch },
    { key: 'dinner', label: 'dinner', name: mealPlan.dinner, cal: calorieLog.dinner },
  ];

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 8 }}>kitchen</p>

          <div className="glass-card px-4 py-4 mb-4">
            <div className="flex items-end justify-between mb-3">
              <div>
                <p style={{ fontFamily: 'var(--font-display)', fontSize: 32, color: 'var(--dark)', lineHeight: 1 }}>{totalCal}</p>
                {editingTarget ? (
                  <input autoFocus type="number" defaultValue={target}
                    onBlur={e => { dispatch({ type: 'UPDATE_CALORIE_TARGET', value: e.target.value }); setEditingTarget(false); }}
                    onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                    style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', background: 'transparent', border: 'none', borderBottom: '1px solid var(--muted)', outline: 'none', width: 60, marginTop: 2 }} />
                ) : (
                  <p onClick={() => setEditingTarget(true)} style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 2, cursor: 'pointer' }}>of {target} cal</p>
                )}
              </div>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 20, color: 'var(--primary)', fontWeight: 500 }}>{pct}%</span>
            </div>
            <div className="h-2 rounded-full overflow-hidden" style={{ background: 'rgba(0,0,0,0.05)' }}>
              <div className="h-full rounded-full" style={{ width: `${Math.min(pct, 100)}%`, background: 'var(--primary)', transition: 'width 0.3s' }}/>
            </div>
          </div>

          <div className="flex items-center justify-between mb-2.5">
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2 }}>meal plan</p>
            {data.settings?.apiKey && (
              <button onClick={generateMeals} disabled={generatingMeals}
                style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--accent)', background: 'var(--accent-light)', border: 'none', borderRadius: 999, padding: '3px 10px', cursor: generatingMeals ? 'default' : 'pointer', opacity: generatingMeals ? 0.5 : 1 }}>
                {generatingMeals ? 'thinking...' : '✦ suggest meals'}
              </button>
            )}
          </div>
          <div className="space-y-2 mb-4">
            {meals.map(m => (
              <div key={m.key} className="glass-card px-4 py-3 flex items-center gap-3 cursor-pointer" onClick={() => setEditingMeal(editingMeal === m.key ? null : m.key)}>
                <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: 'var(--primary-light)' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{icons.utensils}</svg>
                </div>
                <div className="flex-1">
                  <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 2 }}>{m.label}</p>
                  {editingMeal === m.key ? (
                    <input autoFocus defaultValue={m.name}
                      onBlur={e => { dispatch({ type: 'UPDATE_MEAL_NAME', meal: m.key, name: e.target.value }); setEditingMeal(null); }}
                      onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                      onClick={e => e.stopPropagation()}
                      style={{ fontFamily: 'var(--font-display)', fontSize: 15, color: 'var(--dark)', background: 'transparent', border: 'none', borderBottom: '1px solid var(--primary)', outline: 'none', width: '100%' }} />
                  ) : (
                    <p style={{ fontFamily: 'var(--font-display)', fontSize: 15, color: 'var(--dark)' }}>{m.name || 'tap to plan...'}</p>
                  )}
                </div>
                {editingCal === m.key ? (
                  <input autoFocus type="number" defaultValue={m.cal}
                    onBlur={e => { dispatch({ type: 'UPDATE_CALORIES', meal: m.key, amount: e.target.value }); setEditingCal(null); }}
                    onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                    onClick={e => e.stopPropagation()}
                    style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--primary)', background: 'transparent', border: 'none', borderBottom: '1px solid var(--primary)', outline: 'none', width: 50, textAlign: 'right' }} />
                ) : (
                  <span onClick={e => { e.stopPropagation(); setEditingCal(m.key); }} style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: m.cal > 0 ? 'var(--primary)' : 'var(--muted)', cursor: 'pointer' }}>{m.cal > 0 ? m.cal : '—'}</span>
                )}
              </div>
            ))}
          </div>

          <SectionLabel right={grocery.length > 0 ? `${grocery.filter(g => g.done).length}/${grocery.length}` : ''}>grocery list</SectionLabel>
          <div className="glass-card px-4 py-3 mb-2 overflow-y-auto" style={{ maxHeight: 100 }}>
            {grocery.length === 0 ? (
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', textAlign: 'center' }}>no items yet</p>
            ) : grocery.map((item, i) => (
              <div key={i} className="flex items-center gap-2 py-1.5">
                <div className={`checkbox ${item.done ? 'done' : ''}`} style={{ width: 14, height: 14 }} onClick={() => dispatch({ type: 'TOGGLE_GROCERY', index: i })}>
                  {item.done && <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                </div>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: item.done ? 'var(--muted)' : 'var(--dark)', textDecoration: item.done ? 'line-through' : 'none', flex: 1 }}>{item.text}</span>
                <button onClick={() => dispatch({ type: 'DELETE_GROCERY', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 2 }}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                </button>
              </div>
            ))}
          </div>
          <div className="glass-card px-3 py-2 flex items-center gap-2">
            <input type="text" value={newGrocery} onChange={e => setNewGrocery(e.target.value)}
              placeholder="add item..." onKeyDown={e => { if (e.key === 'Enter' && newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
            <button onClick={() => { if (newGrocery.trim()) { dispatch({ type: 'ADD_GROCERY', text: newGrocery.trim() }); setNewGrocery(''); } }}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 16, opacity: newGrocery.trim() ? 1 : 0.3 }}>+</button>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 4: Gym ── */
function GymPage() {
  const { data, dispatch } = useContext(DataCtx);
  const plan = data.gym.workoutPlan[0];
  const streak = getStreak(data.dots, 'workout');
  const loggedToday = data.dots.workout?.[todayKey];
  const [newExercise, setNewExercise] = useState('');
  const [editingName, setEditingName] = useState(false);
  const [tab, setTab] = useState('plan');
  // Vasa classes state
  const [schedule, setSchedule] = useState(null);
  const [classLoading, setClassLoading] = useState(false);
  const [classError, setClassError] = useState(false);
  const [classDay, setClassDay] = useState(today.getDay()); // 0=Sun JS style
  const [classFilter, setClassFilter] = useState('all');

  // Build week Mon–Sun
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  const weekDays = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); return d; });
  const dayLetters = ['M','T','W','T','F','S','S'];

  const logToday = () => {
    dispatch({ type: 'LOG_WORKOUT', workout: plan?.name || 'workout' });
    if (!loggedToday) dispatch({ type: 'TOGGLE_DOT', category: 'workout', date: todayKey });
  };

  const addExercise = () => {
    if (!newExercise.trim()) return;
    dispatch({ type: 'ADD_EXERCISE', exercise: newExercise.trim() });
    setNewExercise('');
  };

  // Load Vasa class schedule
  useEffect(() => {
    if (tab !== 'classes' || schedule || classLoading) return;
    setClassLoading(true);
    fetch('https://vasafitness.com/wp-json/api/v1/class-schedule?location_id=14775')
      .then(r => r.json())
      .then(json => { setSchedule(json); setClassLoading(false); })
      .catch(() => { setClassError(true); setClassLoading(false); });
  }, [tab]);

  // Flatten schedule for a given JS day index (0=Sun)
  const getClassesForDay = (jsDay) => {
    if (!schedule) return [];
    const classes = [];
    for (const hourVal of Object.values(schedule)) {
      if (!hourVal || typeof hourVal !== 'object') continue;
      const dayVal = hourVal[jsDay] || hourVal[String(jsDay)];
      if (!dayVal || typeof dayVal !== 'object') continue;
      for (const [category, classBucket] of Object.entries(dayVal)) {
        if (!classBucket || typeof classBucket !== 'object') continue;
        for (const instances of Object.values(classBucket)) {
          if (!Array.isArray(instances)) continue;
          instances.forEach(cls => classes.push({ ...cls, category }));
        }
      }
    }
    return classes.filter(c => !c.is_canceled).sort((a, b) => (a.start || '').localeCompare(b.start || ''));
  };

  const categories = schedule ? ['all', ...new Set(getClassesForDay(classDay).map(c => c.category).filter(Boolean))] : ['all'];
  const visibleClasses = getClassesForDay(classDay).filter(c => classFilter === 'all' || c.category === classFilter);

  const addClassToPlanner = (cls) => {
    // Find the date for classDay this week
    const d = weekDays.find(wd => wd.getDay() === classDay);
    if (!d) return;
    const dateStr = d.toISOString().split('T')[0];
    const timeStr = cls.start ? cls.start.substring(0, 5) : '';
    dispatch({ type: 'ADD_EVENT', date: dateStr, time: timeStr, text: cls.class_name || cls.name || 'gym class' });
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <div className="flex items-center justify-between mb-3">
            <p className="page-title" style={{ marginBottom: 0 }}>gym</p>
            <div className="flex gap-1.5">
              {['plan', 'classes'].map(t => (
                <button key={t} onClick={() => setTab(t)}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1, padding: '4px 10px', borderRadius: 999, border: 'none', cursor: 'pointer',
                    background: tab === t ? 'var(--primary)' : 'var(--primary-light)', color: tab === t ? 'white' : 'var(--primary)' }}>{t}</button>
              ))}
            </div>
          </div>

          {tab === 'plan' ? (
            <>
              {/* Weekly calendar strip */}
              <div className="glass-card px-3 py-2.5 mb-3">
                <div className="flex justify-between">
                  {weekDays.map((d, i) => {
                    const key = d.toISOString().split('T')[0];
                    const logged = data.dots.workout?.[key];
                    const isToday = key === todayKey;
                    return (
                      <div key={i} className="flex flex-col items-center gap-1">
                        <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>{dayLetters[i]}</span>
                        <div style={{ width: 24, height: 24, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                          background: logged ? 'var(--primary)' : isToday ? 'var(--primary-light)' : 'rgba(0,0,0,0.03)',
                          border: isToday && !logged ? '1.5px solid var(--primary)' : 'none' }}>
                          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: logged ? 'white' : isToday ? 'var(--primary)' : 'var(--muted)' }}>{d.getDate()}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="glass-card px-4 py-3 mb-3">
                <div className="flex items-center gap-3 mb-2">
                  <div className="w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0" style={{ background: 'var(--primary-light)' }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{icons.dumbbell}</svg>
                  </div>
                  <div className="flex-1">
                    {editingName ? (
                      <input autoFocus defaultValue={plan?.name}
                        onBlur={e => { dispatch({ type: 'UPDATE_WORKOUT_NAME', name: e.target.value }); setEditingName(false); }}
                        onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                        style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--dark)', background: 'transparent', border: 'none', borderBottom: '1px solid var(--primary)', outline: 'none', width: '100%' }} />
                    ) : (
                      <p onClick={() => setEditingName(true)} style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--dark)', cursor: 'pointer' }}>{plan?.name || 'tap to name workout'}</p>
                    )}
                    <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 1 }}>{loggedToday ? '✓ logged today' : 'tap name to edit'}</p>
                  </div>
                  {streak > 0 && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent)' }}>{streak}d</span>}
                </div>
                {!loggedToday && (
                  <button onClick={logToday} style={{ fontFamily: 'var(--font-body)', fontSize: 11, padding: '7px 14px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer' }}>log today</button>
                )}
              </div>

              <SectionLabel>exercises</SectionLabel>
              <div className="glass-card px-4 py-3 mb-2 overflow-y-auto" style={{ maxHeight: 160 }}>
                {(plan?.exercises || []).length === 0 && <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', textAlign: 'center' }}>no exercises yet — add below or ask pebble</p>}
                {(plan?.exercises || []).map((ex, i) => (
                  <div key={i} className="flex items-center gap-3 py-1.5" style={{ borderBottom: i < (plan?.exercises?.length || 0) - 1 ? '1px solid rgba(0,0,0,0.04)' : 'none' }}>
                    <div className="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: 'var(--primary-light)' }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--primary)' }}>{i + 1}</span>
                    </div>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', flex: 1 }}>{ex}</span>
                    <button onClick={() => dispatch({ type: 'REMOVE_EXERCISE', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 2 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                ))}
              </div>
              <div className="glass-card px-3 py-2 flex items-center gap-2">
                <input type="text" value={newExercise} onChange={e => setNewExercise(e.target.value)}
                  placeholder="add exercise..." onKeyDown={e => e.key === 'Enter' && addExercise()}
                  className="flex-1 outline-none"
                  style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
                <button onClick={addExercise} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newExercise.trim() ? 1 : 0.3 }}>+</button>
              </div>
            </>
          ) : (
            <>
              {/* Day tabs */}
              <div className="flex gap-1 mb-2 overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
                {weekDays.map((d, i) => {
                  const isToday = d.toISOString().split('T')[0] === todayKey;
                  const jsDay = d.getDay();
                  return (
                    <button key={i} onClick={() => setClassDay(jsDay)}
                      style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '4px 8px', borderRadius: 999, border: 'none', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,
                        background: classDay === jsDay ? 'var(--primary)' : isToday ? 'var(--primary-light)' : 'rgba(0,0,0,0.04)',
                        color: classDay === jsDay ? 'white' : isToday ? 'var(--primary)' : 'var(--muted)' }}>
                      {dayLetters[i]} {d.getDate()}
                    </button>
                  );
                })}
              </div>

              {/* Category filter */}
              {categories.length > 1 && (
                <div className="flex gap-1 mb-2 overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
                  {categories.map(cat => (
                    <button key={cat} onClick={() => setClassFilter(cat)}
                      style={{ fontFamily: 'var(--font-body)', fontSize: 9, padding: '3px 8px', borderRadius: 999, border: 'none', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0, textTransform: 'uppercase', letterSpacing: 0.8,
                        background: classFilter === cat ? 'var(--accent)' : 'var(--accent-light)',
                        color: classFilter === cat ? 'white' : 'var(--accent)' }}>{cat}</button>
                  ))}
                </div>
              )}

              {/* Class list */}
              <div className="flex-1 overflow-y-auto space-y-2" style={{ maxHeight: 500 }}>
                {classLoading && <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: 24 }}>loading vasa schedule...</p>}
                {classError && (
                  <div className="glass-card px-4 py-4 text-center">
                    <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', marginBottom: 12 }}>couldn't load schedule — CORS blocked. open in browser instead:</p>
                    <a href="https://vasafitness.com/classes-in-colorado-springs-nevada-fillmore/" target="_blank"
                      style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--primary)' }}>vasa nevada ave classes →</a>
                  </div>
                )}
                {!classLoading && !classError && schedule && visibleClasses.length === 0 && (
                  <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: 24 }}>no classes this day</p>
                )}
                {visibleClasses.map((cls, i) => (
                  <div key={i} className="glass-card px-4 py-3 flex items-center gap-3">
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-1">
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--primary)' }}>{cls.start ? cls.start.substring(0,5) : ''}</span>
                        {cls.category && <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--accent)', background: 'var(--accent-light)', borderRadius: 999, padding: '1px 6px', textTransform: 'uppercase', letterSpacing: 0.8 }}>{cls.category}</span>}
                      </div>
                      <p style={{ fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--dark)' }}>{cls.class_name || cls.name}</p>
                      <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 1 }}>
                        {cls.instructor}{cls.duration ? ` · ${cls.duration}min` : ''}{cls.available != null ? ` · ${cls.available} spots` : ''}
                      </p>
                    </div>
                    <button onClick={() => addClassToPlanner(cls)}
                      style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--primary-light)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, color: 'var(--primary)', fontSize: 18, lineHeight: 1 }}>+</button>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 7: Tracker ── */
function TrackerPage() {
  const { data, dispatch } = useContext(DataCtx);
  const categories = ['workout', 'skincare', 'study', 'meals', 'water'];
  const [view, setView] = useState({ year: today.getFullYear(), month: today.getMonth() });
  const [focusCat, setFocusCat] = useState(0);
  const isCurrent = view.year === today.getFullYear() && view.month === today.getMonth();
  const daysInMonth = new Date(view.year, view.month + 1, 0).getDate();

  const prevMonth = () => setView(v => { const d = new Date(v.year, v.month - 1); return { year: d.getFullYear(), month: d.getMonth() }; });
  const nextMonth = () => { if (!isCurrent) setView(v => { const d = new Date(v.year, v.month + 1); return { year: d.getFullYear(), month: d.getMonth() }; }); };
  const prevCat = () => setFocusCat(i => (i - 1 + categories.length) % categories.length);
  const nextCat = () => setFocusCat(i => (i + 1) % categories.length);

  const cat = categories[focusCat];
  const focusDots = data.dots[cat] || {};
  const focusStreak = isCurrent ? getStreak(data.dots, cat) : 0;
  const focusFilled = Array.from({ length: daysInMonth }, (_, i) => {
    const key = new Date(view.year, view.month, i + 1).toISOString().split('T')[0];
    return focusDots[key] ? 1 : 0;
  }).reduce((a, b) => a + b, 0);

  // Calendar grid: pad to Monday-first
  const firstDayJS = new Date(view.year, view.month, 1).getDay();
  const startPad = (firstDayJS + 6) % 7; // Mon=0

  return (
    <div className="swipe-page" style={{ overflowY: 'auto' }}>
      <WavyFrame>
        <div className="flex flex-col py-4" style={{ gap: 12 }}>
          <p className="page-title" style={{ marginBottom: 0 }}>tracker</p>

          {/* Month nav */}
          <div className="flex items-center justify-between">
            <button onClick={prevMonth} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--muted)', padding: '0 4px', lineHeight: 1 }}>‹</button>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)' }}>{monthNames[view.month]} {view.year}</p>
            <button onClick={nextMonth} style={{ background: 'none', border: 'none', cursor: isCurrent ? 'default' : 'pointer', fontSize: 18, color: 'var(--muted)', padding: '0 4px', lineHeight: 1, opacity: isCurrent ? 0.2 : 1 }}>›</button>
          </div>

          {/* Compact all-categories view */}
          <div className="glass-card overflow-y-auto" style={{
            maxHeight: 200, padding: 14, position: 'relative',
            backgroundImage: "url('images/cloud 1.JPG')", backgroundSize: 'cover', backgroundPosition: 'center',
          }}>
            <div style={{ position: 'absolute', inset: 0, background: 'color-mix(in srgb, var(--bg) 75%, transparent)', borderRadius: 'var(--card-radius)' }} />
            <div className="space-y-3 relative" style={{ zIndex: 1 }}>
              {categories.map(c => {
                const dots = data.dots[c] || {};
                const streak = isCurrent ? getStreak(data.dots, c) : 0;
                return (
                  <div key={c}>
                    <div className="flex items-center justify-between mb-1.5">
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--dark)', textTransform: 'uppercase', letterSpacing: 1.5, fontWeight: 500 }}>{c}</span>
                      {streak > 0 && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--accent)' }}>{streak}d</span>}
                    </div>
                    <div className="flex flex-wrap gap-1">
                      {Array.from({ length: daysInMonth }, (_, i) => {
                        const d = new Date(view.year, view.month, i + 1);
                        const key = d.toISOString().split('T')[0];
                        const filled = dots[key];
                        const isToday = isCurrent && i + 1 === today.getDate();
                        const isFuture = d > today;
                        return (
                          <div key={i} className={`dot ${filled ? 'filled' : ''} ${isToday ? 'today' : ''}`}
                            style={{ width: 10, height: 10, cursor: isFuture ? 'default' : 'pointer', opacity: isFuture ? 0.15 : 1 }}
                            onClick={() => !isFuture && dispatch({ type: 'TOGGLE_DOT', category: c, date: key })} />
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Focus single-category calendar view */}
          <div className="glass-card px-4 py-4">
            {/* Category nav */}
            <div className="flex items-center justify-between mb-1">
              <button onClick={prevCat} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--muted)', padding: '0 4px', lineHeight: 1 }}>‹</button>
              <div style={{ textAlign: 'center' }}>
                <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', textTransform: 'uppercase', letterSpacing: 2, fontWeight: 500 }}>{cat}</p>
                <p style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>
                  {focusFilled}/{daysInMonth} days
                  {focusStreak > 0 && <span style={{ color: 'var(--accent)', marginLeft: 8 }}>{focusStreak}d streak</span>}
                </p>
              </div>
              <button onClick={nextCat} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--muted)', padding: '0 4px', lineHeight: 1 }}>›</button>
            </div>

            {/* Day-of-week headers */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 6 }}>
              {['M','T','W','T','F','S','S'].map((l, i) => (
                <div key={i} style={{ textAlign: 'center', fontFamily: 'var(--font-body)', fontSize: 8, color: 'var(--muted)', textTransform: 'uppercase' }}>{l}</div>
              ))}
            </div>

            {/* Calendar grid */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
              {Array.from({ length: startPad }).map((_, i) => <div key={`pad-${i}`} />)}
              {Array.from({ length: daysInMonth }, (_, i) => {
                const d = new Date(view.year, view.month, i + 1);
                const key = d.toISOString().split('T')[0];
                const filled = focusDots[key];
                const isToday = isCurrent && i + 1 === today.getDate();
                const isFuture = d > today;
                return (
                  <div key={i} onClick={() => !isFuture && dispatch({ type: 'TOGGLE_DOT', category: cat, date: key })}
                    style={{ aspectRatio: '1', borderRadius: '50%', cursor: isFuture ? 'default' : 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: filled ? 'var(--primary)' : isToday ? 'var(--primary-light)' : 'rgba(0,0,0,0.04)',
                      border: isToday && !filled ? '1.5px solid var(--primary)' : 'none',
                      opacity: isFuture ? 0.2 : 1 }}>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: filled ? 'white' : isToday ? 'var(--primary)' : 'var(--muted)' }}>{i + 1}</span>
                  </div>
                );
              })}
            </div>

            {/* Category indicator dots */}
            <div className="flex justify-center gap-1.5 mt-3">
              {categories.map((_, i) => (
                <div key={i} onClick={() => setFocusCat(i)}
                  style={{ width: i === focusCat ? 16 : 5, height: 5, borderRadius: 999, cursor: 'pointer', transition: 'width 0.2s',
                    background: i === focusCat ? 'var(--primary)' : 'rgba(0,0,0,0.1)' }} />
              ))}
            </div>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 2: Journal ── */
function JournalPage() {
  const { data, dispatch } = useContext(DataCtx);
  const todayEntry = data.journal.entries.find(e => e.date === todayKey);
  const [body, setBody] = useState(todayEntry?.body || '');
  const [mood, setMood] = useState(todayEntry?.mood || '');
  const moods = ['good', 'okay', 'tough'];

  const save = () => {
    if (body.trim()) dispatch({ type: 'SAVE_JOURNAL', date: todayKey, body: body.trim(), mood });
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title">journal</p>
          <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginBottom: 12 }}>{dayNames[today.getDay()]}, {monthNames[today.getMonth()]} {today.getDate()}</p>

          <div className="flex gap-2 mb-4">
            {moods.map(m => (
              <button key={m} onClick={() => setMood(m)}
                style={{ fontFamily: 'var(--font-body)', fontSize: 11, padding: '5px 12px', borderRadius: 999, cursor: 'pointer',
                  border: mood === m ? '1.5px solid var(--primary)' : '1px solid rgba(0,0,0,0.08)',
                  background: mood === m ? 'var(--primary-light)' : 'transparent',
                  color: mood === m ? 'var(--primary)' : 'var(--muted)' }}>{m}</button>
            ))}
          </div>

          <div className="glass-card px-4 py-4 flex-1 mb-4">
            <textarea value={body} onChange={e => setBody(e.target.value)} onBlur={save}
              placeholder="write about your day..."
              style={{ width: '100%', height: '100%', minHeight: 180, resize: 'none', outline: 'none',
                background: 'transparent', border: 'none',
                fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', lineHeight: 1.8 }} />
          </div>

          {data.journal.entries.filter(e => e.date !== todayKey).length > 0 && (
            <>
              <SectionLabel>previous</SectionLabel>
              <div className="space-y-2 overflow-y-auto" style={{ maxHeight: 100 }}>
                {data.journal.entries.filter(e => e.date !== todayKey).slice(0, 5).map((entry, i) => (
                  <div key={i} className="glass-card px-3 py-2.5">
                    <div className="flex items-center justify-between mb-1">
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)' }}>{entry.date}</span>
                      {entry.mood && <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--accent)' }}>{entry.mood}</span>}
                    </div>
                    <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{entry.body}</p>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 5: Self-Care ── */
function SelfCarePage() {
  const { data, dispatch } = useContext(DataCtx);
  const { skincare } = data.selfCare;
  const [newStep, setNewStep] = useState({ morning: '', evening: '' });
  const [activeTab, setActiveTab] = useState('morning');

  const addStep = (routine) => {
    if (!newStep[routine].trim()) return;
    dispatch({ type: 'ADD_SKINCARE_STEP', routine, step: newStep[routine].trim() });
    setNewStep(prev => ({ ...prev, [routine]: '' }));
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 8 }}>self-care</p>

          <div className="flex gap-2 mb-4">
            {['morning', 'evening'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1,
                  padding: '8px 0', borderRadius: 'var(--card-radius)', cursor: 'pointer',
                  border: activeTab === tab ? '1.5px solid var(--primary)' : '1px solid rgba(0,0,0,0.06)',
                  background: activeTab === tab ? 'var(--primary-light)' : 'transparent',
                  color: activeTab === tab ? 'var(--primary)' : 'var(--muted)' }}>{tab === 'morning' ? 'AM routine' : 'PM routine'}</button>
            ))}
          </div>

          <div className="glass-card px-4 py-3 flex-1 overflow-y-auto" style={{ maxHeight: 300 }}>
            {skincare[activeTab].map((step, i) => (
              <div key={i} className="flex items-center gap-3 py-2.5" style={{ borderBottom: i < skincare[activeTab].length - 1 ? '1px solid rgba(0,0,0,0.04)' : 'none' }}>
                <div className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: 'var(--accent-light)' }}>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--accent)' }}>{i + 1}</span>
                </div>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', flex: 1 }}>{step}</span>
                <button onClick={() => dispatch({ type: 'REMOVE_SKINCARE_STEP', routine: activeTab, index: i })}
                  style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.3, padding: 2 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                </button>
              </div>
            ))}
            {skincare[activeTab].length === 0 && <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', textAlign: 'center', padding: 20 }}>no steps yet</p>}
          </div>

          <div className="glass-card px-3 py-2.5 mt-3 flex items-center gap-2">
            <input type="text" value={newStep[activeTab]} onChange={e => setNewStep(prev => ({ ...prev, [activeTab]: e.target.value }))}
              placeholder={`add ${activeTab} step...`} onKeyDown={e => e.key === 'Enter' && addStep(activeTab)}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
            <button onClick={() => addStep(activeTab)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newStep[activeTab].trim() ? 1 : 0.3 }}>+</button>
          </div>

          <div className="mt-4 flex justify-center">
            <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1 }}>skin type: {data.profile.skinType}</span>
          </div>
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 6: Study ── */
function StudyPage() {
  const { data, dispatch } = useContext(DataCtx);
  const [newTopic, setNewTopic] = useState('');
  const [newCourse, setNewCourse] = useState('');
  const streak = getStreak(data.dots, 'study');
  const statuses = ['in-progress', 'completed', 'paused'];
  const statusColors = { 'in-progress': 'var(--primary)', 'completed': 'var(--accent)', 'paused': 'var(--muted)' };

  const cycleStatus = (i) => {
    const curr = data.study.courses[i].status;
    const next = statuses[(statuses.indexOf(curr) + 1) % statuses.length];
    dispatch({ type: 'UPDATE_COURSE_STATUS', index: i, status: next });
  };

  const logSession = () => {
    if (!newTopic.trim()) return;
    dispatch({ type: 'ADD_STUDY_SESSION', topic: newTopic.trim(), duration: 30 });
    if (!data.dots.study?.[todayKey]) dispatch({ type: 'TOGGLE_DOT', category: 'study', date: todayKey });
    setNewTopic('');
  };

  const addCourse = () => {
    if (!newCourse.trim()) return;
    dispatch({ type: 'ADD_COURSE', name: newCourse.trim() });
    setNewCourse('');
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <div className="flex items-center gap-3 mb-4">
            <p className="page-title" style={{ marginBottom: 0 }}>study</p>
            {streak > 0 && (
              <div className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full" style={{ background: 'var(--accent-light)' }}>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--accent)' }}>{streak}d</span>
              </div>
            )}
          </div>

          <SectionLabel>courses</SectionLabel>
          <div className="space-y-2 mb-2">
            {data.study.courses.map((course, i) => (
              <div key={i} className="glass-card px-4 py-3">
                <div className="flex items-center justify-between mb-2">
                  <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', flex: 1 }}>{course.name}</span>
                  <div className="flex items-center gap-2">
                    <button onClick={() => cycleStatus(i)}
                      style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: statusColors[course.status] || 'var(--muted)', background: 'none', border: `1px solid ${statusColors[course.status] || 'var(--muted)'}`, borderRadius: 999, padding: '2px 7px', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: 0.8 }}>
                      {course.status}
                    </button>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--primary)' }}>{course.progress}%</span>
                    <button onClick={() => dispatch({ type: 'REMOVE_COURSE', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 2 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                </div>
                <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(0,0,0,0.05)' }}>
                  <div className="h-full rounded-full" style={{ width: `${course.progress}%`, background: statusColors[course.status] || 'var(--primary)', transition: 'width 0.3s' }}/>
                </div>
              </div>
            ))}
          </div>
          <div className="glass-card px-3 py-2 flex items-center gap-2 mb-4">
            <input type="text" value={newCourse} onChange={e => setNewCourse(e.target.value)}
              placeholder="add course..." onKeyDown={e => e.key === 'Enter' && addCourse()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
            <button onClick={addCourse} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newCourse.trim() ? 1 : 0.3 }}>+</button>
          </div>

          <SectionLabel>log study session</SectionLabel>
          <div className="glass-card px-3 py-2.5 flex items-center gap-2 mb-4">
            <input type="text" value={newTopic} onChange={e => setNewTopic(e.target.value)}
              placeholder="what did you study?" onKeyDown={e => e.key === 'Enter' && logSession()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
            <button onClick={logSession}
              style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '5px 12px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer', opacity: newTopic.trim() ? 1 : 0.3 }}>log</button>
          </div>

          {data.study.sessions.length > 0 && (
            <>
              <SectionLabel>recent</SectionLabel>
              <div className="space-y-1.5 overflow-y-auto" style={{ maxHeight: 100 }}>
                {data.study.sessions.slice(0, 5).map((s, i) => (
                  <div key={i} className="glass-card px-3 py-2 flex items-center justify-between">
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }}>{s.topic}</span>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)' }}>{s.date}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 9: Career ── */
function CareerPage() {
  const { data, dispatch } = useContext(DataCtx);
  const career = data.career || { role: '', targetDate: '', skills: [], applications: [], experiences: [] };

  const [roleInput, setRoleInput] = useState(career.role);
  const [dateInput, setDateInput] = useState(career.targetDate);
  const [goalSaved, setGoalSaved] = useState(!!career.role);
  const [newSkill, setNewSkill] = useState('');
  const [newAppCompany, setNewAppCompany] = useState('');
  const [newAppRole, setNewAppRole] = useState('');
  const [newExp, setNewExp] = useState('');

  const appStatusColors = { applied: 'var(--primary)', interviewing: 'var(--accent)', offered: '#4caf50', rejected: 'var(--muted)' };

  const saveGoal = () => {
    if (!roleInput.trim()) return;
    dispatch({ type: 'SET_CAREER_GOAL', role: roleInput.trim(), targetDate: dateInput.trim() });
    setGoalSaved(true);
  };

  const addSkill = () => {
    if (!newSkill.trim()) return;
    dispatch({ type: 'ADD_CAREER_SKILL', name: newSkill.trim() });
    setNewSkill('');
  };

  const addApp = () => {
    if (!newAppCompany.trim() || !newAppRole.trim()) return;
    dispatch({ type: 'ADD_JOB_APPLICATION', company: newAppCompany.trim(), role: newAppRole.trim() });
    setNewAppCompany('');
    setNewAppRole('');
  };

  const logExp = () => {
    if (!newExp.trim()) return;
    dispatch({ type: 'ADD_CAREER_EXPERIENCE', topic: newExp.trim() });
    setNewExp('');
  };

  // Keyword match: find study course progress for a skill
  const getLinkedProgress = (skillName) => {
    const keyword = skillName.toLowerCase();
    const match = (data.study?.courses || []).find(c => c.name.toLowerCase().includes(keyword) || keyword.includes(c.name.toLowerCase().split(' ')[0]));
    return match ? match.progress : null;
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 16 }}>career</p>

          {/* Target Role */}
          <SectionLabel>target role</SectionLabel>
          {goalSaved && career.role ? (
            <div className="glass-card px-4 py-3 mb-4">
              <div className="flex items-center justify-between">
                <div>
                  <p style={{ fontFamily: 'var(--font-display)', fontSize: 17, color: 'var(--dark)' }}>{career.role}</p>
                  {career.targetDate && <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>by {career.targetDate}</p>}
                </div>
                <button onClick={() => setGoalSaved(false)} style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--primary)', background: 'var(--primary-light)', border: 'none', borderRadius: 999, padding: '3px 8px', cursor: 'pointer' }}>edit</button>
              </div>
            </div>
          ) : (
            <div className="glass-card px-3 py-3 mb-4 space-y-2">
              <input type="text" value={roleInput} onChange={e => setRoleInput(e.target.value)}
                placeholder="what role are you working toward?"
                onKeyDown={e => e.key === 'Enter' && saveGoal()}
                className="outline-none" style={{ width: '100%', background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
              <div className="flex items-center gap-2">
                <input type="text" value={dateInput} onChange={e => setDateInput(e.target.value)}
                  placeholder="target date (e.g. Jan 2026)"
                  className="flex-1 outline-none" style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)' }} />
                <button onClick={saveGoal} style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '5px 12px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer', opacity: roleInput.trim() ? 1 : 0.3 }}>save</button>
              </div>
            </div>
          )}

          {/* Skills */}
          <SectionLabel>skills</SectionLabel>
          <div className="space-y-2 mb-2">
            {career.skills.map((skill, i) => {
              const linked = getLinkedProgress(skill.name);
              const displayProgress = linked !== null ? linked : skill.progress;
              return (
                <div key={i} className="glass-card px-4 py-3">
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-1.5">
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }}>{skill.name}</span>
                      {linked !== null && <span style={{ fontFamily: 'var(--font-body)', fontSize: 8, color: 'var(--accent)', background: 'var(--accent-light)', borderRadius: 999, padding: '1px 5px' }}>study</span>}
                    </div>
                    <div className="flex items-center gap-2">
                      <input type="number" min="0" max="100" value={displayProgress}
                        onChange={e => dispatch({ type: 'UPDATE_CAREER_SKILL', index: i, progress: Math.min(100, Math.max(0, Number(e.target.value))) })}
                        style={{ width: 36, background: 'transparent', border: 'none', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--primary)', textAlign: 'right', outline: 'none' }} />
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted)' }}>%</span>
                      <button onClick={() => dispatch({ type: 'REMOVE_CAREER_SKILL', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 2 }}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                      </button>
                    </div>
                  </div>
                  <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(0,0,0,0.05)' }}>
                    <div className="h-full rounded-full" style={{ width: `${displayProgress}%`, background: 'var(--primary)', transition: 'width 0.3s' }}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="glass-card px-3 py-2 flex items-center gap-2 mb-4">
            <input type="text" value={newSkill} onChange={e => setNewSkill(e.target.value)}
              placeholder="add skill..." onKeyDown={e => e.key === 'Enter' && addSkill()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
            <button onClick={addSkill} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: newSkill.trim() ? 1 : 0.3 }}>+</button>
          </div>

          {/* Applications */}
          <SectionLabel>applications</SectionLabel>
          <div className="space-y-1.5 mb-2">
            {career.applications.map((app, i) => (
              <div key={i} className="glass-card px-4 py-2.5 flex items-center justify-between">
                <div>
                  <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }}>{app.company}</p>
                  <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)' }}>{app.role} · {app.date}</p>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => dispatch({ type: 'UPDATE_JOB_STATUS', index: i })}
                    style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: appStatusColors[app.status] || 'var(--muted)', background: 'none', border: `1px solid ${appStatusColors[app.status] || 'var(--muted)'}`, borderRadius: 999, padding: '2px 7px', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: 0.8 }}>
                    {app.status}
                  </button>
                  <button onClick={() => dispatch({ type: 'REMOVE_JOB_APPLICATION', index: i })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 2 }}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                  </button>
                </div>
              </div>
            ))}
          </div>
          <div className="glass-card px-3 py-2 mb-4 space-y-1.5">
            <input type="text" value={newAppCompany} onChange={e => setNewAppCompany(e.target.value)}
              placeholder="company..." className="outline-none" style={{ width: '100%', background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
            <div className="flex items-center gap-2">
              <input type="text" value={newAppRole} onChange={e => setNewAppRole(e.target.value)}
                placeholder="role..." onKeyDown={e => e.key === 'Enter' && addApp()}
                className="flex-1 outline-none" style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)' }} />
              <button onClick={addApp} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: (newAppCompany.trim() && newAppRole.trim()) ? 1 : 0.3 }}>+</button>
            </div>
          </div>

          {/* Experience Log */}
          <SectionLabel>experience log</SectionLabel>
          <div className="glass-card px-3 py-2.5 flex items-center gap-2 mb-3">
            <input type="text" value={newExp} onChange={e => setNewExp(e.target.value)}
              placeholder="what did you work on today?" onKeyDown={e => e.key === 'Enter' && logExp()}
              className="flex-1 outline-none"
              style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
            <button onClick={logExp}
              style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '5px 12px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer', opacity: newExp.trim() ? 1 : 0.3 }}>log</button>
          </div>
          {career.experiences.length > 0 && (
            <div className="space-y-1.5 overflow-y-auto" style={{ maxHeight: 110 }}>
              {career.experiences.slice(0, 5).map((e, i) => (
                <div key={i} className="glass-card px-3 py-2 flex items-center justify-between">
                  <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }}>{e.topic}</span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)' }}>{e.date}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 11: Segment Builder ── */
const FEATURE_OPTIONS = [
  { key: 'tracker', label: 'habit tracker', desc: 'daily check-in dot' },
  { key: 'log',     label: 'activity log',  desc: 'timestamped entries' },
  { key: 'checklist', label: 'checklist',   desc: 'checkable items' },
  { key: 'notes',   label: 'notes',         desc: 'freeform text' },
  { key: 'progress', label: 'progress bars', desc: 'named progress bars' },
];

function SegmentBuilderPage() {
  const { data, dispatch } = useContext(DataCtx);
  const segments = data.segments || [];
  const [creating, setCreating] = useState(false);
  const [segName, setSegName] = useState('');
  const [selectedFeatures, setSelectedFeatures] = useState([]);

  const toggleFeature = (key) => {
    setSelectedFeatures(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
  };

  const createSegment = () => {
    if (!segName.trim() || selectedFeatures.length === 0) return;
    dispatch({ type: 'ADD_SEGMENT', name: segName.trim(), features: selectedFeatures });
    setSegName('');
    setSelectedFeatures([]);
    setCreating(false);
  };

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <div className="flex items-center justify-between mb-4">
            <p className="page-title" style={{ marginBottom: 0 }}>build</p>
            {!creating && (
              <button onClick={() => setCreating(true)}
                style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--primary)', background: 'var(--primary-light)', border: 'none', borderRadius: 999, padding: '5px 14px', cursor: 'pointer' }}>
                + new segment
              </button>
            )}
          </div>

          {creating ? (
            <div className="glass-card px-4 py-4 space-y-4">
              <div>
                <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 8 }}>segment name</p>
                <input type="text" value={segName} onChange={e => setSegName(e.target.value)}
                  placeholder="e.g. travel, finance, reading..."
                  autoFocus className="outline-none"
                  style={{ width: '100%', background: 'transparent', border: 'none', borderBottom: '1px solid rgba(0,0,0,0.08)', fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--dark)', padding: '4px 0' }} />
              </div>
              <div>
                <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 10 }}>pick features</p>
                <div className="space-y-2">
                  {FEATURE_OPTIONS.map(f => {
                    const active = selectedFeatures.includes(f.key);
                    return (
                      <button key={f.key} onClick={() => toggleFeature(f.key)}
                        style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: active ? 'var(--primary-light)' : 'rgba(0,0,0,0.02)', border: `1px solid ${active ? 'var(--primary)' : 'rgba(0,0,0,0.06)'}`, borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s' }}>
                        <div style={{ textAlign: 'left' }}>
                          <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: active ? 'var(--primary)' : 'var(--dark)', fontWeight: active ? 500 : 400 }}>{f.label}</p>
                          <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{f.desc}</p>
                        </div>
                        {active && <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setCreating(false); setSegName(''); setSelectedFeatures([]); }}
                  style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', background: 'rgba(0,0,0,0.04)', border: 'none', borderRadius: 10, padding: '10px', cursor: 'pointer' }}>
                  cancel
                </button>
                <button onClick={createSegment}
                  style={{ flex: 2, fontFamily: 'var(--font-body)', fontSize: 12, color: 'white', background: 'var(--primary)', border: 'none', borderRadius: 10, padding: '10px', cursor: 'pointer', opacity: (segName.trim() && selectedFeatures.length) ? 1 : 0.35 }}>
                  create segment →
                </button>
              </div>
            </div>
          ) : segments.length === 0 ? (
            <div className="glass-card px-5 py-8 text-center">
              <p style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--dark)', marginBottom: 8 }}>make it yours</p>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)', lineHeight: 1.6 }}>create a custom segment for anything — travel, finance, reading, side projects...</p>
            </div>
          ) : (
            <>
              <SectionLabel>your segments</SectionLabel>
              <div className="space-y-2">
                {segments.map(seg => (
                  <div key={seg.id} className="glass-card px-4 py-3 flex items-center justify-between">
                    <div>
                      <p style={{ fontFamily: 'var(--font-display)', fontSize: 15, color: 'var(--dark)' }}>{seg.name}</p>
                      <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{seg.features.join(' · ')}</p>
                    </div>
                    <button onClick={() => { if (confirm(`Remove "${seg.name}"?`)) dispatch({ type: 'REMOVE_SEGMENT', id: seg.id }); }}
                      style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 4 }}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                ))}
              </div>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textAlign: 'center', marginTop: 16, opacity: 0.6 }}>swipe past to visit your segments</p>
            </>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

function CustomSegmentPage({ segId }) {
  const { data, dispatch } = useContext(DataCtx);
  const seg = (data.segments || []).find(s => s.id === segId);
  const [logInput, setLogInput] = useState('');
  const [checkInput, setCheckInput] = useState('');
  const [barInput, setBarInput] = useState('');

  if (!seg) return null;

  const todayDot = seg.dots?.[todayKey];

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 16 }}>{seg.name}</p>

          {seg.features.includes('tracker') && (
            <div className="mb-4">
              <SectionLabel>today</SectionLabel>
              <div className="glass-card px-4 py-3 flex items-center justify-between mb-2">
                <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>{todayKey}</p>
                <button onClick={() => dispatch({ type: 'TOGGLE_SEGMENT_DOT', id: segId, date: todayKey })}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '5px 14px', borderRadius: 999, background: todayDot ? 'var(--accent)' : 'var(--primary-light)', color: todayDot ? 'white' : 'var(--primary)', border: 'none', cursor: 'pointer', transition: 'all 0.2s' }}>
                  {todayDot ? '✓ done' : 'check in'}
                </button>
              </div>
              <div className="flex flex-wrap gap-1.5 px-1">
                {Array.from({ length: 14 }, (_, i) => {
                  const d = new Date(); d.setDate(d.getDate() - (13 - i));
                  const k = d.toISOString().split('T')[0];
                  return (
                    <div key={k} onClick={() => dispatch({ type: 'TOGGLE_SEGMENT_DOT', id: segId, date: k })}
                      style={{ width: 18, height: 18, borderRadius: 4, background: seg.dots?.[k] ? 'var(--primary)' : 'rgba(0,0,0,0.06)', cursor: 'pointer', transition: 'background 0.15s' }} />
                  );
                })}
              </div>
            </div>
          )}

          {seg.features.includes('log') && (
            <div className="mb-4">
              <SectionLabel>log</SectionLabel>
              <div className="glass-card px-3 py-2.5 flex items-center gap-2 mb-2">
                <input type="text" value={logInput} onChange={e => setLogInput(e.target.value)}
                  placeholder="what happened?"
                  onKeyDown={e => { if (e.key === 'Enter' && logInput.trim()) { dispatch({ type: 'ADD_SEGMENT_ENTRY', id: segId, text: logInput.trim() }); setLogInput(''); } }}
                  className="flex-1 outline-none"
                  style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }} />
                <button onClick={() => { if (logInput.trim()) { dispatch({ type: 'ADD_SEGMENT_ENTRY', id: segId, text: logInput.trim() }); setLogInput(''); } }}
                  style={{ fontFamily: 'var(--font-body)', fontSize: 10, padding: '5px 12px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer', opacity: logInput.trim() ? 1 : 0.3 }}>log</button>
              </div>
              {(seg.entries || []).length > 0 && (
                <div className="space-y-1.5 overflow-y-auto" style={{ maxHeight: 100 }}>
                  {(seg.entries || []).slice(0, 5).map((e, i) => (
                    <div key={i} className="glass-card px-3 py-2 flex items-center justify-between">
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }}>{e.text}</span>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)' }}>{e.date}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {seg.features.includes('checklist') && (
            <div className="mb-4">
              <SectionLabel>checklist</SectionLabel>
              <div className="space-y-1.5 mb-2">
                {(seg.checks || []).map(c => (
                  <div key={c.id} className="glass-card px-3 py-2 flex items-center gap-2">
                    <button onClick={() => dispatch({ type: 'TOGGLE_SEGMENT_CHECK', id: segId, checkId: c.id })}
                      style={{ width: 18, height: 18, borderRadius: 4, background: c.done ? 'var(--accent)' : 'transparent', border: `1.5px solid ${c.done ? 'var(--accent)' : 'rgba(0,0,0,0.15)'}`, cursor: 'pointer', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s' }}>
                      {c.done && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
                    </button>
                    <span style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', textDecoration: c.done ? 'line-through' : 'none', opacity: c.done ? 0.4 : 1 }}>{c.text}</span>
                    <button onClick={() => dispatch({ type: 'REMOVE_SEGMENT_CHECK', id: segId, checkId: c.id })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.2, padding: 2 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                    </button>
                  </div>
                ))}
              </div>
              <div className="glass-card px-3 py-2 flex items-center gap-2">
                <input type="text" value={checkInput} onChange={e => setCheckInput(e.target.value)}
                  placeholder="add item..."
                  onKeyDown={e => { if (e.key === 'Enter' && checkInput.trim()) { dispatch({ type: 'ADD_SEGMENT_CHECK', id: segId, text: checkInput.trim() }); setCheckInput(''); } }}
                  className="flex-1 outline-none"
                  style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
                <button onClick={() => { if (checkInput.trim()) { dispatch({ type: 'ADD_SEGMENT_CHECK', id: segId, text: checkInput.trim() }); setCheckInput(''); } }}
                  style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: checkInput.trim() ? 1 : 0.3 }}>+</button>
              </div>
            </div>
          )}

          {seg.features.includes('notes') && (
            <div className="mb-4">
              <SectionLabel>notes</SectionLabel>
              <textarea value={seg.note || ''} onChange={e => dispatch({ type: 'UPDATE_SEGMENT_NOTE', id: segId, note: e.target.value })}
                placeholder="write anything..."
                style={{ width: '100%', minHeight: 90, background: 'rgba(0,0,0,0.02)', border: '1px solid rgba(0,0,0,0.06)', borderRadius: 12, fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)', padding: '12px', outline: 'none', resize: 'none', lineHeight: 1.6 }} />
            </div>
          )}

          {seg.features.includes('progress') && (
            <div className="mb-4">
              <SectionLabel>progress</SectionLabel>
              <div className="space-y-2 mb-2">
                {(seg.bars || []).map(b => (
                  <div key={b.id} className="glass-card px-4 py-3">
                    <div className="flex items-center justify-between mb-1.5">
                      <span style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--dark)' }}>{b.label}</span>
                      <div className="flex items-center gap-1.5">
                        <input type="number" min="0" max="100" value={b.value}
                          onChange={e => dispatch({ type: 'UPDATE_SEGMENT_BAR', id: segId, barId: b.id, value: Math.min(100, Math.max(0, Number(e.target.value))) })}
                          style={{ width: 36, background: 'transparent', border: 'none', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--primary)', textAlign: 'right', outline: 'none' }} />
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted)' }}>%</span>
                        <button onClick={() => dispatch({ type: 'REMOVE_SEGMENT_BAR', id: segId, barId: b.id })} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.25, padding: 2 }}>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
                        </button>
                      </div>
                    </div>
                    <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(0,0,0,0.05)' }}>
                      <div className="h-full rounded-full" style={{ width: `${b.value}%`, background: 'var(--primary)', transition: 'width 0.3s' }}/>
                    </div>
                  </div>
                ))}
              </div>
              <div className="glass-card px-3 py-2 flex items-center gap-2">
                <input type="text" value={barInput} onChange={e => setBarInput(e.target.value)}
                  placeholder="add progress bar..."
                  onKeyDown={e => { if (e.key === 'Enter' && barInput.trim()) { dispatch({ type: 'ADD_SEGMENT_BAR', id: segId, label: barInput.trim() }); setBarInput(''); } }}
                  className="flex-1 outline-none"
                  style={{ background: 'transparent', border: 'none', fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }} />
                <button onClick={() => { if (barInput.trim()) { dispatch({ type: 'ADD_SEGMENT_BAR', id: segId, label: barInput.trim() }); setBarInput(''); } }}
                  style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 18, opacity: barInput.trim() ? 1 : 0.3 }}>+</button>
              </div>
            </div>
          )}

        </div>
      </WavyFrame>
    </div>
  );
}

/* ── Page 12: Notebook (Pebble's Picks) ── */
function NotebookPage() {
  const { data, dispatch } = useContext(DataCtx);
  const { quote, quoteAuthor, rec } = data.notebook.dailyPick;
  const isSaved = data.notebook.saves.some(s => s.title === rec?.title);

  return (
    <div className="swipe-page">
      <WavyFrame>
        <div className="flex flex-col justify-center flex-1 py-4">
          <p className="page-title" style={{ marginBottom: 12 }}>pebble's picks</p>

          <div className="glass-card px-5 py-5 mb-4" style={{ textAlign: 'center' }}>
            <p style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--dark)', fontStyle: 'italic', lineHeight: 1.6, marginTop: 12, marginBottom: 8 }}>"{quote}"</p>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--muted)' }}>— {quoteAuthor}</p>
          </div>

          <SectionLabel>today's rec</SectionLabel>
          <div className="glass-card px-4 py-4 flex items-center gap-3 mb-4">
            <div className="w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0" style={{ background: 'var(--accent-light)' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{icons.sparkle}</svg>
            </div>
            <div className="flex-1">
              <p style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--dark)' }}>{rec?.title}</p>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>{rec?.type} — {rec?.reason}</p>
            </div>
            <button onClick={() => !isSaved && dispatch({ type: 'SAVE_PICK', pickType: rec?.type, title: rec?.title })}
              style={{ background: 'none', border: 'none', cursor: isSaved ? 'default' : 'pointer', padding: 4 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill={isSaved ? 'var(--accent)' : 'none'} stroke="var(--accent)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{icons.heart}</svg>
            </button>
          </div>

          {data.notebook.saves.length > 0 && (
            <>
              <SectionLabel>saved</SectionLabel>
              <div className="space-y-1.5 overflow-y-auto" style={{ maxHeight: 100 }}>
                {data.notebook.saves.map((s, i) => (
                  <div key={i} className="glass-card px-3 py-2 flex items-center justify-between">
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, color: 'var(--dark)' }}>{s.title}</span>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase' }}>{s.type}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </WavyFrame>
    </div>
  );
}

/* ══════════════════════════════════════════
   SETTINGS PANEL
   ══════════════════════════════════════════ */
function ThemeSwatch({ id, theme, isActive, onSelect, onDelete, isCustom }) {
  return (
    <div className="flex items-center gap-1.5">
      <button
        className={`theme-swatch ${isActive ? 'active' : ''}`}
        style={{ background: 'var(--card-bg)', flex: 1 }}
        onClick={() => onSelect(id)}
        aria-label={`Select ${theme.name} theme`}
        aria-pressed={isActive}
      >
        <div className="swatch-dots">
          {theme.swatches.map((c, i) => <div key={i} className="swatch-dot" style={{ background: c }}/>)}
        </div>
        <div className="flex-1 text-left">
          <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--dark)', fontWeight: 500 }}>{theme.name}</p>
          <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{theme.desc}</p>
          {id === 'monet' && <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--accent)', marginTop: 3, fontStyle: 'italic' }}>changes daily — 7 Monet paintings</p>}
          {isCustom && <p style={{ fontFamily: 'var(--font-body)', fontSize: 9, color: 'var(--primary)', marginTop: 3 }}>from playground</p>}
        </div>
        {isActive && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>}
      </button>
      {isCustom && (
        <button onClick={(e) => { e.stopPropagation(); onDelete(id); }} className="w-8 h-8 rounded-full flex items-center justify-center cursor-pointer flex-shrink-0" style={{ background: 'rgba(229,115,115,0.1)', transition: 'background 0.15s' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(229,115,115,0.2)'} onMouseLeave={e => e.currentTarget.style.background = 'rgba(229,115,115,0.1)'} aria-label={`Delete ${theme.name} theme`}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E57373" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{icons.x}</svg>
        </button>
      )}
    </div>
  );
}

          </div>

          <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginTop: 28, marginBottom: 12 }}>data</p>
          <div className="glass-card px-4 py-3 space-y-3">

                a.href = 'data:application/json,' + encodeURIComponent(json);

                a.click();
              });

              export data (copy to clipboard)

            <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }}/>

              const pasted = prompt('paste your pebble data JSON here:');

                const parsed = JSON.parse(pasted);

                alert('data imported! refresh the page to apply everything.');
