          <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginTop: 28, marginBottom: 12 }}>open on phone</p>
          <div className="glass-card px-4 py-4 flex flex-col items-center gap-3">

              <span style={{ color: 'var(--primary)' }}>Share → Add to Home Screen</span>

          <p style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 2, marginTop: 28, marginBottom: 12 }}>data</p>
          <div className="glass-card px-4 py-3 space-y-3">
            <button onClick={() => {
              const json = localStorage.getItem('pebble-data');

                a.download = 'pebble-backup.json';
                a.click();
              });
            }} style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--primary)', background: 'none', border: 'none', cursor: 'pointer', width: '100%', textAlign: 'left' }}>
              export data (copy to clipboard)
            </button>
            <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }}/>
            <button onClick={() => {
              const pasted = prompt('paste your pebble data JSON here:');
              if (!pasted) return;
              try {
                const parsed = JSON.parse(pasted);
                dispatch({ type: 'LOAD_DATA', data: parsed });
                alert('data imported! refresh the page to apply everything.');
              } catch { alert('invalid data — make sure you copied the whole thing'); }
            }} style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--primary)', background: 'none', border: 'none', cursor: 'pointer', width: '100%', textAlign: 'left' }}>
              import data (paste JSON)
            </button>
            <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }}/>
            <button onClick={() => { if (confirm('Reset all data to defaults? This cannot be undone.')) { localStorage.removeItem('pebble-data'); location.reload(); } }}

          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   CARD QUIZ OVERLAY
   ══════════════════════════════════════════ */
function CardQuizOverlay({ quiz, onClose }) {
  const { data, dispatch } = useContext(DataCtx);
  const [cardIdx, setCardIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [textInput, setTextInput] = useState('');
  const [showOther, setShowOther] = useState(false);
  const [completing, setCompleting] = useState(false);
  const [done, setDone] = useState(false);
  const [slideDir, setSlideDir] = useState(1); // 1 = forward, -1 = back
  const [visible, setVisible] = useState(true);

  if (!quiz?.cards?.length) return null;
  const card = quiz.cards[cardIdx];
  const isLast = cardIdx === quiz.cards.length - 1;

  const advance = (key, value) => {
    const newAnswers = { ...answers, [key]: value };
    setAnswers(newAnswers);
    if (isLast) {
      runCompletion(newAnswers);
    } else {
      setSlideDir(1);
      setVisible(false);
      setTimeout(() => { setCardIdx(c => c + 1); setTextInput(''); setShowOther(false); setVisible(true); }, 150);
    }
  };

  const goBack = () => {
    if (cardIdx === 0) return;
    setSlideDir(-1);
    setVisible(false);
    setTimeout(() => { setCardIdx(c => c - 1); setTextInput(''); setShowOther(false); setVisible(true); }, 150);
  };

  const runCompletion = async (finalAnswers) => {
    setCompleting(true);
    const apiKey = data.settings?.apiKey;
    if (!apiKey) { setDone(true); setCompleting(false); return; }

    const answersStr = Object.entries(finalAnswers).map(([k, v]) => `${k}: ${v}`).join(', ');
    const { profile, planner, kitchen, selfCare, study, gym } = data;
    const context = `User: ${profile.name}, vegan: ${profile.vegan}, skin: ${profile.skinType}. Todos: ${planner.todos.filter(t=>!t.done).map(t=>t.text).join(', ')}. Skincare AM: ${selfCare.skincare.morning.join(', ')}. PM: ${selfCare.skincare.evening.join(', ')}. Courses: ${study.courses.map(c=>c.name).join(', ')}. Workout: ${gym.workoutPlan[0]?.name || 'none'}.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 1024,
          messages: [{ role: 'user', content: `User context: ${context}\n\nThe user completed a quiz titled "${quiz.title}" with answers: ${answersStr}.\n\nNow build a personalized plan and add it to the app. Reply with a short friendly summary (2-3 sentences) and append an <actions> block with all the relevant data actions. Available actions: ADD_SKINCARE_STEP {routine,step}, REMOVE_SKINCARE_STEP {routine,index}, ADD_TODO {text,priority}, ADD_EXERCISE {exercise}, UPDATE_WORKOUT_NAME {name}, ADD_COURSE {name}, UPDATE_COURSE_STATUS {index,status}, ADD_EVENT {date,time,text}, ADD_GROCERY {text}, SET_CAREER_GOAL {role,targetDate}, ADD_CAREER_SKILL {name}, ADD_JOB_APPLICATION {company,role}, ADD_CAREER_EXPERIENCE {topic}. Today is ${todayKey}.\n\n<actions>[...]</actions>` }]
        })
      });
      const json = await res.json();
      const raw = json.content?.[0]?.text || '';
      const actionsMatch = raw.match(/<actions>([\s\S]*?)<\/actions>/);
      const cleanText = raw.replace(/<actions>[\s\S]*?<\/actions>/, '').trim();
      if (actionsMatch) {
        try { JSON.parse(actionsMatch[1]).forEach(a => dispatch(a)); } catch {}
      }
      dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: cleanText || `your ${quiz.title} is ready!`, time: new Date().toISOString() } });
    } catch {
      dispatch({ type: 'ADD_CHAT_MSG', msg: { role: 'assistant', content: `quiz complete! couldn't reach my brain to build the plan — try asking me directly.`, time: new Date().toISOString() } });
    }
    setDone(true);
    setCompleting(false);
  };

  const slideStyle = {
    transition: visible ? 'opacity 0.15s ease, transform 0.15s ease' : 'none',
    opacity: visible ? 1 : 0,
    transform: visible ? 'translateX(0)' : `translateX(${slideDir * 24}px)`,
  };

  return (
    <div className="absolute inset-0 z-50 flex flex-col" style={{ background: 'var(--bg)' }}>
      {/* Progress bar */}
      <div style={{ height: 3, background: 'rgba(0,0,0,0.06)', flexShrink: 0 }}>
        <div style={{ height: '100%', background: 'var(--primary)', transition: 'width 0.4s ease', width: completing || done ? '100%' : `${((cardIdx + (completing ? 1 : 0)) / quiz.cards.length) * 100}%` }}/>
      </div>

      {/* Header */}
      <div className="px-5 pt-8 pb-4 flex items-center justify-between flex-shrink-0">
        <button onClick={cardIdx > 0 && !completing && !done ? goBack : onClose}
          style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', padding: 0 }}>
          {cardIdx > 0 && !completing && !done ? '← back' : '✕'}
        </button>
        <span style={{ fontFamily: 'var(--font-body)', fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1.5 }}>{quiz.title}</span>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)' }}>
          {completing || done ? '' : `${cardIdx + 1}/${quiz.cards.length}`}
        </span>
      </div>

      {/* Card content */}
      <div className="flex-1 flex flex-col items-center justify-center px-6 pb-8">
        {completing ? (
          <div className="text-center">
            <div style={{ width: 48, height: 48, borderRadius: '50%', background: 'var(--primary-light)', margin: '0 auto 20px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/></svg>
            </div>
            <p style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--dark)', marginBottom: 8 }}>building your plan...</p>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)' }}>pebble is thinking</p>
          </div>
        ) : done ? (
          <div className="text-center">
            <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'var(--accent-light)', margin: '0 auto 20px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">{icons.check}</svg>
            </div>
            <p style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--dark)', marginBottom: 8 }}>done!</p>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--muted)', marginBottom: 32 }}>check the chat for your summary</p>
            <button onClick={onClose} style={{ fontFamily: 'var(--font-body)', fontSize: 13, padding: '12px 32px', borderRadius: 999, background: 'var(--primary)', color: 'white', border: 'none', cursor: 'pointer' }}>done</button>
          </div>
        ) : (
          <div style={{ width: '100%', ...slideStyle }}>
            <p style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--dark)', textAlign: 'center', lineHeight: 1.35, marginBottom: 36 }}>{card.question}</p>

            {card.options ? (
              <div className="space-y-3">
                {card.options.map(opt => (
                  <button key={opt} onClick={() => advance(card.key, opt)}
                    style={{ width: '100%', padding: '14px 20px', background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--dark)', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}
                    onMouseEnter={e => { e.currentTarget.style.background = 'var(--primary-light)'; e.currentTarget.style.borderColor = 'var(--primary)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'var(--card-bg)'; e.currentTarget.style.borderColor = 'var(--card-border)'; }}>
                    {opt}
                  </button>
                ))}
                {!showOther ? (
                  <button onClick={() => setShowOther(true)}
                    style={{ width: '100%', padding: '14px 20px', background: 'transparent', border: '1px dashed var(--card-border)', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--muted)', cursor: 'pointer', textAlign: 'left' }}>
                    other...
                  </button>
                ) : (
                  <div className="flex gap-2">
                    <input type="text" value={textInput} onChange={e => setTextInput(e.target.value)}
                      placeholder="type your own..."
                      onKeyDown={e => e.key === 'Enter' && textInput.trim() && advance(card.key, textInput.trim())}
                      autoFocus
                      style={{ flex: 1, padding: '14px 16px', background: 'var(--card-bg)', border: '1px solid var(--primary)', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--dark)', outline: 'none' }} />
                    <button onClick={() => textInput.trim() && advance(card.key, textInput.trim())}
                      style={{ padding: '14px 18px', background: 'var(--primary)', color: 'white', border: 'none', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, cursor: textInput.trim() ? 'pointer' : 'default', opacity: textInput.trim() ? 1 : 0.4 }}>→</button>
                  </div>
                )}
              </div>
            ) : (
              <div>
                <input type={card.inputType || 'text'} value={textInput} onChange={e => setTextInput(e.target.value)}
                  placeholder={card.placeholder || 'type your answer...'}
                  onKeyDown={e => e.key === 'Enter' && textInput.trim() && advance(card.key, textInput.trim())}
                  autoFocus
                  style={{ width: '100%', padding: '14px 16px', background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--dark)', outline: 'none', marginBottom: 16 }} />
                <button onClick={() => textInput.trim() && advance(card.key, textInput.trim())}
                  style={{ width: '100%', padding: '14px', background: 'var(--primary)', color: 'white', border: 'none', borderRadius: 'var(--card-radius)', fontFamily: 'var(--font-body)', fontSize: 14, cursor: textInput.trim() ? 'pointer' : 'default', opacity: textInput.trim() ? 1 : 0.4 }}>
                  {isLast ? 'build my plan →' : 'next →'}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP — SwipeContainer + IntersectionObserver
   ══════════════════════════════════════════ */
function App() {
  const [jarOpen, setJarOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [currentPage, setCurrentPage] = useState(0);
  const [cardQuiz, setCardQuiz] = useState(null);
  const containerRef = useRef(null);
  const pageRefs = useRef([]);
  const segPageCache = useRef({});
  const { themeId, customThemes } = useContext(ThemeCtx);
  const { data } = useContext(DataCtx);
  const activeTheme = THEMES[themeId] || customThemes.find(ct => ct.id === themeId);
  const hasSky = activeTheme?.vars?.['--sky-height'] !== '0px' && activeTheme?.vars?.['--sky-height'] !== undefined;

  const customSegments = data.segments || [];

  // Stable component references per segment ID so React doesn't remount on re-render
  const getSegPage = useCallback((segId) => {
    if (!segPageCache.current[segId]) {
      segPageCache.current[segId] = function SegPage() { return <CustomSegmentPage segId={segId} />; };
    }
    return segPageCache.current[segId];
  }, []);

  /* Midnight auto-refresh so today/todayKey stay accurate */
  useEffect(() => {
    const now = new Date();
    const msTillMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
    const t = setTimeout(() => location.reload(), msTillMidnight);
    return () => clearTimeout(t);
  }, []);

  /* OneSignal init — runs once when App ID is set */
  useEffect(() => {
    const appId = data.settings?.oneSignalAppId;
    if (!appId || window._osInited) return;
    window._osInited = true;
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId });
    });
  }, [data.settings?.oneSignalAppId]);

  const staticPages = [StreamPage, PlannerPage, KitchenPage, GymPage, SelfCarePage, StudyPage, TrackerPage, CareerPage, JournalPage, NotebookPage, SegmentBuilderPage, StickiesPage];
  const pages = [...staticPages, ...customSegments.map(s => getSegPage(s.id))];
  const pageKeys = [...staticPages.map((_, i) => `static-${i}`), ...customSegments.map(s => `seg-${s.id}`)];

  /* IntersectionObserver to track current page — re-runs when page count changes */
  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
            const idx = pageRefs.current.indexOf(entry.target);
            if (idx !== -1) setCurrentPage(idx);
          }
        });
      },
      { root: container, threshold: 0.5 }
    );

    pageRefs.current.forEach(el => { if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, [pages.length]);

  /* Navigate to a specific page */
  const navigateTo = useCallback((pageIndex) => {
    const el = pageRefs.current[pageIndex];
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, []);

  const setPageRef = (i) => (el) => { pageRefs.current[i] = el; };

  const allPageLabels = [...PAGE_LABELS, ...customSegments.map(s => s.name)];
  const navStyle = data.settings?.navStyle || 'jar';

  return (
    <QuizCtx.Provider value={{ setCardQuiz }}>
    <div className="phone-frame" data-theme={themeId}>
      {cardQuiz && <CardQuizOverlay quiz={cardQuiz} onClose={() => setCardQuiz(null)} />}
      {navStyle === 'jar' && <MarbleJar open={jarOpen} onClose={() => setJarOpen(false)} onNavigate={navigateTo} currentPage={currentPage} customSegments={customSegments} staticPageCount={staticPages.length} />}
      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)} />

      <div className={hasSky ? 'cloud-sky' : ''}>
        <Header onJarOpen={navStyle === 'jar' ? () => setJarOpen(true) : null} onSettingsOpen={() => setSettingsOpen(true)} />
      </div>

      {navStyle === 'tabs' && <TabNav currentPage={currentPage} onNavigate={navigateTo} pageLabels={allPageLabels} />}
      {navStyle === 'pebbles' && <PebbleNav currentPage={currentPage} onNavigate={navigateTo} pageLabels={allPageLabels} />}

      <div className="swipe-container" ref={containerRef} style={{ position: 'relative' }}>
        {navStyle === 'jar' && <PageDots currentPage={currentPage} totalPages={pages.length} onDotClick={navigateTo} pageLabels={allPageLabels} />}
        {pages.map((Page, i) => (
          <div key={pageKeys[i]} ref={setPageRef(i)} className="swipe-page-wrap">
            <Page />
          </div>
        ))}
      </div>

      <ChatBar />
    </div>
    </QuizCtx.Provider>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(
  <ThemeProvider><DataProvider><App /></DataProvider></ThemeProvider>
);
</script>
</body>
